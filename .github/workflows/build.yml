name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SRC_B64: ""
      CONV_B64: ""
      SYMBOLPANEL_JAVA_B64: "REMOVED"
      WUBIINPUTMETHODSERVICE_JAVA_B64: "REMOVED"
      KEYBOARDVIEW_JAVA_B64: "REMOVED"
      DICTENGINE_JAVA_B64: "REMOVED"
      CANDIDATEVIEW_JAVA_B64: "REMOVED"
      CANDIDATEPAGERVIEW_JAVA_B64: "REMOVED"
    steps:
      - name: Decode source
        run: |
          echo "$SRC_B64" | base64 -d > src.tar.gz && tar xzf src.tar.gz
          echo "$CONV_B64" | base64 -d > /tmp/convert_rime.py

      - name: Download standard dictionaries
        run: |
          wget -q "https://raw.githubusercontent.com/rime/rime-wubi/master/wubi86.dict.yaml" -O /tmp/wubi86.yaml || echo "wubi failed"
          wget -q "https://raw.githubusercontent.com/rime/rime-luna-pinyin/master/luna_pinyin.dict.yaml" -O /tmp/pinyin.yaml  || echo "pinyin failed"
          python3 /tmp/convert_rime.py /tmp/wubi86.yaml WubiIME/app/src/main/assets/dict/wubi86.dict wubi
          python3 /tmp/convert_rime.py /tmp/pinyin.yaml WubiIME/app/src/main/assets/dict/pinyin.dict pinyin
          echo "wubi:$(wc -l < WubiIME/app/src/main/assets/dict/wubi86.dict) pinyin:$(wc -l < WubiIME/app/src/main/assets/dict/pinyin.dict)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd WubiIME
          gradle assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: "安键输入法-build-${{ github.run_number }}"
          path: WubiIME/app/build/outputs/apk/release/*.apk
          retention-days: 90
