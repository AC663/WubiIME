name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SRC_B64:   ""
      SP_B64:    ""
      IMS_B64:   ""
      KV_B64:    ""
      DE_B64:    ""
      CV_B64:    ""
      PAGER_B64: ""
      CONV_B64:  ""
    steps:
      - name: Decode source
        run: |
          echo "$SRC_B64"   | base64 -d > src.tar.gz && tar xzf src.tar.gz
          echo "$SP_B64"    | base64 -d > WubiIME/app/src/main/java/com/wubi/ime/ui/SymbolPanel.java
          echo "$IMS_B64"   | base64 -d > WubiIME/app/src/main/java/com/wubi/ime/ime/WubiInputMethodService.java
          echo "$KV_B64"    | base64 -d > WubiIME/app/src/main/java/com/wubi/ime/ui/KeyboardView.java
          echo "$DE_B64"    | base64 -d > WubiIME/app/src/main/java/com/wubi/ime/engine/DictEngine.java
          echo "$CV_B64"    | base64 -d > WubiIME/app/src/main/java/com/wubi/ime/ui/CandidateView.java
          echo "$PAGER_B64" | base64 -d > WubiIME/app/src/main/java/com/wubi/ime/ui/CandidatePagerView.java
          echo "$CONV_B64"  | base64 -d > /tmp/convert_rime.py

      - name: Download standard dictionaries
        run: |
          wget -q "https://raw.githubusercontent.com/rime/rime-wubi/master/wubi86.dict.yaml" -O /tmp/wubi86.yaml || echo "wubi failed"
          wget -q "https://raw.githubusercontent.com/rime/rime-luna-pinyin/master/luna_pinyin.dict.yaml" -O /tmp/pinyin.yaml  || echo "pinyin failed"
          python3 /tmp/convert_rime.py /tmp/wubi86.yaml WubiIME/app/src/main/assets/dict/wubi86.dict wubi
          python3 /tmp/convert_rime.py /tmp/pinyin.yaml WubiIME/app/src/main/assets/dict/pinyin.dict pinyin
          echo "wubi: $(wc -l < WubiIME/app/src/main/assets/dict/wubi86.dict) pinyin: $(wc -l < WubiIME/app/src/main/assets/dict/pinyin.dict)"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd WubiIME
          gradle assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: "安键输入法-build-${{ github.run_number }}"
          path: WubiIME/app/build/outputs/apk/release/*.apk
          retention-days: 90
