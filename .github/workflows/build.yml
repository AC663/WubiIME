name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEBUG_KEYSTORE_B64: ""
      SRC_B64: ""
      CONV_B64: ""
      THEMEMANAGER_B64: ""
      SETTINGSACTIVITY_B64: ""
      WUBIWEBVIEWIME_JAVA_B64: ""
      SYMBOLPANEL_JAVA_B64: "REMOVED"
      WUBIINPUTMETHODSERVICE_JAVA_B64: "REMOVED"
      KEYBOARDVIEW_JAVA_B64: "REMOVED"
      DICTENGINE_JAVA_B64: ""
      APPACTIVITY_JAVA_B64: ""
      ANDROIDMANIFEST_B64: ""
      CANDIDATEVIEW_JAVA_B64: "REMOVED"
      CANDIDATEPAGERVIEW_JAVA_B64: "REMOVED"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Decode source
        run: |
          base64 -d <<< "$SRC_B64" > src.tar.gz && tar xzf src.tar.gz
          base64 -d <<< "$CONV_B64" > /tmp/convert_rime.py
          mkdir -p WubiIME/app/src/main/java/com/wubi/ime/theme
          mkdir -p WubiIME/app/src/main/java/com/wubi/ime/ui
          mkdir -p WubiIME/app/src/main/assets
          base64 -d <<< "$THEMEMANAGER_B64" > WubiIME/app/src/main/java/com/wubi/ime/theme/ThemeManager.java
          find . -name "SettingsActivity.java" -delete
          base64 -d <<< "$SETTINGSACTIVITY_B64" > WubiIME/app/src/main/java/com/wubi/ime/ime/SettingsActivity.java
          # 原生服务以仓库 scraps/native 同步版为准(剪贴隔离开关 / isSecure / 键盘弹出补抓剪贴板)，覆盖 SRC 包内旧版
          find . -name "WubiWebViewIME.java" -delete
          base64 -d <<< "$WUBIWEBVIEWIME_JAVA_B64" > WubiIME/app/src/main/java/com/wubi/ime/ime/WubiWebViewIME.java
          grep -q "openAppWindow" WubiIME/app/src/main/java/com/wubi/ime/ime/WubiWebViewIME.java && echo "OK native v12.2" || { echo "native 解码异常"; exit 1; }
          # 词库引擎以 scraps/native 同步版为准(整句DP单段上限 6→14，修复"我晚点"等长词连打)，覆盖 SRC 包内旧版
          find . -name "DictEngine.java" -delete
          mkdir -p WubiIME/app/src/main/java/com/wubi/ime/engine
          base64 -d <<< "$DICTENGINE_JAVA_B64" > WubiIME/app/src/main/java/com/wubi/ime/engine/DictEngine.java
          grep -q "SENT_MAXSEG" WubiIME/app/src/main/java/com/wubi/ime/engine/DictEngine.java && echo "OK DictEngine v12.2" || { echo "DictEngine 解码异常"; exit 1; }
          # 独立应用全屏窗口 AppActivity(密码生成器/笔记本 真·独立弹窗)
          base64 -d <<< "$APPACTIVITY_JAVA_B64" > WubiIME/app/src/main/java/com/wubi/ime/ime/AppActivity.java
          grep -q "class AppActivity" WubiIME/app/src/main/java/com/wubi/ime/ime/AppActivity.java && echo "OK AppActivity" || { echo "AppActivity 解码异常"; exit 1; }
          # Manifest 以 scraps/native 同步版为准(注册 AppActivity)，覆盖 SRC 包内旧版
          base64 -d <<< "$ANDROIDMANIFEST_B64" > WubiIME/app/src/main/AndroidManifest.xml
          grep -q "AppActivity" WubiIME/app/src/main/AndroidManifest.xml && echo "OK Manifest" || { echo "Manifest 解码异常"; exit 1; }
          echo "========== KEYBOARD.HTML 自检 =========="
          echo "--- assets 目录内容: ---"
          ls -la WubiIME/app/src/main/assets/ || echo "assets目录不存在!"
          echo "--- 查找所有 keyboard.html: ---"
          find . -name "keyboard.html" -exec ls -la {} \; || echo "未找到任何 keyboard.html!"
          echo "--- 强制检查: ---"
          if [ -f WubiIME/app/src/main/assets/keyboard.html ]; then
            echo "OK keyboard.html 存在,大小: $(wc -c < WubiIME/app/src/main/assets/keyboard.html) 字节"
          else
            echo "FAIL keyboard.html 不在 assets! 打印完整目录树后终止:"
            find WubiIME -type f | head -50
            exit 1
          fi
          echo "========== 自检结束 =========="

      - name: Download standard dictionaries
        run: |
          set -e
          mkdir -p WubiIME/app/src/main/assets/dict
          rm -f WubiIME/app/src/main/assets/dict/*.dict
          # 五笔86（rime-wubi 官方，含6万词组编码，与 iRime 同源）
          curl -fsSL "https://raw.githubusercontent.com/rime/rime-wubi/master/wubi86.dict.yaml" -o /tmp/wubi86.yaml \
            || curl -fsSL "https://cdn.jsdelivr.net/gh/rime/rime-wubi@master/wubi86.dict.yaml" -o /tmp/wubi86.yaml
          # 拼音单字：pinyin_simp（简体安卓系），失败回退 luna
          curl -fsSL "https://raw.githubusercontent.com/rime/rime-pinyin-simp/master/pinyin_simp.dict.yaml" -o /tmp/pinyin.yaml \
            || curl -fsSL "https://raw.githubusercontent.com/rime/rime-luna-pinyin/master/luna_pinyin.dict.yaml" -o /tmp/pinyin.yaml
          # 拼音词组：rime-ice base（雾凇，简体高质词组，带正确多音字拼音），用于连打/词组/简拼
          curl -fsSL "https://raw.githubusercontent.com/iDvel/rime-ice/main/cn_dicts/base.dict.yaml" -o /tmp/ice_base.yaml \
            || curl -fsSL "https://cdn.jsdelivr.net/gh/iDvel/rime-ice@main/cn_dicts/base.dict.yaml" -o /tmp/ice_base.yaml
          # 雾凇扩展词库 ext（新词/流行词：闲鱼、抖音、显眼包…），失败不致命
          curl -fsSL "https://raw.githubusercontent.com/iDvel/rime-ice/main/cn_dicts/ext.dict.yaml" -o /tmp/ice_ext.yaml \
            || curl -fsSL "https://cdn.jsdelivr.net/gh/iDvel/rime-ice@main/cn_dicts/ext.dict.yaml" -o /tmp/ice_ext.yaml \
            || touch /tmp/ice_ext.yaml
          cat /tmp/ice_ext.yaml >> /tmp/ice_base.yaml
          # 词库脚本与现代词清单随仓库走(dict-extra/)——新窗口/新会话改词只改仓库文件，永不丢
          # THUOCL 清华开放词库(成语/地名/财经/食物/医学)扩容五笔词汇，失败不致命
          for t in chengyu diming caijing food medical; do
            curl -fsSL "https://raw.githubusercontent.com/thunlp/THUOCL/master/data/THUOCL_${t}.txt" -o /tmp/th_${t}.txt || true
          done
          python3 dict-extra/prepare_dicts.py wubi_supplement /tmp/wubi86.yaml dict-extra/modern_words.txt /tmp/th_chengyu.txt /tmp/th_diming.txt /tmp/th_caijing.txt /tmp/th_food.txt /tmp/th_medical.txt
          # base+ext 合并后按(词,音)去重，防止两源重叠产生重复候选
          python3 dict-extra/prepare_dicts.py pinyin_dedup /tmp/ice_base.yaml
          # 五笔：官方库自带词组，直接转
          python3 /tmp/convert_rime.py wubi /tmp/wubi86.yaml WubiIME/app/src/main/assets/dict/wubi86.dict
          # 拼音：单字 + 词组(前12万高频：双字/三字/四字成语 + ext 新词)合并，频率归一化统一量纲
          # 12万覆盖"很智慧/我晚点/我晚点过去"级日常短语；配合 DictEngine 整句DP段上限14 修复长词连打
          python3 /tmp/convert_rime.py pinyin /tmp/pinyin.yaml /tmp/ice_base.yaml WubiIME/app/src/main/assets/dict/pinyin.dict 200000
          # 口语高频短语补充(今天太晚/你爱咋咋地吧/晚点去公司…)：随仓库 dict-extra/pinyin_extra.txt 追加，含简拼、按(码,词)去重
          python3 dict-extra/prepare_dicts.py pinyin_extra WubiIME/app/src/main/assets/dict/pinyin.dict dict-extra/pinyin_extra.txt
          WB=$(wc -l < WubiIME/app/src/main/assets/dict/wubi86.dict)
          PY=$(wc -l < WubiIME/app/src/main/assets/dict/pinyin.dict)
          echo "wubi:$WB pinyin:$PY"
          # 词库体量过小=下载或转换失败，直接让构建失败而非打出残废 APK
          # 拼音含词组+简拼后应≥10万；五笔含词组应≥10万
          if [ "$WB" -lt 100000 ] || [ "$PY" -lt 100000 ]; then echo "词库异常，构建中止"; exit 1; fi

      - name: Download color emoji font
        run: |
          mkdir -p WubiIME/app/src/main/assets/fonts
          # COLRv1 矢量彩色 emoji(含国旗)，约 4.8MB，离线打包进 APK，根治安卓缺彩色 emoji 字形
          # 下载失败不致命：@font-face 找不到文件时静默回退系统 emoji(与改动前一致)
          curl -fsSL "https://raw.githubusercontent.com/googlefonts/noto-emoji/main/fonts/Noto-COLRv1.ttf" \
            -o WubiIME/app/src/main/assets/fonts/Noto-COLRv1.ttf \
            || curl -fsSL "https://github.com/googlefonts/noto-emoji/raw/main/fonts/Noto-COLRv1.ttf" \
            -o WubiIME/app/src/main/assets/fonts/Noto-COLRv1.ttf \
            || echo "emoji 字体下载失败，跳过(回退系统 emoji)"
          ls -la WubiIME/app/src/main/assets/fonts/ 2>/dev/null || true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          mkdir -p ~/.android
          base64 -d <<< "$DEBUG_KEYSTORE_B64" > ~/.android/shiyan-fixed.keystore
          export FIXED_KEYSTORE="$HOME/.android/shiyan-fixed.keystore"
          cd WubiIME
          gradle assembleRelease --no-daemon -PversionCode=${{ github.run_number }} -PversionName=1.0.${{ github.run_number }} -PfixedKeystore="$HOME/.android/shiyan-fixed.keystore"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: "安键输入法-build-${{ github.run_number }}"
          path: WubiIME/app/build/outputs/apk/release/*.apk
          retention-days: 90
