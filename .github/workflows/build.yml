name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEBUG_KEYSTORE_B64: ""
      SRC_B64: ""
      CONV_B64: ""
      THEMEMANAGER_B64: ""
      SETTINGSACTIVITY_B64: ""
      SYMBOLPANEL_JAVA_B64: "REMOVED"
      WUBIINPUTMETHODSERVICE_JAVA_B64: "REMOVED"
      KEYBOARDVIEW_JAVA_B64: "REMOVED"
      DICTENGINE_JAVA_B64: "REMOVED"
      CANDIDATEVIEW_JAVA_B64: "REMOVED"
      CANDIDATEPAGERVIEW_JAVA_B64: "REMOVED"
    steps:

      - name: Decode source
        run: |
          echo "$SRC_B64" | base64 -d > src.tar.gz && tar xzf src.tar.gz
          echo "$CONV_B64" | base64 -d > /tmp/convert_rime.py
          mkdir -p WubiIME/app/src/main/java/com/wubi/ime/theme
          mkdir -p WubiIME/app/src/main/java/com/wubi/ime/ui
          mkdir -p WubiIME/app/src/main/assets
          echo "$THEMEMANAGER_B64" | base64 -d > WubiIME/app/src/main/java/com/wubi/ime/theme/ThemeManager.java
          find . -name "SettingsActivity.java" -delete
          echo "$SETTINGSACTIVITY_B64" | base64 -d > WubiIME/app/src/main/java/com/wubi/ime/ime/SettingsActivity.java

      - name: Download standard dictionaries
        run: |
          set -e
          mkdir -p WubiIME/app/src/main/assets/dict
          rm -f WubiIME/app/src/main/assets/dict/*.dict
          # 五笔86（rime-wubi 官方，含6万词组编码，与 iRime 同源）
          curl -fsSL "https://raw.githubusercontent.com/rime/rime-wubi/master/wubi86.dict.yaml" -o /tmp/wubi86.yaml
          # 拼音单字：pinyin_simp（简体安卓系），失败回退 luna
          curl -fsSL "https://raw.githubusercontent.com/rime/rime-pinyin-simp/master/pinyin_simp.dict.yaml" -o /tmp/pinyin.yaml \
            || curl -fsSL "https://raw.githubusercontent.com/rime/rime-luna-pinyin/master/luna_pinyin.dict.yaml" -o /tmp/pinyin.yaml
          # 拼音词组：rime-ice base（雾凇，简体高质词组，带正确多音字拼音），用于连打/词组/简拼
          curl -fsSL "https://raw.githubusercontent.com/iDvel/rime-ice/main/cn_dicts/base.dict.yaml" -o /tmp/ice_base.yaml
          # 五笔：官方库自带词组，直接转
          python3 /tmp/convert_rime.py wubi /tmp/wubi86.yaml WubiIME/app/src/main/assets/dict/wubi86.dict
          # 拼音：单字 + 词组(前2万高频)合并，频率归一化统一量纲
          python3 /tmp/convert_rime.py pinyin /tmp/pinyin.yaml /tmp/ice_base.yaml WubiIME/app/src/main/assets/dict/pinyin.dict 20000
          WB=$(wc -l < WubiIME/app/src/main/assets/dict/wubi86.dict)
          PY=$(wc -l < WubiIME/app/src/main/assets/dict/pinyin.dict)
          echo "wubi:$WB pinyin:$PY"
          # 词库体量过小=下载或转换失败，直接让构建失败而非打出残废 APK
          # 拼音含词组+简拼后应≥5万；五笔含词组应≥10万
          if [ "$WB" -lt 100000 ] || [ "$PY" -lt 50000 ]; then echo "词库异常，构建中止"; exit 1; fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          mkdir -p ~/.android
          echo "$DEBUG_KEYSTORE_B64" | base64 -d > ~/.android/debug.keystore
          cd WubiIME
          export VERSION_CODE=${{ github.run_number }}
          export VERSION_NAME="1.0.${{ github.run_number }}"
          gradle assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: "安键输入法-build-${{ github.run_number }}"
          path: WubiIME/app/build/outputs/apk/release/*.apk
          retention-days: 90
