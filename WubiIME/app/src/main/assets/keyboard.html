<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>е®үй”®иҫ“е…Ҙжі•В·жЁЎжӢҹеҷЁ</title>
<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:transparent;display:block;font-family:"PingFang SC","Noto Sans SC","Segoe UI Emoji","Noto Color Emoji","Apple Color Emoji",sans-serif;padding:0;overflow:hidden}
/* еҶ…зҪ®еҪ©иүІ emoji еӯ—дҪ“(COLRv1 зҹўйҮҸпјҢзҰ»зәҝжү“еҢ…иҝӣ assets/fonts/)пјҡж №жІ»е®үеҚ“жңәеһӢзјәеҪ©иүІ emoji
   еӯ—дҪ“йӣҶж—¶еӣһйҖҖеҲ°дҪҺиҙЁеҚ•иүІеӯ—еҪўеҜјиҮҙзҡ„"зІ—зіҷ/еҸ‘жҡ—"гҖӮиӢҘжңәеһӢ WebView еӨӘж—§дёҚж”ҜжҢҒ COLRv1пјҢ
   дјҡйқҷй»ҳеӣһйҖҖеҲ°зі»з»ҹ emoji(дёҺж”№еҠЁеүҚдёҖиҮҙпјҢдёҚдјҡжӣҙзіҹ)гҖӮ */
@font-face{font-family:'KBEmoji';
  src:url('fonts/Noto-COLRv1.ttf') format('truetype');
  font-display:swap;unicode-range:U+1F000-1FAFF,U+2600-27BF,U+2190-21FF,U+2B00-2BFF,U+1F1E6-1F1FF,U+2700-27BF,U+FE00-FE0F,U+1F900-1F9FF,U+2300-23FF}
/* иЎЁжғ…дё“з”ЁпјҡејәеҲ¶иө°еҪ©иүІ emoji еӯ—дҪ“гҖҒдёҚз»§жүҝж–Үеӯ—иүІ(еҪ©иүІemojiдёҚеә”иў« --ktxt жҹ“иүІ)пјҢ
   дҝ®еӨҚе®үеҚ“иЈ…жңәеҗҺ emoji зІ—зіҷеҸ‘жҡ—(еӣһйҖҖеҲ°дҪҺиҙЁеҚ•иүІеӯ—еҪў)зҡ„й—®йўҳ */
.emoji-cell{font-family:'KBEmoji',"Noto Color Emoji","Apple Color Emoji","Segoe UI Emoji",sans-serif!important;
  color:initial!important;-webkit-font-feature-settings:normal;font-variant-emoji:emoji}
/* иЎЁжғ…ж јпјҡеҜ№ж ҮзІҫдҝ®вҖ”вҖ”жүҒе№іж— жҢүй’®еә•пјҢд»…еңҶи§’зӮ№еҮ»еҸҚйҰҲпјҢemoji жӣҙеӨ§жӣҙжё…зҲҪ(дёҚиў«жҢүй’®жёҗеҸҳ/йҳҙеҪұеҺӢжҡ—) */
.emj-cell{height:30px;display:flex;align-items:center;justify-content:center;
  border-radius:9px;cursor:pointer;font-size:23px;line-height:1;padding:0;-webkit-font-smoothing:antialiased;
  background:transparent;transition:background .1s,transform .08s}
.emj-cell:active{background:rgba(0,0,0,0.06);transform:scale(0.9)}

.title{color:#9090b0;font-size:12px;letter-spacing:2px;padding:6px 0 10px}

.editor-wrap{width:100%;max-width:420px;margin-bottom:6px}
.editor-box{
  width:100%;min-height:100px;max-height:180px;overflow-y:auto;
  background:#0d1020;border:1px solid #252545;border-radius:12px;
  padding:12px 14px;color:#e0eaff;font-size:17px;line-height:1.7;
  word-break:break-all;white-space:pre-wrap;
  box-shadow:inset 0 2px 8px rgba(0,0,0,0.4),0 0 0 2px rgba(120,140,255,0.2)
}
.cursor{display:inline-block;width:2px;height:1.1em;background:#6090ff;
  vertical-align:text-bottom;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.sel{background:rgba(100,140,255,0.35);border-radius:2px}
.t-orange .sel{background:rgba(232,96,48,0.3)}
.t-blue .sel{background:rgba(40,120,208,0.3)}
.t-purple .sel{background:rgba(144,48,224,0.3)}
.t-red .sel{background:rgba(200,20,20,0.3)}
.t-green .sel{background:rgba(20,140,60,0.3)}
.t-pink .sel{background:rgba(210,50,150,0.3)}
.t-brown .sel{background:rgba(130,70,20,0.3)}
.t-cyan .sel,.t-white .sel{background:rgba(0,150,190,0.3)}
.t-dark .sel{background:rgba(200,160,20,0.35)}

.ime{width:100%;position:relative;background:linear-gradient(180deg,var(--bg1,#f5ede5),var(--bg2,#ebd5c5))}

.code-bar{display:flex;align-items:center;gap:6px;
  padding:3px 4px 3px 12px;min-height:34px;
  background:linear-gradient(180deg,rgba(255,255,255,0.42),rgba(255,255,255,0.10));   /* дә®зҺ»з’ғпјҡдёҺй”®еёҪеҗҢж—Ҹе…үж„ҹ */
  border-radius:11px 11px 0 0;
  border-top:1px solid rgba(255,255,255,0.5);
  border-bottom:1px solid rgba(0,0,0,0.07);
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.6)}
.t-dark .code-bar{background:linear-gradient(180deg,rgba(255,255,255,0.07),rgba(255,255,255,0.02));border-top-color:rgba(255,255,255,0.12);box-shadow:inset 0 1px 0 rgba(255,255,255,0.08)}
.code-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  color:#7090ff;font-size:15px;font-weight:700;letter-spacing:4px}
/* зј–з Ғж ҸеҶ…зҡ„гҖҢз¬ҰеҸ·/иЎЁжғ…гҖҚеҲҶзұ»жқЎпјҡе·ҰеҸіж»‘еҠЁпјҢеҚ•еҮ»еҲҮжҚўеҲҶзұ»гҖӮејҖеҗҜйқўжқҝж—¶еҸ–д»Јзј–з Ғж–Үеӯ—гҖӮ */
.cat-strip{flex:1;min-width:0;display:flex;align-items:center;gap:3px;height:28px;
  overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;touch-action:pan-x;scrollbar-width:none}
.cat-strip::-webkit-scrollbar{display:none}
.cat-strip.hidden{display:none}
/* иЎЁжғ…еҲҶзұ»(9дёӘ)пјҡеқҮеҲҶй“әж»Ўзј–з Ғж Ҹе…Ёе®ҪгҖҒй—ҙи·қжӢүеҲ°еҸіз«Ҝпјӣз¬ҰеҸ·еҲҶзұ»(еӨҡ)д»ҚеҸҜе·ҰеҸіж»ҡеҠЁ */
.cat-strip.spread{gap:0;justify-content:space-between}
.cat-strip.spread .cat-chip{flex:1 1 0;min-width:0}
.cat-chip{flex:0 0 auto;display:flex;align-items:center;justify-content:center;
  height:24px;padding:0 11px;border-radius:8px;font-size:13px;font-weight:500;line-height:1;
  white-space:nowrap;cursor:pointer;color:var(--ktxt,#5d5048);opacity:0.62;
  transition:background .12s,color .12s,opacity .12s}
.cat-chip.on{opacity:1;color:inherit;font-weight:600;
  background:rgba(0,0,0,0.07);
  box-shadow:none;
  animation:chipOn .24s cubic-bezier(.2,.7,.3,1)}
.t-dark .cat-chip.on{background:rgba(255,255,255,0.13)}
@keyframes chipOn{0%{transform:scale(.88)}55%{transform:scale(1.07)}100%{transform:scale(1)}}
.cat-chip.emo{padding:0 11px;font-size:19px;min-width:44px;height:30px;margin:0}   /* й—ҙи·қдёҺз¬ҰеҸ·еҲҶзұ»дёҖиҮҙ(е®№еҷЁgap:3px)пјҢдҝқз•ҷеӨ§еӯ—еҸ·и§ҰеҢә */
.cat-chip.emo.on{color:inherit;background:rgba(0,0,0,0.07);box-shadow:none}
.t-dark .cat-chip.emo.on{background:rgba(255,255,255,0.13)}
.cat-chip.emo{position:relative}
/* зј–з Ғж ҸиҪЁйҒ“еҶ…зҡ„иҝ·дҪ дё»йўҳзҗғ/жЁЎејҸйЎ№пјҡзӮ№йҖүзӣҙиҫҫ */
.cat-chip.ball{height:30px;padding:0 6px;min-width:34px}
.cat-chip .theme-ball{width:22px;height:22px;flex:0 0 auto;box-shadow:none}   /* #6 й»ҳи®ӨдёҚеёҰйҳҙеҪұ */
.cat-chip.on .theme-ball{box-shadow:0 2px 5px rgba(0,0,0,0.25),inset 0 -2px 4px rgba(0,0,0,0.22),inset 0 1px 2px rgba(255,255,255,0.4)}   /* йҖүдёӯжүҚдјҙйҡҸйҳҙеҪұ */
.cat-chip.ball.on{background:rgba(0,0,0,0.09)}
.t-dark .cat-chip.ball.on{background:rgba(255,255,255,0.15)}
/* гҖҗеә”з”ЁгҖ‘иҪЁйҒ“еҲ—иҪҰпјҡйҳІжҲӘеұҸ=иҪҰеӨҙгҖҒеүӘиҙҙйҡ”зҰ»=иҪҰе°ҫпјҢдёӯй—ҙеә”з”ЁжҳҜиҪҰеҺўпјӣ
   еә•йғЁй“ҒиҪЁ+жһ•жңЁпјҢиҪҰиҪ®жҗӯиҪЁпјҢиҪҰеҺўй—ҙиҒ”иҪҙеҷЁзӣёиҝһпјӣжЁӘж»‘ж—¶ж•ҙеҲ—иҪҰеңЁиҪЁдёҠж»‘еҠЁ */
.cat-strip.train{gap:8px;padding:0 4px 4px;align-items:center}   /* й“ҒиҪЁ/жһ•жңЁе·Іж’ӨпјҡзәҜиғ¶еӣҠеҲ—иҪҰжӣҙжё…зҲҪ */
.cat-chip.car{position:relative;height:26px;padding:0 10px;border-radius:6px;opacity:0.92;font-size:12.5px;
  background:linear-gradient(180deg,rgba(255,255,255,0.78),rgba(255,255,255,0.38));
  border:1px solid rgba(0,0,0,0.15);box-shadow:0 1px 2px rgba(0,0,0,0.13)}
.cat-chip.car-head{border-radius:13px 6px 6px 6px}
.cat-chip.car-tail{border-radius:6px 13px 6px 6px}
/* иҪҰиҪ®/й“ҒиҪЁе·Іж’Ө(е®ҡжЎҲ)пјӣиҒ”иҪҙеҷЁжҒўеӨҚвҖ”вҖ”иҪҰеҺўд№Ӣй—ҙд»ҘзҹӯжқҶзӣёиҝһжҲҗдёҖеҲ— */
.car .coupler{position:absolute;left:-9px;top:50%;margin-top:-1.5px;width:9px;height:3px;border-radius:2px;pointer-events:none;
  background:linear-gradient(180deg,rgba(0,0,0,0.30),rgba(0,0,0,0.44));box-shadow:0 1px 0 rgba(255,255,255,0.25)}
.t-dark .cat-chip.car{background:linear-gradient(180deg,rgba(255,225,120,0.20),rgba(255,225,120,0.08));border-color:rgba(255,220,80,0.30)}
.mode-tag{flex-shrink:0;font-size:10px;padding:2px 7px;border-radius:9px;
  background:rgba(100,130,255,0.15);color:#7090ff;letter-spacing:1px}

.cand-bar{height:48px;display:flex;align-items:center;
  background:linear-gradient(180deg,var(--kbg1,#fbeee4),var(--kbg2,#f2e2d6));overflow:hidden;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.5),inset 0 -1px 0 rgba(0,0,0,0.05)}
.t-dark .cand-bar{box-shadow:inset 0 1px 0 rgba(255,255,255,0.07),inset 0 -1px 0 rgba(0,0,0,0.25)}
.cand-list{flex:1;display:flex;align-items:center;overflow-x:auto;
  overflow-y:hidden;height:100%;gap:2px;padding:0 6px;scrollbar-width:none}
.cand-list::-webkit-scrollbar{display:none}
.cand-item{padding:4px 10px;border-radius:8px;font-size:16px;color:var(--ktxt,#1a1a2e);
  white-space:nowrap;cursor:pointer;height:36px;display:flex;align-items:center;
  flex-shrink:0;transition:background .1s;gap:4px}
.cand-item:first-child{background:var(--ac,#6090ff);color:#fff!important;
  color:#fff;font-weight:500;border:1px solid rgba(100,140,255,0.25)}
.cand-sub{font-size:8px;color:rgba(120,170,255,0.6)}
.cand-more{padding:0 10px;color:rgba(100,140,255,0.55);font-size:18px;cursor:pointer;
  flex-shrink:0;height:100%;display:flex;align-items:center}
.code-hide{flex-shrink:0;display:flex;align-items:center;justify-content:center;
  width:38px;height:30px;cursor:pointer;border-radius:7px;margin-left:4px}
.code-hide:active{background:rgba(0,0,0,0.08)}

.btn-bar{height:48px;display:flex;align-items:center;gap:3px;padding:0 5px;
  background:linear-gradient(180deg,var(--kbg1,#fbeee4),var(--kbg2,#f2e2d6))}

/* е·Ҙе…·ж ҸжҢүй’®пјҡжҹ”иүІзЈЁз ӮеңҶи§’ tileпјҲз»ҹдёҖдё»й”®зӣҳйЈҺж јпјҢеҺ»иҚҜзүҮж„ҹпјү*/
.sball{flex-shrink:0;width:36px;height:34px;border-radius:11px;margin:0;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  position:relative;transition:transform .14s cubic-bezier(.4,0,.2,1);
  background:linear-gradient(180deg,#ffffff,#f3e3d6);
  border:1px solid rgba(150,90,40,0.15);
  box-shadow:0 1px 2px rgba(120,60,20,0.12)}
.sball:active{transform:scale(0.9)}
/* е·Ҙе…·ж ҸжҢүй’®гҖҢжҝҖжҙ»жҖҒгҖҚпјҡз¬ҰеҸ·/иЎЁжғ…/еүӘиҙҙжқҝ/123 йқўжқҝејҖеҗҜж—¶пјҢжҢүй’®е‘ҲзҺ°еҪ“еүҚдё»йўҳиүІеЎ«е……(иҒ”еҠЁеҸҚе·®)пјҢ
   еҜ“зӨәе·ІжҢүдёӢгҖҒеҶҚжҢүдёҖдёӢж”¶еӣһгҖӮй…ҚиүІйҡҸдё»йўҳ(--ac/--acl/--acd)гҖӮ */
.sball.on{background:radial-gradient(circle at 38% 30%,var(--acl,#f8a070),var(--ac,#e86030) 55%,var(--acd,#c03810));
  border-color:transparent;box-shadow:0 2px 7px rgba(180,70,20,0.38),inset 0 1px 1px rgba(255,255,255,0.25)}
.sball.on .sball-text{color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
.sball-text{position:relative;z-index:1;color:var(--acd,#9a4520);font-weight:600;
  font-size:12px}
/* жЁЎејҸй”®(з¬¬дёҖдёӘ)пјҡaccent ејәи°ғ */
#modeBtn{background:radial-gradient(circle at 38% 30%,var(--acl,#f8a070),var(--ac,#e86030) 55%,var(--acd,#c03810));
  border-color:transparent;box-shadow:0 2px 6px rgba(180,70,20,0.35)}
#modeBtn .sball-text{color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
/* еүӘиҙҙжқҝзҗғпјҡе®Ңе…ЁеӨҚеҲ»дё»йўҳйўңиүІзҗғ(themeBtn)зҡ„йҮүз“·иҙЁж„ҹ(иүІйҡҸдё»йўҳ var)пјҢеҶҚеҸ еҠ "еҶ…ж ё"еЎ«е……вҖ”вҖ”еҜ“зӨәзҗғеҶ…иЈ…зқҖеҶ…е®№пјҢеҢәеҲ«дәҺз©әзҡ„йўңиүІзҗғгҖӮ */
/* (v12) еүӘиҙҙжқҝзҗғе·Іж’Өпјҡе…ҘеҸЈж”№дёәж–Үеӯ—жҢүй’®[еә”з”Ё]пјҢдёҺ[з¬ҰеҸ·][иЎЁжғ…]дёҖиҮҙ */

/* дё»йўҳзҗғпјҡе”ҜдёҖдҝқз•ҷзҡ„йҷ¶з“·еңҶзҗғпјҲдҪңе“ҒзүҢзӮ№зјҖпјү*/
.theme-ball{width:34px;height:34px;border-radius:50%;position:relative;overflow:visible;
  box-shadow:0 3px 10px rgba(0,0,0,0.30),
             inset 0 -3px 6px rgba(0,0,0,0.30),
             inset 0 2px 3px rgba(255,255,255,0.25)}

/* дё»йўҳйўңиүІзҗғ вҖ” йҮүз“·В·йҮ‘еұһйҮүйқўпјҲй«ҳжё©йҮүзғ§иҙЁж„ҹпјҡйЎ¶йғЁејәеҸҚе…үгҖҒйҮүеұӮдёӢжІүгҖҒеә•зјҳжҡ—йҮүпјү*/
.theme-ball{background:
  radial-gradient(circle at 50% 16%,rgba(255,255,255,0.95) 0%,rgba(255,255,255,0) 24%),
  radial-gradient(circle at 50% 52%,#f0843a 0%,#d8500e 52%,#a8420f 100%);
  box-shadow:0 4px 9px rgba(150,60,20,0.34),0 1px 4px rgba(0,0,0,0.22),
             inset 0 -3px 6px rgba(120,55,20,0.30),inset 0 2px 3px rgba(255,255,255,0.45)}
/* йҮүйқўйЎ¶е…үпјҡжЁӘеҗ‘жҹ”е…үеёҰпјҲйҮ‘еұһйҮүзҡ„й«ҳеҸҚе…үе…ій”®пјҢйқһзҺ»з’ғй”җзӮ№пјү*/
.theme-ball::after{content:'';position:absolute;top:9%;left:26%;
  width:48%;height:22%;border-radius:50%;
  background:linear-gradient(180deg,rgba(255,255,255,0.95),rgba(255,255,255,0));
  transform:none;filter:none}
/* еә•зјҳйҮүеұӮеҸҚе…үпјҲйҮүж–ҷдёӢжІүзҡ„з»Ҷеҫ®еӣһе…үпјү*/
.theme-ball::before{content:'';position:absolute;bottom:8%;left:50%;
  width:30%;height:12%;border-radius:50%;margin-left:-15%;
  background:radial-gradient(ellipse,rgba(255,200,160,0.4) 0%,rgba(255,200,160,0) 70%);
  transform:none}
.theme-ball.blue{background:
  radial-gradient(circle at 50% 16%,rgba(255,255,255,0.95) 0%,rgba(255,255,255,0) 24%),
  radial-gradient(circle at 50% 52%,#3a8ce8 0%,#1058c8 52%,#1a44b0 100%);
  box-shadow:0 4px 9px rgba(0,60,200,0.34),0 1px 4px rgba(0,0,0,0.22),
             inset 0 -3px 6px rgba(30,50,120,0.30),inset 0 2px 3px rgba(255,255,255,0.45)}
.theme-ball.purple{background:
  radial-gradient(circle at 50% 16%,rgba(255,255,255,0.95) 0%,rgba(255,255,255,0) 24%),
  radial-gradient(circle at 50% 52%,#b658f0 0%,#8a18e8 52%,#6a30b0 100%);
  box-shadow:0 4px 9px rgba(110,0,220,0.34),0 1px 4px rgba(0,0,0,0.22),
             inset 0 -3px 6px rgba(90,40,130,0.30),inset 0 2px 3px rgba(255,255,255,0.45)}
.theme-ball.red{background:
  radial-gradient(circle at 50% 16%,rgba(255,255,255,0.95) 0%,rgba(255,255,255,0) 24%),
  radial-gradient(circle at 50% 52%,#e84a4a 0%,#cc1414 52%,#a02828 100%);
  box-shadow:0 4px 9px rgba(180,0,0,0.34),0 1px 4px rgba(0,0,0,0.22),
             inset 0 -3px 6px rgba(150,40,40,0.30),inset 0 2px 3px rgba(255,255,255,0.45)}
.theme-ball.green{background:
  radial-gradient(circle at 50% 16%,rgba(255,255,255,0.95) 0%,rgba(255,255,255,0) 24%),
  radial-gradient(circle at 50% 52%,#3ac868 0%,#089838 52%,#0a7838 100%);
  box-shadow:0 4px 9px rgba(0,130,30,0.34),0 1px 4px rgba(0,0,0,0.22),
             inset 0 -3px 6px rgba(20,110,55,0.30),inset 0 2px 3px rgba(255,255,255,0.45)}
.theme-ball.pink{background:
  radial-gradient(circle at 50% 16%,rgba(255,255,255,0.95) 0%,rgba(255,255,255,0) 24%),
  radial-gradient(circle at 50% 52%,#f050b0 0%,#d82090 52%,#b03080 100%);
  box-shadow:0 4px 9px rgba(190,10,120,0.34),0 1px 4px rgba(0,0,0,0.22),
             inset 0 -3px 6px rgba(150,50,110,0.30),inset 0 2px 3px rgba(255,255,255,0.45)}
.theme-ball.brown{background:

<script>
// ===== KV жҢҒд№…еұӮпјҡlocalStorage е…ЁйқўзҰҒз”Ё(жөҸи§ҲеҷЁзј“еӯҳжҠҖжңҜпјҢжё…зј“еӯҳ/з®Ўе®¶дјҳеҢ–еҚідёўеӨұпјҢжң¬иҪҜд»¶зҰҒз”Ё)гҖӮ
//   зңҹиә« = Java жЎҘ AES-256-GCM еҠ еҜҶж–Үд»¶(kbprefs.encпјҢKeystore зЎ¬д»¶еҜҶй’Ҙ)пјҡ
//   еҗҜеҠЁеҗҢжӯҘиҪҪе…ҘеҶ…еӯҳ вҶ’ иҜ»=еҶ…еӯҳеҚіеҸ– вҶ’ еҶҷ=еҶ…еӯҳеҚіж”№+200msйҳІжҠ–иҗҪзӣҳ вҶ’ ж”¶й”®зӣҳ/зҰ»еұҸејәеҲ¶ flushгҖӮ
//   ж— жЎҘ(жөҸи§ҲеҷЁејҖеҸ‘и°ғиҜ•)жүҚеӣһйҖҖ localStorageгҖӮ=====
const KV=(function(){
  const hasPW=()=>{ try{ return typeof AndroidPW!=='undefined' && !!AndroidPW.saveAppData && !!AndroidPW.loadAppData; }catch(e){ return false; } };
  const _ls=(()=>{ try{ return window.localStorage; }catch(e){ return null; } })();
  let mem={}, dirty=false, timer=null;
  // еҗҜеҠЁиҪҪе…ҘпјҡжЎҘж–Үд»¶дёәе”ҜдёҖзңҹжәҗпјӣжЎҘж–Үд»¶дёәз©әдҪҶж—§ localStorage жңүж•°жҚ® вҶ’ дёҖж¬ЎжҖ§иҝҒз§»иҝӣжЎҘ
  try{
    if(hasPW()){
      const s=AndroidPW.loadAppData('kbprefs');
      if(s){ mem=JSON.parse(s)||{}; }
      else if(_ls){ for(let i=0;i<_ls.length;i++){ const k=_ls.key(i); mem[k]=_ls.getItem(k); } dirty=true; }
    } else if(_ls){ for(let i=0;i<_ls.length;i++){ const k=_ls.key(i); mem[k]=_ls.getItem(k); } }
  }catch(e){ mem={}; }
  function persist(){
    if(!dirty) return;
    try{
      if(hasPW()){ AndroidPW.saveAppData('kbprefs', JSON.stringify(mem)); dirty=false; }
      else if(_ls){ for(const k in mem){ try{_ls.setItem(k,mem[k]);}catch(e){} } dirty=false; }
    }catch(e){}
  }
  function schedule(){ if(timer) return; timer=setTimeout(()=>{ timer=null; persist(); },200); }
  const api={
    get(k){ const v=mem[k]; return v===undefined?null:v; },
    set(k,v){ mem[k]=String(v); dirty=true; schedule(); },
    remove(k){ if(k in mem){ delete mem[k]; dirty=true; schedule(); } },
    flush(){ if(timer){ clearTimeout(timer); timer=null; } persist(); }
  };
  // зҰ»еұҸ/йҡҗи—ҸејәеҲ¶иҗҪзӣҳпјҡйҳІжҠ–жңӘеҲ°е°ұиў«жқҖд№ҹдёҚдёў
  try{
    document.addEventListener('visibilitychange',()=>{ if(document.hidden) api.flush(); });
    window.addEventListener('pagehide',()=>api.flush());
  }catch(e){}
  return api;

function addClip(txt){
  if(!txt || !txt.trim()) return;

//   еңЁеӨҚеҲ¶/еүӘеҲҮеҗҺгҖҒжү“ејҖеүӘиҙҙйқўжқҝж—¶гҖҒй”®зӣҳиҺ·еҫ—з„ҰзӮ№ж—¶йғҪдё»еҠЁжӢүеҸ– Android.getClipboardAll() еҗҲе№¶гҖӮ
function syncPrivClips(refreshUI){
  try{
    if(typeof Android==='undefined' || !Android.getClipboardAll) return;
    const a=JSON.parse(Android.getClipboardAll()||'[]');
    if(!Array.isArray(a) || !a.length) return;
    let changed=false;
    // Java еҲ—иЎЁжңҖж–°еңЁеүҚпјҡеҖ’еәҸйҖҗжқЎ unshiftпјҢжңҖз»ҲйЎәеәҸдёҺ Java дёҖиҮҙдё” JS зӢ¬жңүжқЎзӣ®дҝқз•ҷеңЁеҗҺ
    for(let i=a.length-1;i>=0;i--){
      const t=a[i]; if(!t || !String(t).trim()) continue;
      const j=clips.indexOf(t);
      if(j===0 && i===0) continue;
      if(j>=0) clips.splice(j,1);
      clips.unshift(t); changed=true;
    }
    while(clips.length>50) clips.pop();
    if(changed){
      saveClips();
      if(refreshUI){
        const p=document.getElementById('clipPanel');
        if(p && !p.classList.contains('hidden')) refreshClip();
      }
    }
  }catch(e){}
}

    //   й…ҚеҗҲ Java дҫ§еҸ‘й”®еүҚиҫ№з•ҢеҶ…жҹҘпјҢе…үж ҮеҲ°ж–ҮйҰ–/жң«еҝ…зЁізЁіеҒңй©»пјҢз»қдёҚж»‘дёўгҖӮ
    if(tpAccum>24)tpAccum=24; if(tpAccum<-24)tpAccum=-24;

    //   _tpHitR й”ҒпјҡдёҖж—Ұжң¬ж¬Ўж»‘еҠЁжҺўеҲ°ж–Үжң«пјҢиҜҘж–№еҗ‘еҗҺз»ӯжӯҘдёҚеҶҚеҸ‘й”®(е…ңеә•е®ҝдё»й”®дәӢд»¶ејӮжӯҘеӨ„зҗҶе»¶иҝҹгҖҒcursorAtBoundary иҜ»еҲ°ж—§дҪҚзҡ„зӘ—еҸЈ)пјҢзӣҙеҲ°еҸҚеҗ‘и§Јй”ҒгҖӮ
    if(typeof _renameBuf!=='undefined'&&_renameBuf!==null){ tpAccum=0; return; }   // йҮҚе‘ҪеҗҚз„ҰзӮ№й“Ғй”Ғпјҡи§ҰжҺ§жқЎдёҚеҠЁе®ҝдё»е…үж Ү
    while(tpAccum>=6){

    while(tpAccum<=-6){

        Android.moveCursor(0,false);
      } else { if(tB.length>0)moveCur(-1); else {tpAccum=0;break;} }

let _audioCtx = null;
let soundOn = true;
try { const sv=KV.get('kbSound'); if(sv!==null) soundOn=(sv==='1'); } catch(e){}
function _ensureAudio(){
  if(!_audioCtx){ try{ _audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ _audioCtx=null; } }
  return _audioCtx;
}
function playClick() {
  if(!soundOn) return;
  const ac=_ensureAudio(); if(!ac) return;
  try {
    const t=ac.currentTime;
    // 1) дҪҺйў‘"thock"дё»дҪ“пјҡдёүи§’жіў ~180Hz еҝ«йҖҹдёӢж»‘пјҢжЁЎжӢҹй»‘иҪҙиҗҪеә•
    const osc=ac.createOscillator(), g=ac.createGain();
    osc.type='triangle';
    osc.frequency.setValueAtTime(190,t);
    osc.frequency.exponentialRampToValueAtTime(95,t+0.05);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.10,t+0.004);   // жһҒеҝ«иө·йҹі
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.06);  // еҝ«йҖҹиЎ°еҮҸ
    osc.connect(g); g.connect(ac.destination);
    osc.start(t); osc.stop(t+0.07);
    // 2) зҹӯеҷӘеЈ°"е’”"еұӮпјҡжЁЎжӢҹжҢүй”®жңәжў°жҺҘи§Ұ
    const N=Math.floor(ac.sampleRate*0.012);
    const buf=ac.createBuffer(1,N,ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<N;i++){ d[i]=(Math.random()*2-1)*Math.pow(1-i/N,2.5); }
    const src=ac.createBufferSource(); src.buffer=buf;
    const ng=ac.createGain(); ng.gain.value=0.05;
    src.connect(ng); ng.connect(ac.destination); src.start(t);
  } catch(e) {}
}
// ===== #11 й’ўзҗҙйҹіж•Ҳзі»з»ҹпјҡи®©иҫ“е…ҘдјҙйҡҸеЈ°йҹідә«еҸ— =====
//   дё»й”®зӣҳеүҚдёӨиЎҢ19й”®(QWERTYUIOP+ASDFGHJKL)д»Һе·ҰеҲ°еҸі=дҪҺвҶ’дёӯвҶ’й«ҳйҹіеҢә(CеӨ§и°ғзҷҪй”® C3вҶ’G5)пјҢ
//   з¬¬3иЎҢ ZXCVBNM=7дёӘзҷҫжҗӯе’ҢејҰ(CВ·DmВ·EmВ·FВ·GВ·AmВ·G7)пјӣ
//   д№қе®« 2~9=do re mi fa sol la si й«ҳdo(C4вҶ’C5)пјҢ1=Cе’ҢејҰгҖҒ0=Gе’ҢејҰгҖӮ
const _midiF=(m)=>440*Math.pow(2,(m-69)/12);
function playPiano(midi, vel){
  if(!soundOn) return;
  const ac=_ensureAudio(); if(!ac) return;
  try{
    const t=ac.currentTime, f=_midiF(midi), v=(vel==null?0.16:vel);
    const out=ac.createGain(); out.gain.value=1;
    // йҹій«ҳиҝҪйҡҸдҪҺйҖҡпјҡй«ҳйҹіжӣҙдә®гҖҒдҪҺйҹіжӣҙйҶҮ
    const lp=ac.createBiquadFilter(); lp.type='lowpass';
    lp.frequency.value=Math.min(9000, f*7); lp.Q.value=0.5;
    out.connect(lp); lp.connect(ac.destination);
    // 4и°җжіўеҠ жҖ§ + иҪ»еҫ®еӨұи°җ(inharmonicity)вҖ”вҖ”й’ўзҗҙејҰеҲҡжҖ§еёҰжқҘзҡ„йҮ‘еұһе…үжіҪ
    const H=[[1,1.0],[2.001,0.42],[3.004,0.18],[4.009,0.09]];
    H.forEach(([r,a],i)=>{
      const o=ac.createOscillator(), g=ac.createGain();
      o.type='sine'; o.frequency.value=f*r;
      const A=v*a;
      g.gain.setValueAtTime(0.0001,t);
      g.gain.exponentialRampToValueAtTime(A, t+0.006);           // й”ӨеҮ»жһҒеҝ«иө·йҹі
      g.gain.exponentialRampToValueAtTime(A*0.28, t+0.10);       // еҝ«иЎ°ж®ө
      g.gain.exponentialRampToValueAtTime(0.0001, t+1.05-i*0.12);// й•ҝе°ҫ(й«ҳж¬Ўи°җжіўе…Ҳж•Ј)
      o.connect(g); g.connect(out);
      o.start(t); o.stop(t+1.1);
    });
    // й”ӨеҮ»еҷӘеЈ°зһ¬жҖҒпјҡз»ҷ"еҸ®"еҠ дёҠ"е—’"зҡ„зҗҙж§ҢиҙЁж„ҹ
    const N=Math.floor(ac.sampleRate*0.010);
    const buf=ac.createBuffer(1,N,ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<N;i++){ d[i]=(Math.random()*2-1)*Math.pow(1-i/N,3); }
    const src=ac.createBufferSource(); src.buffer=buf;
    const ng=ac.createGain(); ng.gain.value=v*0.22;
    const hp=ac.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=Math.max(800,f*1.5);
    src.connect(ng); ng.connect(hp); hp.connect(out); src.start(t);
  }catch(e){}
}
function playChord(midis){
  if(!soundOn) return;
  // иҪ»еҫ®зҗ¶йҹій”ҷдҪҚ(6ms/йҹі)вҖ”вҖ”зңҹе®һжүӢеј№иҙЁж„ҹпјҢжҜ”жңәжў°йҪҗеҸ‘жӣҙжӮҰиҖі
  midis.forEach((m,i)=>setTimeout(()=>playPiano(m,0.11),i*6));
}

// Qеј№ж°”жіЎйҹіж•ҲпјҡзҹӯдҝғдёҠжү¬ sine е•ійҹі(420вҶ’980Hz)пјҢз”ЁдәҺ[з¬ҰеҸ·][иЎЁжғ…]еҲҶзұ»иғ¶еӣҠиў«йҖүдёӯж—¶зҡ„еҸҚйҰҲ
 function playPop(){

function _edgeSpring(el, axis){
  const prop = axis==='x' ? 'translateX' : 'translateY';

  const atEnd  =()=> axis==='x' ? el.scrollLeft+el.clientWidth >=el.scrollWidth -1
                                : el.scrollTop +el.clientHeight>=el.scrollHeight-1;
  const pos=e=> axis==='x' ? e.touches[0].clientX : e.touches[0].clientY;
  const apply=()=>{ raf=0; el.style.transform = pull ? (prop+'('+pull+'px)') : ''; };
  const release=()=>{
    if(!engaged && !pull) return;
    engaged=false; pull=0;
    el.style.transition='transform .55s cubic-bezier(.22,1.9,.36,.94)';   // Qеј№еӣһдҪҚпјҡжӣҙеӨ§иҝҮеҶІ+жҹ”жҖ§йңҮиҚЎж”¶е°ҫ
    el.style.transform='';
    setTimeout(()=>{ el.style.transition=''; }, 570);
  };
  el.addEventListener('touchstart',e=>{ p0=pos(e); engaged=false; pull=0; el.style.transition=''; },{passive:true});
  el.addEventListener('touchmove',e=>{
    const d=pos(e)-p0;
    if(!engaged){
      if(atStart() && d>4) engaged=1;         // иө·е§Ӣзјҳз»§з»ӯеӨ–жӢү
      else if(atEnd() && d<-4) engaged=-1;    // жң«зјҳз»§з»ӯеӨ–жӢү
      else return;                            // жӯЈеёёж»ҡеҠЁеҢәй—ҙпјҡе®Ңе…ЁдёҚжҺҘз®Ў
      p0=pos(e);                              // д»Ҙе…Ҙз•ҢзӮ№дёәйӣ¶дҪҚпјҢи·ҹжүӢдёҚи·іеҸҳ
      return;
    }
    const raw=(pos(e)-p0)*engaged;
    if(raw<=0){ engaged=false; pull=0; if(!raf) raf=requestAnimationFrame(apply); return; }   // жӢүеӣһвҶ’дәӨиҝҳж»ҡеҠЁ
    pull=Math.min(84, raw*0.34)*engaged;      // йҳ»е°ј+дёҠйҷҗ

  el.addEventListener('touchcancel',release,{passive:true});
}

let _dasRaf=0, _dasEl=null, _dasY=0;
function dragAutoScroll(scroller, y){
  _dasEl=scroller; _dasY=y;
  if(_dasRaf) return;
  const loop=()=>{
    _dasRaf=0;
    if(!_dasEl) return;
    const r=_dasEl.getBoundingClientRect(), Z=40;
    let v=0;
    if(_dasY<r.top+Z) v=-(4+12*Math.min(1,(r.top+Z-_dasY)/Z));

//   (еҺҹз”ҹж»ҡеҠЁжқЎиў«йҡҗи—ҸпјӣиҮӘз»ҳжқЎжҢӮеңЁзҲ¶е®№еҷЁдёҠдёҚйҡҸеҶ…е®№ж»ҡиө°пјҢзҲ¶е®№еҷЁиҮӘеҠЁиЎҘ position:relative)
function attachScrollHint(el, axis){
  if(!el || el._hint) return; el._hint=true;

  const cs=getComputedStyle(parent);

  const isY=(axis!=='x');
  bar.style.cssText='position:absolute;pointer-events:none;z-index:60;border-radius:2px;'+
    'background:linear-gradient(180deg,var(--acl,#eb976f),var(--ac,#c75f33));opacity:0;transition:opacity .28s;'+
    (isY?'right:2px;width:3px;top:0;':'bottom:1px;height:3px;left:0;');
  parent.appendChild(bar);
  let fade=null;
  const upd=()=>{
    const total=isY?el.scrollHeight:el.scrollWidth, view=isY?el.clientHeight:el.clientWidth;
    if(total<=view+2){ bar.style.opacity='0'; return; }
    const frac=view/total, pos=(isY?el.scrollTop:el.scrollLeft)/(total-view);
    const len=Math.max(18, view*frac);
    const off=el.offsetTop, offX=el.offsetLeft;
    if(isY){ bar.style.height=len+'px'; bar.style.top=(off+pos*(view-len))+'px'; }
    else   { bar.style.width =len+'px'; bar.style.left=(offX+pos*(view-len))+'px'; }
    bar.style.opacity='0.55';
    if(fade) clearTimeout(fade);
    fade=setTimeout(()=>{ bar.style.opacity='0'; }, 600);
  };
  el.addEventListener('scroll',upd,{passive:true});
  el.addEventListener('touchstart',upd,{passive:true});
}

// ===== fling зў°иҫ№еӣһеј№пјҡжғҜжҖ§ж»ҡеҠЁ(жүӢжҢҮе·ІзҰ»ејҖ)еҶІеҲ°з«ҜзӮ№ж—¶жҢүдҪҷйҖҹеј№жҖ§иҝҮеҶІеӣһдҪҚ =====
//   _edgeSpring еҸӘжҺҘз®Ў"жүӢжҢҮжҢүдҪҸз»§з»ӯжӢү"пјӣжӯӨеӨ„иЎҘдёҠ"з”©еҠЁжғҜжҖ§ж’һеўҷ"зҡ„йӮЈдёҖдёӢеј№жҖ§гҖӮ
function attachFlingBounce(el, axis){
  if(!el || el._fling) return; el._fling=true;
  const isY=(axis!=='x');
  const prop=isY?'translateY':'translateX';
  let lastP=0,lastT=0,v=0,touching=false,bouncing=false;
  const posOf=()=>isY?el.scrollTop:el.scrollLeft;
  const maxOf=()=>isY?(el.scrollHeight-el.clientHeight):(el.scrollWidth-el.clientWidth);

  el.addEventListener('touchend',()=>{ touching=false; },{passive:true});
  el.addEventListener('scroll',()=>{
    const now=performance.now(), p=posOf();
    if(lastT){ const dt=now-lastT; if(dt>0&&dt<120) v=(p-lastP)/dt; }
    lastP=p; lastT=now;

    if(p<=0 && v<-0.25) dir=1;          // еҶІеҲ°иө·е§Ӣз«Ҝ

    el.style.transition='none';

    requestAnimationFrame(()=>{ requestAnimationFrame(()=>{
      el.style.transition='transform .55s cubic-bezier(.22,1.9,.36,.94)';   // Qеј№еӣһдҪҚпјҡжҹ”жҖ§йңҮиҚЎ
      el.style.transform='';
      setTimeout(()=>{ el.style.transition=''; bouncing=false; v=0; }, 570);
    });});
  },{passive:true});
}

function addKeyListenersOnce(div, fn) {
  // дҝ®йҘ°й”®дё“з”ЁпјҡеҸӘи§ҰеҸ‘дёҖж¬ЎпјҢж— й•ҝжҢүйҮҚеӨҚпјҢжңүйҹіж•Ҳ
  let _touched=false;
  const start = e => { e.preventDefault(); _touched=true; playClick(); fn(); div.classList.add('pressed'); };
  const stop  = () => { div.classList.remove('pressed'); setTimeout(()=>{_touched=false;},600); };
  div.addEventListener('touchstart',  start, {passive:false});
  div.addEventListener('touchend',    stop,  {passive:true});
  div.addEventListener('touchcancel', stop,  {passive:true});
  div.addEventListener('mousedown', e => { e.preventDefault(); if(_touched)return; playClick(); fn(); });
  div.addEventListener('mouseup',    stop);
  div.addEventListener('mouseleave', stop);
}

function t9UpdateCode(cands){
  const el=document.getElementById('codeText');
  if(!el) return;
  if(!t9code){ el.textContent=''; if(typeof syncCodeBar==='function') syncCodeBar(); return; }

  // еҖҷйҖүеҸҜиғҪжҳҜжӣҙй•ҝзј–з Ғзҡ„еүҚзјҖеҢ№й…Қ(жҢү1й”®жҹҘеҮә"hai"зӯү3еӯ—жҜҚйҹіиҠӮ)пјҢзӣҙжҺҘжҳҫзӨәдјҡи®©зј–з Ғж Ҹ
  // еҮӯз©әеӨҡеҮәжңӘжҢүзҡ„еӯ—жҜҚгҖӮеҸӘеңЁеҖҷйҖүжӢјйҹій•ҝеәҰ==е·ІжҢүй”®ж•°ж—¶йҮҮз”Ёе…¶жӢјеҶҷпјҢеҗҰеҲҷжҢүе·ІжҢүж•°еӯ—
  // еҸ–еҗ„жЎЈйҰ–еӯ—жҜҚзІ—жӢјпјҢдҝқиҜҒ"жҢүеҮ дёӘй”®е°ұжҳҫзӨәеҮ дёӘеӯ—жҜҚ"гҖӮ
  const n=t9code.length;
  let py='';
  if(cands && cands.length && cands[0].c && cands[0].c.length===n){ py=cands[0].c; }
  if(!py){ py=t9code.split('').map(d=>(T9_GROUPS[d]||'').charAt(0)||'').join(''); }

}
let _t9QueryTimer=null;
function t9press(d){

  if(t9NumMode){ commit(d); return; }   // Num зҒҜдә®пјҡзӣҙжҺҘдёҠеұҸзәҜж•°еӯ—
  // зҒҜзҒӯ(жӢјйҹіжЁЎејҸ)пјҡ1 ж— еӯ—жҜҚдёҚеҸӮдёҺжӢјйҹіз»„еҗҲпјҲжҢү1жҳҜдё»й”®зӣҳеҲҮжҚўпјҢе·ІеңЁжҢүй”®еӨ„зҗҶпјү
  if(d==='1'){ return; }
  // е…ій”®пјҡи®Ўз ҒеҚіж—¶зҙҜеҠ пјҢз»қдёҚдёўз ҒпјӣеҖҷйҖүжҹҘиҜўеҺ»жҠ–еҗҲе№¶пјҢйҒҝе…Қиҝһжү“ж—¶жҜҸй”®еҗҢжӯҘеӯ—е…ёжҹҘиҜўйҳ»еЎһдё»зәҝзЁӢгҖӮ

function t9commitFirst(){

// T9 еҖҷйҖүпјҡзңҹжңәиө° Java зңҹе®һиҜҚеә“(еҗ«иҝһжү“)пјҢжЁЎжӢҹеҷЁеӣһйҖҖеҲ°еҶ…еөҢ PINYIN
function t9Cands(code,maxN){
  if(!code) return [];
  let out=null;
  if(typeof Android!=='undefined' && Android.queryT9){
    try{
      const r=JSON.parse(Android.queryT9(code)||'[]');
      if(r&&r.length) out=r.slice(0,maxN);
    }catch(e){}
  }
  if(!out) out=t9CandsLocal(code,maxN);
  // з”ЁжҲ·иҜҚеә“еҜ№д№қе®«еҗҢж ·з”ҹж•Ҳпјҡй”®=ж•°еӯ—дёІпјҲCtrl+еҖҷйҖүзҡ„еүҚзҪ®/еҲ йҷӨеҚіжҢүжӯӨй”®иҗҪеә“пјү
  try{ out=applyUserDict(out, code); }catch(e){}
  return out;
}
// жЁЎжӢҹеҷЁжң¬ең°еӣһйҖҖпјҲеҶ…еөҢе°ҸиҜҚеә“пјҢд»…дҫӣжөҸи§ҲеҷЁйў„и§Ҳпјү
function t9CandsLocal(code,maxN){
  if(!code) return [];
  const groups=code.split('').map(d=>T9_GROUPS[d]||'');
  if(groups.some(g=>!g)) return [];
  const seen=new Set(), out=[];
  for(const key of Object.keys(PINYIN)){
    if(key.length<groups.length) continue;
    let ok=true;
    for(let i=0;i<groups.length;i++){ if(groups[i].indexOf(key[i])<0){ ok=false; break; } }
    if(!ok) continue;
    for(const c of PINYIN[key]){
      if(!seen.has(c.w)){ seen.add(c.w); out.push({w:c.w, f:c.f, c:key}); if(out.length>=maxN*3) break; }
    }
    if(out.length>=maxN*3) break;
  }
  out.sort((a,b)=>(b.f||0)-(a.f||0));
  return out.slice(0,maxN);
}

// дёҖй”®дёӨеҢәйҖҡз”Ёз»‘е®ҡпјҡжҢүдёӢеқҗж Үе®ҡеҢә(е·ҰеҚҠ/еҸіеҚҠ)гҖҒжҢүдёӢеҚіеҮәеӯ—пјӣй•ҝжҢүиҜҘеҚҠеҢә=иҝһз»ӯиҫ“еҮәпјӣж»‘иө°еҸ–ж¶ҲиҝһеҸ‘гҖӮ
//   ж №жІ» [. X]/[- +] е·ҰеҸіеҚ•еҮ»дёҚеҮҶпјҡдёҚеҶҚйқ й•ҝжҢүеҲҮжҚўеӯ—з¬ҰпјҢиҖҢжҳҜе’ҢзЎ¬д»¶й”®дёҖж ·жҢүе“ӘеҚҠеҮәе“ӘдёӘгҖӮ
function bindDualZone(el, leftFn, rightFn){
  let _t=null,_r=null,_sx=0,_sy=0;
  const zone=x=>{ const r=el.getBoundingClientRect(); return (x-r.left)>r.width/2; };
  const hl=(right,on)=>{ const z=el.querySelector(right?'.delz-r':'.delz-l'); if(z) z.style.background=on?'rgba(0,0,0,0.10)':''; };
  const clear=()=>{ clearTimeout(_t); clearInterval(_r); _t=_r=null; el.classList.remove('pressed'); hl(false,false); hl(true,false); };
  const start=(x,y)=>{
    _sx=x; _sy=y;
    const rt=zone(x); const fn=rt?rightFn:leftFn;
    el.classList.add('pressed'); hl(rt,true);
    playClick(); fn();                                   // жҢүдёӢеҚіеҮәпјҢйӣ¶е»¶иҝҹ
    _t=setTimeout(()=>{ _r=setInterval(()=>{ playClick(); fn(); },70); },420);   // й•ҝжҢүиҜҘеҚҠеҢә=иҝһз»ӯиҫ“еҮә
  };
  el.addEventListener('touchstart',e=>{ e.preventDefault(); start(e.touches[0].clientX,e.touches[0].clientY); },{passive:false});
  el.addEventListener('touchmove',e=>{ const t=e.touches[0]; if(Math.abs(t.clientX-_sx)>26||Math.abs(t.clientY-_sy)>26) clear(); },{passive:true});
  el.addEventListener('touchend',e=>{ e.preventDefault(); clear(); },{passive:false});
  el.addEventListener('touchcancel',clear,{passive:true});
  el.addEventListener('mousedown',e=>{ e.preventDefault(); start(e.clientX,e.clientY); });
  el.addEventListener('mouseup',clear);
  el.addEventListener('mouseleave',clear);
}

function calcDisplayExpr(seal){
  const s=calcExpr;
  if(calcPrepend){ return (calcPrefixBuf||'')+'в–ё'+(s||'0'); }   // еүҚзҪ®жҖҒпјҡеүҚзјҖв–ё(ж—§ејҸ)пјҢв–ёзӨәж„ҸжҸ’е…ҘзӮ№
  if(!s) return '0';
  if(s.indexOf('%')<0) return s;
  let out=''; let i=0;
  while(i<s.length){
    const c=s[i];
    if(c==='%'){
      // % еҗҺзҙ§и·ҹзҡ„ж•°еӯ—дёІ(еҸҜеҗ«е°Ҹж•°зӮ№)
      let j=i+1;
      while(j<s.length && (s[j]>='0'&&s[j]<='9' || s[j]==='.')) j++;
      const num=s.slice(i+1,j);          // % еҗҺйқўзҡ„ж•°еӯ—пјҢеҰӮ "20.22"
      // ж•°еӯ—еӨ№еңЁ ( дёҺ % д№Ӣй—ҙпјӣеӣўеҗҺиҝҳжңүеӯ—з¬ҰгҖҒжҲ–ејәеҲ¶ж”¶еҸЈ(=/дёҠеұҸ)еҲҷж”¶жӢ¬
      out += '(' + num + '%' + ((j<s.length||seal) ? ')' : '');

  }
  return out;
}

    //   дёҚеҫ—дёўд»»дҪ•жҳҫзӨәе…ғзҙ пјҡз”Ё calcDisplayExpr() иҖҢйқһзәҜ calcExprпјҢж•… 85+100(20.22%)=105.32гҖӮ

    calcExpr+=k; // ж•°еӯ—жҲ– .

// #11 е®һж—¶йў„з®—пјҡжҜҸж¬Ўиҫ“е…ҘеҗҺиҮӘеҠЁз®—еҮәдёӯй—ҙз»“жһңжҳҫзӨәпјҲдёҚйңҖжҢү=пјү
function calcLive(){

// е®үе…ЁиЎЁиҫҫејҸжұӮеҖјпјҡж”ҜжҢҒ + - Г— Г· % дёҺдјҳе…Ҳзә§пјҢж—  evalгҖӮиҜҚжі•вҶ’%жҠҳеҸ вҶ’shunting-yardвҶ’жұӮеҖј
// зҷҫеҲҶеҸ·и§„еҲҷпјҲиҙўеҠЎејҸВ·дҫқйҷ„е·Ұж•°В·жҲҗеӣўдјҳе…Ҳзә§жңҖй«ҳпјүпјҡ
//   "ж•°%" иЎЁзӨәиҜҘж•°/100 зҡ„жҜ”дҫӢпјӣе®ғеҺ»д№ҳзҙ§йӮ»е·Ұдҫ§пјҲйҡ”дёҖдёӘиҝҗз®—з¬Ұпјүзҡ„йӮЈдёӘж•°пјҢе…Ҳз»“з®—жҲҗе…·дҪ“еҖјгҖӮ
//   + - ж—¶пјҡN% вҶ’ е·Ұж•°*N/100пјҢиҝҗз®—з¬Ұдҝқз•ҷ    (100+10% вҶ’ 100+10 = 110)
//   Г— Г· ж—¶пјҡе·Ұж•° OP N% ж•ҙеӣў вҶ’ е·Ұж•°*N/100пјҢиҝҗз®—з¬Ұеҗёж”¶  (12668Г—23.78% вҶ’ 3012.45 жҲҗдёҖеӣў)
//   ж— е·ҰйӮ»ж•°пјҲејҖеӨҙ N%пјүпјҡйҖҖеҢ–дёә N/100гҖӮ
function calcEval(expr){
  if(!expr) return null;
  expr=expr.replace(/Г—/g,'*').replace(/Г·/g,'/');
  // иҜҚжі•
  const toks=[]; let i=0;
  while(i<expr.length){
    const c=expr[i];
    if(c>='0'&&c<='9'||c==='.'){ let j=i+1; while(j<expr.length&&(expr[j]>='0'&&expr[j]<='9'||expr[j]==='.'))j++; toks.push(expr.slice(i,j)); i=j; }
    else if(c==='%'){ toks.push('%'); i++; }
    else if(c==='('||c===')'){ toks.push(c); i++; }
    else if('+-*/'.includes(c)){
      // дёҖе…ғиҙҹеҸ·пјҡиЎЁиҫҫејҸејҖеӨҙгҖҒеүҚдёҖдёӘжҳҜиҝҗз®—з¬ҰгҖҒжҲ–е·ҰжӢ¬еҸ·д№ӢеҗҺ
      if(c==='-'&&(toks.length===0||'+-*/('.includes(toks[toks.length-1]))){ toks.push('u-'); i++; }
      else { toks.push(c); i++; }
    }
    else return null; // йқһжі•еӯ—з¬Ұ
  }
  // з¬¬дёҖйҒҚпјҡжҠҳеҸ  %пјҲt2 еҶ…ж•°еӯ—е·ІиҪ¬дёә numberпјҢиҝҗз®—з¬Ұд»Қдёәеӯ—з¬ҰдёІпјү
  const t2=[];
  for(let k=0;k<toks.length;k++){
    const tk=toks[k];
    if(tk==='%'){
      const N=t2.pop();
      if(N===undefined||typeof N!=='number') return null;
      // #11 "A%B" еҪўжҖҒпјҡ% еҗҺйқўзҙ§и·ҹж•°еӯ— вҶ’ иЎЁзӨәгҖҢA зҡ„ B%гҖҚ= A*B/100
      const nxt=toks[k+1];
      if(nxt!==undefined && /^[\d.]+$/.test(nxt)){
        if((nxt.match(/\./g)||[]).length>1) return null;
        const B=parseFloat(nxt);
        t2.push(N*B/100);
        k++;               // ж¶Ҳиҙ№жҺү B
        continue;
      }
      // еҗҰеҲҷпјҡN% дҫқйҷ„е·Ұж•°пјҲиҙўеҠЎејҸпјү
      if(t2.length>=2 && ['+','-','*','/'].includes(t2[t2.length-1]) && typeof t2[t2.length-2]==='number'){
        const OP=t2[t2.length-1], L=t2[t2.length-2];
        if(OP==='*'||OP==='/'){ t2.pop(); t2.pop(); t2.push(L*N/100); }   // еҗёж”¶иҝҗз®—з¬ҰпјҢж•ҙеӣў
        else { t2.push(L*N/100); }                                       // дҝқз•ҷиҝҗз®—з¬Ұ
      } else {
        t2.push(N/100);                                                  // ж— е·ҰйӮ»ж•°
      }
    } else if(/^[\d.]+$/.test(tk)){
      if((tk.match(/\./g)||[]).length>1) return null;
      t2.push(parseFloat(tk));
    } else {
      t2.push(tk);   // иҝҗз®—з¬Ұ / u-
    }
  }
  // з¬¬дәҢйҒҚпјҡshunting-yard вҶ’ RPN(еҗ«жӢ¬еҸ·)
  const prec={'+':1,'-':1,'*':2,'/':2,'u-':3};
  const out=[],ops=[];
  for(const t of t2){
    if(typeof t==='number'){ out.push(t); }
    else if(t==='u-'){ ops.push(t); }
    else if(t==='('){ ops.push(t); }
    else if(t===')'){
      while(ops.length && ops[ops.length-1]!=='(') out.push(ops.pop());
      if(!ops.length) return null;   // жӢ¬еҸ·дёҚй…ҚеҜ№
      ops.pop();
    }
    else {
      while(ops.length){ const o=ops[ops.length-1]; if(o!=='('&&prec[o]>=prec[t]){ out.push(ops.pop()); } else break; }
      ops.push(t);
    }
  }
  while(ops.length){ const o=ops.pop(); if(o==='(') return null; out.push(o); }
  // жұӮеҖј
  const st=[];
  for(const t of out){
    if(typeof t==='number'){ st.push(t); }
    else if(t==='u-'){ if(!st.length)return null; st.push(-st.pop()); }

let _emjCat=0, _emjSlideDir=0;
// ===== иЎЁжғ…пјҡжҜҸзұ»еҸҜй•ҝжҢүжӢ–жӢҪиҮӘз”ұжҺ’еәҸ(жҢҒд№…еҢ–)пјҢдёҺз¬ҰеҸ·дёҖиҮҙ =====
let _emjOrder={};
try{ const eo=KV.get('kbEmjOrder'); if(eo) _emjOrder=JSON.parse(eo)||{}; }catch(e){ _emjOrder={}; }
function emjSaveOrder(){ try{ KV.set('kbEmjOrder', JSON.stringify(_emjOrder)); mirrorPrefs(); }catch(e){} }
function emjGetOrder(ci){
  const def=EMOJI_CATS[ci].list;
  const saved=_emjOrder[ci];
  if(!saved || !saved.length) return def.slice();
  const valid=new Set(def), seen=new Set(), out=[];
  saved.forEach(p=>{ if(valid.has(p)&&!seen.has(p)){ out.push(p); seen.add(p); } });
  def.forEach(p=>{ if(!seen.has(p)){ out.push(p); seen.add(p); } });
  return out;
}

function pressKey(k) {
  const l=k.toLowerCase();
  // йҖ иҜҚВ·иҮӘе®ҡд№үзј–з Ғеӯ—ж®өпјҡеӯ—жҜҚзӣҙжҺҘиҝӣиҮӘе®ҡд№үз Ғ(жңҖеӨҡ4й”®)пјҢдёҚиө°зј–з Ғ/еҖҷйҖүпјӣе…¶дҪҷеҝҪз•Ҙ
  if(_wmActive && _wmField==='code'){
    // иҮӘе®ҡд№үз Ғпјҡеӯ—жҜҚзӣҙжҺҘиҝӣпјӣж•°еӯ—иө° Ctrl(й”Ғе®ҡ)еұӮз¬¬дёҖжҺ’пјӣдёҠйҷҗ6дҪҚ(е…је®№жӢјйҹіејҸиҮӘе®ҡд№үз Ғ)
    const wmNum={q:'1',w:'2',e:'3',r:'4',t:'5',y:'6',u:'7',i:'8',o:'9',p:'0'};
    if((ctrl||ctrlLock) && wmNum[l]){
      if(_wmCustomCode.length<6){ _wmCustomCode+=wmNum[l]; wmRefresh(); }
      if(ctrl&&!ctrlLock){ ctrl=false; setTimeout(buildKb,0); }
      return;
    }
    if(/^[a-z0-9]$/.test(l) && _wmCustomCode.length<6){ _wmCustomCode+=l; wmRefresh(); }
    return;
  }
  // йҖ иҜҚВ·иҜҚеӯ—ж®өВ·ENзӣҙиҫ“пјҡеӯ—жҜҚзӣҙжҺҘиҝӣиҜҚжқЎ(Shift/Caps=еӨ§еҶҷ)пјҢж•°еӯ—иө° Ctrl еұӮз¬¬дёҖжҺ’пјӣж”ҜжҢҒиӢұж–Ү/ж•°еӯ—/жұүеӯ—ж··еҗҲиҜҚ
  if(_wmActive && _wmField==='word' && _wmDirect){
    const wmNumW={q:'1',w:'2',e:'3',r:'4',t:'5',y:'6',u:'7',i:'8',o:'9',p:'0'};
    if((ctrl||ctrlLock) && wmNumW[l]){
      _wmWord+=wmNumW[l]; _wmUsedCodes.push({t:wmNumW[l],c:''});
      if(ctrl&&!ctrlLock){ ctrl=false; setTimeout(buildKb,0); }
      wmRefresh(); return;
    }
    if(/^[a-z]$/.test(l)){
      const cw=(shift||caps)?l.toUpperCase():l;
      _wmWord+=cw; _wmUsedCodes.push({t:cw,c:''});
      if(shift){shift=false;buildKb();}
      wmRefresh(); return;
    }
    return;
  }
  // ===== Ctrl й”Ғе®ҡеұӮпјҡиҝһз»ӯиҫ“е…Ҙж•°еӯ—пјҢж–№еҗ‘й”®еҸҜз”ЁпјҢд»…жҢү Ctrl й”®жң¬иә«йҖҖеҮә =====
  if(ctrlLock){
    const numMap={q:'1',w:'2',e:'3',r:'4',t:'5',y:'6',u:'7',i:'8',o:'9',p:'0'};
    if(numMap[l]){ commit(numMap[l]); return; }          // иҝһз»ӯдёҠеұҸж•°еӯ—пјҢдёҚйҖҖеҮәй”Ғе®ҡ
    if(['j','b','n','m'].includes(l)){ handleCtrl(l); return; }  // ж–№еҗ‘й”®пјҡиЎҢйҰ–/иЎҢе°ҫ/ж–ҮйҰ–/ж–Үжң«пјҢдёҚйҖҖеҮә
    // зј–иҫ‘еҠҹиғҪй”®пјҡдёҺеҚ•еҮ» Ctrl еҗҢж¬ҫпјҢй”Ғе®ҡеұӮдҝқжҢҒдёҚйҖҖеҮәпјҢеҸҜиҝһз»ӯж“ҚдҪң
    if(l==='a'){ handleCtrl('a'); return; }   // е…ЁйҖү

    // е…¶дҪҷй”®еңЁй”Ғе®ҡеұӮж— еҠЁдҪңпјҢеҝҪз•Ҙ
    return;
  }
  if(alt||ctrl) {

      if(alt) handleAlt(l);   // Alt ж–№еҗ‘пјҡдҝқжҢҒ Alt д»Ҙдҫҝиҝһз»ӯжү©йҖү

      const numMap={q:'1',w:'2',e:'3',r:'4',t:'5',y:'6',u:'7',i:'8',o:'9',p:'0'};
      if(numMap[l]){ ctrl=false; commit(numMap[l]); setTimeout(buildKb,0); return; }   // з¬¬дёҖжҺ’ж•°еӯ—
      if(l==='l'){ ctrl=false; toggleSound(); return; }                                 // Ctrl+Lпјҡйҹіж•ҲејҖе…і
      if(l==='f'){ ctrl=false; openWordMaker(); setTimeout(buildKb,0); return; }          // Ctrl+FпјҡйҖ иҜҚ
      if(l==='g'&&mode==='pinyin'){ ctrl=false; togglePyGrid(); return; }               // Ctrl+GпјҡжӢјйҹід№қе®«ж ј
    }
    if(alt){ alt=false; setTimeout(buildKb,0); }   // Alt жЁЎејҸжҢүйқһж–№еҗ‘й”®пјҡиҮӘеҠЁйҖҖеҮә AltпјҢз»§з»ӯжӯЈеёёиҫ“е…ҘиҜҘй”®
    else if(ctrl){ handleCtrl(l); ctrl=false; setTimeout(buildKb,0); return; }
  }
  if(mode==='english'){ commit((shift||caps)?k:l); if(shift){shift=false;buildKb();} return; }
  // дә”з¬”/жӢјйҹіжЁЎејҸпјҡShift жҲ– Caps жҝҖжҙ»ж—¶пјҢеӯ—жҜҚй”®зӣҙжҺҘдёҠеұҸеӨ§еҶҷеӯ—жҜҚпјҲShift дё»жү“еӨ§еҶҷеӯ—жҜҚдёҠеұҸпјүпјҢдёҚиҝӣзј–з Ғ
  if((shift||caps)&&/^[A-Za-z]$/.test(k)){
    commit(k.toUpperCase());

  }
  if(mode==='wubi'&&!code&&l==='z'){ revMode=true; code='z'; updateCode(); return; }
  const ch=l;
  // йЎ¶еұҸпјҡеӣӣз Ғе·Іж»Ўдё”еӨҡеҖҷйҖүй©»з•ҷж—¶пјҢеҶҚй”®е…Ҙз¬¬5й”® вҶ’ е…ҲдёҠеұҸеҪ“еүҚйҰ–йҖүпјҢеҶҚд»Ҙж–°й”®ејҖеҗҜж–°дёҖиҪ®зј–з Ғ
  if(mode==='wubi'&&!revMode&&code.length===4){

function handleAlt(l){

function handleCtrl(l){

  const pos=getCursorPos(),full=getFullText();

    setCursor(lineStartOf(pos));return;}

    setCursor(full.length);return;}
  if(l==='a'){selAnchor=0;tB=full;tA='';updateEditor();return;}

    if(txt){addClip(txt);}

    return;}
  if(l==='x'){

}

function deriveWubiCode(word){
  const chars=[...word].filter(ch=>/[\u4e00-\u9fff]/.test(ch));
  if(!chars.length) return '';
  const codes=chars.map(c=>lookupWubi(c)||'');
  if(chars.length===1) return codes[0].slice(0,4);
  if(chars.length===2) return codes[0].slice(0,2)+codes[1].slice(0,2);
  if(chars.length===3) return codes[0].slice(0,1)+codes[1].slice(0,1)+codes[2].slice(0,2);

}

function derivePinyinCode(word){ return [...word].filter(ch=>/[\u4e00-\u9fff]/.test(ch)).map(c=>lookupPinyin(c)).join(''); }
function wmDerivedCode(){
  // дјҳе…Ҳз”Ёз”ЁжҲ·зңҹе®һй”®е…Ҙзҡ„ж•ҙеӯ—з Ғ(device дёҠж— йңҖеҸҚжҹҘиҜҚеә“еҚіеҸҜжҲҗз Ғ)
  if(_wmUsedCodes.length){
    const codes=_wmUsedCodes.map(x=>x.c).filter(Boolean);
    if(codes.length){
      if(_wmMode==='pinyin') return codes.join('');
      const n=codes.length;
      if(n===1) return codes[0].slice(0,4);
      if(n===2) return codes[0].slice(0,2)+codes[1].slice(0,2);
      if(n===3) return codes[0].slice(0,1)+codes[1].slice(0,1)+codes[2].slice(0,2);
      return codes[0].slice(0,1)+codes[1].slice(0,1)+codes[2].slice(0,1)+codes[n-1].slice(0,1);
    }
  }
  // еӣһйҖҖпјҡжү«жҸҸеҶ…еөҢиҜҚеә“(жөҸи§ҲеҷЁ/еёёз”Ёеӯ—)
  return _wmMode==='pinyin'?derivePinyinCode(_wmWord):deriveWubiCode(_wmWord);
}

function queryCands(maxN){
  const raw=_queryCandsRaw(maxN);
  if(mode==='english') return raw;
  return applyUserDict(raw, code?code.toLowerCase():'');
}
function _queryCandsRaw(maxN) {
  maxN=maxN||15; if(!code)return[];
  const lcode=code.toLowerCase();
  // AndroidжЁЎејҸ: иө°Java DictEngineжҹҘе®Ңж•ҙиҜҚеә“
  if(typeof Android!=='undefined'&&Android.queryWubi) {
    if(mode==='wubi') {
      if(revMode&&lcode.length>1) {
        // еҸҚжҹҘ: з”ЁжӢјйҹіжҹҘпјҢз»“жһңйҷ„еҠ дә”з¬”зј–з Ғ
        try {
          const py=lcode.slice(1);
          const raw=JSON.parse(Android.queryPinyin(py));
          return raw.map(c=>({w:c.w,f:c.f,wbCode:(lookupWubi(c.w)||deriveWubiCode(c.w)||'')}));   // еҶ…еөҢиЎЁжҹҘдёҚеҲ°вҶ’жҢү86и§„еҲҷз”ұеҚ•еӯ—з ҒзҺ°жҺЁ
        } catch(e){ return []; }
      }
      try {
        return JSON.parse(Android.queryWubi(lcode));
      } catch(e){ return []; }
    } else {
      try {
        let base=JSON.parse(Android.queryPinyin(lcode));
        // иҝһжү“ж•ҙеҸҘпјҡиҫ“е…Ҙиҫғй•ҝдё”йҰ–йҖүжңӘиҰҶзӣ–ж•ҙдёІж—¶пјҢжҠҠж•ҙеҸҘеҲҮеҲҶз»“жһңзҪ®йЎ¶
        if(lcode.length>=4){
          try{
            const sent=Android.querySentence(lcode);
            if(sent && (!base.length || base[0].w!==sent)){
              // еҺ»йҮҚеҗҺзҪ®йЎ¶
              base=base.filter(c=>c.w!==sent);
              base.unshift({w:sent,f:99999});
            }
          }catch(e){}
        }
        // ж•ҙиҜҚеЈ°жҜҚз®ҖжӢјпјҡwmвҶ’жҲ‘д»¬пјҲд»…еҪ“е…ЁжӢјж— зІҫзЎ®е‘Ҫдёӯж—¶иЎҘе……пјҢйҒҝе…ҚжұЎжҹ“жӯЈеёёжӢјйҹіпјү
        if(lcode.length>=2 && lcode.length<=5){
          try{
            const brief=JSON.parse(Android.queryBrief(lcode));
            if(brief&&brief.length){
              const seen=new Set(base.map(c=>c.w));
              brief.forEach(c=>{ if(!seen.has(c.w)){ base.push(c); } });
            }
          }catch(e){}
        }
        return base;
      } catch(e){ return []; }
    }
  }
  // жөҸи§ҲеҷЁfallback: з”ЁеҶ…еөҢJSиҜҚе…ё
  if(mode==='wubi') {
    if(revMode&&lcode.length>1) {
      const py=lcode.slice(1);
      const res=qDict(PINYIN,py,maxN);
      return res.map(c=>({...c,wbCode:lookupWubi(c.w)}));
    }
    return qDict(WUBI,lcode,maxN);
  }
  const full=qDict(PINYIN,lcode,maxN);
  if(full.length<maxN&&lcode.length<=4) {
    const seen=new Set(full.map(c=>c.w));
    for(const k of Object.keys(PINYIN)) {
      if(full.length>=maxN)break;
      if(k.length>=2&&isBrief(k,lcode)) {
        for(const c of PINYIN[k]) if(!seen.has(c.w)){seen.add(c.w);full.push(c);}
      }
    }
  }
  return full.slice(0,maxN);
}
function isBrief(code,input) {
  // жҠҠcodeжӢҶжҲҗеЈ°жҜҚеәҸеҲ—пјҢзңӢйҰ–еӯ—жҜҚжҳҜеҗҰеҢ№й…Қinput
  const parts=code.match(/[bpmfdtnlgkhjqxzcsryw]h?|[aeiouГј]/g)||[];
  if(parts.length<2)return false;
  return parts.map(p=>p[0]).join('').startsWith(input);
}
function qDict(dict,prefix,maxN) {
  // зІҫзЎ®еҢ№й…Қдјҳе…ҲпјҢдёҚеҸӮдёҺжҺ’еәҸпјӣеүҚзјҖеҢ№й…ҚиЎҘе……е№¶жҢүиҜҚйў‘жҺ’
  const exact=(dict[prefix]||[]).slice(); // дҝқжҢҒеҺҹеәҸпјҲе·ІжҢүиҜҚйў‘йҷҚеәҸпјү
  const seen=new Set(exact.map(c=>c.w));
  const prefRes=[];
  for(const k of Object.keys(dict)) {
    if(prefRes.length>=maxN*4)break;
    if(k!==prefix&&k.startsWith(prefix))
      for(const c of dict[k])if(!seen.has(c.w)){seen.add(c.w);prefRes.push(c);}
  }
  prefRes.sort((a,b)=>b.f-a.f);
  return [...exact,...prefRes].slice(0,maxN);
}
function lookupWubi(word) {
  for(const[k,v]of Object.entries(WUBI))if(v.some(c=>c.w===word))return k;
  return '';
}

// жҢүдҪҚз§»еҲӨе®ҡзӮ№еҮ»(дҪҚз§»<10px=зӮ№еҮ»пјӣеҗҰеҲҷжҳҜж»‘еҠЁпјҢдәӨз»ҷеҺҹз”ҹж»ҡеҠЁпјҢдёҚи§ҰеҸ‘дёҠеұҸ)гҖӮ

// candBar з«ӢеҚійҡҗи—ҸгҖҒbtnBar жҳҫеҪўпјҢиҖҢи§Ұж‘ёжҠ¬жҢҮеҗҺжөҸи§ҲеҷЁдјҡеңЁеҺҹеқҗж ҮиЎҘеҸ‘дёҖдёӘеҗҲжҲҗ clickпјҢ
// иҝҷдёӘ click иҗҪеҲ°еҲҡжҳҫеҪўзҡ„ btnBar жҢүй’®дёҠ(жңҖе·ҰеҖҷйҖүвүҲжЁЎејҸй”®гҖҒз¬¬2еҖҷйҖүвүҲйўңиүІзҗғ)пјҢйҖ жҲҗ"иҜҜи§ҰеҸҢеҮ»"гҖӮ
// touchend жҳҜ passive ж— жі• preventDefault йҳ»жӯўеҗҲжҲҗ clickпјҢж•…ж”№дёәпјҡдёҠеұҸзһ¬й—ҙи®°еҪ•ж—¶й—ҙжҲіпјҢ
// з”ұ btnBar жҚ•иҺ·йҳ¶ж®өеңЁзҹӯзӘ—еҸЈеҶ…еҗһжҺүиҝҷж¬Ўз©ҝйҖҸ clickгҖӮи§Ғ installGhostClickGuardгҖӮ
function addCandListeners(div, fn){
  let _x=0,_y=0,_moved=false,_t0=0;
  div.addEventListener('touchstart',e=>{ _x=e.touches[0].clientX; _y=e.touches[0].clientY; _moved=false; _t0=Date.now(); },{passive:true});
  div.addEventListener('touchmove',e=>{
    // йҳҲеҖјйҷҚеҲ° 6px е№¶дёҖж—ҰеҲӨе®ҡдёәз§»еҠЁе°ұж°ёд№…й”Ғе®ҡжң¬ж¬Ўи§Ұж‘ёдёә"ж»‘еҠЁ"пјҢ
    // жқңз»қдё»й”®зӣҳжЁӘж»‘еҖҷйҖүжқЎж—¶жң«её§жҠ¬жҢҮиҜҜи§ҰдёҠеұҸ(з”ЁжҲ·еҸҚеӨҚеҸҚйҰҲзҡ„"ж»‘еҠЁжҖ»дёҠеұҸ")гҖӮ
    if(Math.abs(e.touches[0].clientX-_x)>6 || Math.abs(e.touches[0].clientY-_y)>6) _moved=true;
  },{passive:true});
  div.addEventListener('touchend',e=>{
    // д»…"ж— дҪҚз§» дё” и§Ұж‘ёж—¶й•ҝеӨҹзҹӯ(<400msпјҢжҺ’йҷӨй•ҝжҢүеҗҺеҫ®еҠЁ)"жүҚз®—зӮ№еҮ»дёҠеұҸгҖӮ
    // ж №жІ»е№¶еҸ‘иҜҜи§ҰпјҡpreventDefault жҺүжң¬ж¬Ўи§Ұж‘ёзҡ„еҗҲжҲҗйј ж ҮдәӢд»¶(mousedown/mouseup/click)пјҢ
    // еҖҷйҖүдёҠеұҸеҗҺ candBar йҡҗи—ҸгҖҒbtnBar жҳҫеҪўпјҢеҗҲжҲҗдәӢд»¶дёҚдјҡеҶҚз©ҝйҖҸеҲ°йЎ¶ж ҸжҢүй’®(з¬ҰеҸ·/жЁЎејҸй”®)гҖӮ
    if(!_moved && (Date.now()-_t0)<400){ if(e.cancelable) e.preventDefault(); _candCommitTs=Date.now(); playClick(); fn(); }
  },{passive:false});
  div.addEventListener('touchcancel',()=>{ _moved=true; },{passive:true});
  div.addEventListener('mousedown',e=>{ e.preventDefault(); playClick(); fn(); });
}

let _candCommitTs=0;
function installGhostClickGuard(){
  const bar=document.getElementById('btnBar');
  if(!bar) return;
  // з©ҝйҖҸ ghost click зҡ„зңҹжӯЈзү№еҫҒпјҡеҖҷйҖүеҢәдёҠеұҸеҗҺз”ұи§ҰзӮ№еқҗж ҮеҗҲжҲҗзҡ„ clickпјҢиҗҪзӮ№еӨ„зҡ„жҢүй’®гҖҗжІЎжңүгҖ‘ж”¶еҲ°иҝҮзңҹе®һ touchstartгҖӮ
  //   з”ЁжҲ·гҖҗдё»еҠЁгҖ‘зӮ№ btnBar жҢүй’®дёҖе®ҡе…Ҳжңү touchstart е‘ҪдёӯиҜҘжҢүй’®гҖӮж•…еҸӘеҗһ"ж—  touchstart е‘Ҫдёӯ"зҡ„еҗҲжҲҗ clickпјҢ
  //   з»қдёҚиҜҜеҗһз”ЁжҲ·дё»еҠЁзӮ№[з¬ҰеҸ·]/[иЎЁжғ…]/[еүӘиҙҙжқҝ]/[123]пјҲж—§йҖ»иҫ‘ж— е·®еҲ«жҢү 700ms зӘ—еҸЈжӢҰжҲӘпјҢеҜјиҮҙдёҠеұҸеҗҺиҝҷдәӣй”®зӮ№дёҚејҖ/иҰҒзӮ№дёӨж¬ЎпјүгҖӮ
  let _btnTouched=false;
  bar.addEventListener('touchstart',()=>{ _btnTouched=true; setTimeout(()=>{_btnTouched=false;},700); },{passive:true,capture:true});
  // еҗҢж—¶жӢҰ click/mousedown/mouseupпјҡ[з¬ҰеҸ·]зӯүжҢүй’®з”ұ mousedown и§ҰеҸ‘пјҢеҸӘжӢҰ click дјҡжјҸвҖ”вҖ”
  //   иҝҷжӯЈжҳҜ"зӮ№еҖҷйҖү1е№¶еҸ‘[жЁЎејҸй”®]гҖҒзӮ№еҖҷйҖү2е№¶еҸ‘[з¬ҰеҸ·]"еӣһеј№зҡ„ж №еӣ гҖӮзңҹе®һз”ЁжҲ·и§Ұж‘ёеҝ…жңү touchstart еңЁеүҚпјҢдёҚеҸ—еҪұе“ҚгҖӮ
  ['click','mousedown','mouseup'].forEach(tp=>{
    bar.addEventListener(tp,e=>{
      if(!_btnTouched && Date.now()-_candCommitTs < 700){
        e.stopPropagation(); e.preventDefault();   // д»…еҗһз©ҝйҖҸе№ҪзҒөдәӢд»¶
        if(tp==='click') _candCommitTs=0;
      }
    }, true);  // жҚ•иҺ·йҳ¶ж®өпјҢе…ҲдәҺжҢүй’®иҮӘиә« handler жү§иЎҢ
  });
}

  clr.addEventListener('touchend',e=>{
    const tt=e.changedTouches[0];
    if(Math.abs(tt.clientX-_cSX)>10||Math.abs(tt.clientY-_cSY)>10||Math.abs(body.scrollTop-_cST)>2) return;
    e.preventDefault(); e.stopPropagation(); doClr();
  },{passive:false});
  clr.addEventListener('mousedown',e=>{ e.preventDefault(); e.stopPropagation(); doClr(); });
  foot.appendChild(clr);
  body.appendChild(foot);
}
function openPager() {
  // жҢүеҪ“еүҚжЁЎејҸеҸ–е…ЁйғЁеҖҷйҖүпјҡT9д№қе®«з”Ё t9CandsпјҢдә”з¬”/жӢјйҹіз”Ё queryCands

  // еҲҶзүҮжёІжҹ“пјҡйҰ–жү№120дёӘз«ӢеҚідёҠеұҸ(з§’ејҖ)пјҢе…¶дҪҷжҜҸеё§з»ӯ120вҖ”вҖ”600жқЎдёҖж¬ЎжҖ§е»әDOMеңЁзңҹжңәдјҡйЎҝдёҖжӢҚ
  const mkItem=c=>{

    return div;
  };
  let _pi=0;
  const CHUNK=120;
  const _pagerToken=(openPager._tok=(openPager._tok||0)+1);   // йҮҚејҖ/е…ій—ӯеҚідҪңеәҹж—§еҲҶзүҮд»»еҠЎ
  const pump=()=>{
    if(_pagerToken!==openPager._tok) return;
    const end=Math.min(_pi+CHUNK,cands.length);
    for(;_pi<end;_pi++) grid.appendChild(mkItem(cands[_pi]));
    if(_pi<cands.length) requestAnimationFrame(pump);
  };
  pump();
  // иҰҶзӣ–иҢғеӣҙ=зј–з Ғ/еҖҷйҖүж Ҹеә•иҫ№ вҶ’ и§ҶеҸЈеә•(fixed)пјҡзңҹжңәдёҠеҝ…з„¶зӣ–еҲ°з©әж јй”®дёӢиҫ№зјҳд№ӢдёӢпјҢ
  //   еҪ»еә•ж №жІ»"еұ•ејҖеұӮжӮ¬еңЁеҚҠз©әгҖҒдёӢж–№йңІеҮәй”®зӣҳ"зҡ„й•ҝжңҹз—…гҖӮз”Ё getBoundingClientRect еҸ–зңҹе®һеұҸе№•еқҗж ҮпјҢ
  //   дёҺж–ҮжЎЈжөҒеёғеұҖ(offsetTop еҸ—ж»ҡеҠЁ/еөҢеҘ—еҪұе“Қ)еҪ»еә•и§ЈиҖҰгҖӮ
  const pv=document.getElementById('pagerOv');
  try{
    let topPx=0;
    const cb=document.getElementById('candBar');
    const bb=document.getElementById('btnBar');
    const ref=(cb&&!cb.classList.contains('hidden'))?cb:bb;
    if(ref){ const r=ref.getBoundingClientRect(); topPx=Math.max(0,Math.round(r.bottom)); }
    pv.style.top=topPx+'px';
  }catch(e){ pv.style.top='0px'; }
  pv.classList.remove('hidden');
}

    if(typeof t9Shift!=='undefined') t9Shift=false;   // еҸҢзҺҜиӢұж–ҮеұӮеҗҢж¬ҫйҮҠж”ҫпјҡйҮҚж–°еј№еҮәеӣһд№қе®«жҷ®йҖҡеұӮ
    if(had){
      if(typeof pyGrid!=='undefined' && pyGrid && mode==='pinyin' && typeof buildPyGridKb==='function') buildPyGridKb();
      else if(typeof buildKb==='function') buildKb();
    }
  }catch(e){}
}
