<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>安键输入法·模拟器</title>
<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:transparent;display:block;font-family:"PingFang SC","Noto Sans SC","Segoe UI Emoji","Noto Color Emoji","Apple Color Emoji",sans-serif;padding:0;overflow:hidden}
/* 内置彩色 emoji 字体(COLRv1 矢量，离线打包进 assets/fonts/)：根治安卓机型缺彩色 emoji
   字体集时回退到低质单色字形导致的"粗糙/发暗"。若机型 WebView 太旧不支持 COLRv1，
   会静默回退到系统 emoji(与改动前一致，不会更糟)。 */
@font-face{font-family:'KBEmoji';
  src:url('fonts/Noto-COLRv1.ttf') format('truetype');
  font-display:swap;unicode-range:U+1F000-1FAFF,U+2600-27BF,U+2190-21FF,U+2B00-2BFF,U+1F1E6-1F1FF,U+2700-27BF,U+FE00-FE0F,U+1F900-1F9FF,U+2300-23FF}
/* 表情专用：强制走彩色 emoji 字体、不继承文字色(彩色emoji不应被 --ktxt 染色)，
   修复安卓装机后 emoji 粗糙发暗(回退到低质单色字形)的问题 */
.emoji-cell{font-family:'KBEmoji',"Noto Color Emoji","Apple Color Emoji","Segoe UI Emoji",sans-serif!important;
  color:initial!important;-webkit-font-feature-settings:normal;font-variant-emoji:emoji}
/* 表情格：对标精修——扁平无按钮底，仅圆角点击反馈，emoji 更大更清爽(不被按钮渐变/阴影压暗) */
.emj-cell{height:38px;display:flex;align-items:center;justify-content:center;
  border-radius:10px;cursor:pointer;font-size:26px;line-height:1;padding:0;
  background:transparent;transition:background .1s,transform .08s}
.emj-cell:active{background:rgba(0,0,0,0.06);transform:scale(0.9)}

.title{color:#9090b0;font-size:12px;letter-spacing:2px;padding:6px 0 10px}

.editor-wrap{width:100%;max-width:420px;margin-bottom:6px}
.editor-box{
  width:100%;min-height:100px;max-height:180px;overflow-y:auto;
  background:#0d1020;border:1px solid #252545;border-radius:12px;
  padding:12px 14px;color:#e0eaff;font-size:17px;line-height:1.7;
  word-break:break-all;white-space:pre-wrap;
  box-shadow:inset 0 2px 8px rgba(0,0,0,0.4),0 0 0 2px rgba(120,140,255,0.2)
}
.cursor{display:inline-block;width:2px;height:1.1em;background:#6090ff;
  vertical-align:text-bottom;animation:blink 1s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.sel{background:rgba(100,140,255,0.35);border-radius:2px}
.t-orange .sel{background:rgba(232,96,48,0.3)}
.t-blue .sel{background:rgba(40,120,208,0.3)}
.t-purple .sel{background:rgba(144,48,224,0.3)}
.t-red .sel{background:rgba(200,20,20,0.3)}
.t-green .sel{background:rgba(20,140,60,0.3)}
.t-pink .sel{background:rgba(210,50,150,0.3)}
.t-brown .sel{background:rgba(130,70,20,0.3)}
.t-cyan .sel{background:rgba(0,150,190,0.3)}
.t-dark .sel{background:rgba(200,160,20,0.35)}

.ime{width:100%;background:linear-gradient(180deg,var(--bg1,#f5ede5),var(--bg2,#ebd5c5))}

.code-bar{display:flex;align-items:center;gap:6px;
  padding:3px 4px 3px 12px;min-height:34px;background:rgba(0,0,0,0.05);
  border-radius:11px 11px 0 0;
  border-top:1px solid var(--cbar,rgba(0,0,0,0.06));
  border-bottom:1px solid rgba(0,0,0,0.06)}
.code-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  color:#7090ff;font-size:15px;font-weight:700;letter-spacing:4px}
/* 编码栏内的「符号/表情」分类条：左右滑动，单击切换分类。开启面板时取代编码文字。 */
.cat-strip{flex:1;min-width:0;display:flex;align-items:center;gap:3px;height:28px;
  overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;touch-action:pan-x;scrollbar-width:none}
.cat-strip::-webkit-scrollbar{display:none}
.cat-strip.hidden{display:none}
/* 表情分类(9个)：均分铺满编码栏全宽、间距拉到右端；符号分类(多)仍可左右滚动 */
.cat-strip.spread{gap:0;justify-content:space-between}
.cat-strip.spread .cat-chip{flex:1 1 0;min-width:0}
.cat-chip{flex:0 0 auto;display:flex;align-items:center;justify-content:center;
  height:24px;padding:0 11px;border-radius:8px;font-size:13px;font-weight:500;line-height:1;
  white-space:nowrap;cursor:pointer;color:var(--ktxt,#5d5048);opacity:0.62;
  transition:background .12s,color .12s,opacity .12s}
.cat-chip.on{opacity:1;color:#fff;font-weight:600;
  background:linear-gradient(180deg,var(--acl,#eb976f),var(--ac,#c75f33));
  box-shadow:0 2px 5px rgba(150,60,20,0.28)}
.cat-chip.emo{padding:0 6px;font-size:18px;min-width:30px}
.cat-chip.emo.on{color:inherit;background:rgba(0,0,0,0.07);box-shadow:none}
.cat-chip.emo{position:relative}
.mode-tag{flex-shrink:0;font-size:10px;padding:2px 7px;border-radius:9px;
  background:rgba(100,130,255,0.15);color:#7090ff;letter-spacing:1px}

.cand-bar{height:48px;display:flex;align-items:center;
  background:linear-gradient(180deg,var(--kbg1,#fbeee4),var(--kbg2,#f2e2d6));overflow:hidden}
.cand-list{flex:1;display:flex;align-items:center;overflow-x:auto;
  overflow-y:hidden;height:100%;gap:2px;padding:0 6px;scrollbar-width:none}
.cand-list::-webkit-scrollbar{display:none}
.cand-item{padding:4px 10px;border-radius:8px;font-size:16px;color:var(--ktxt,#1a1a2e);
  white-space:nowrap;cursor:pointer;height:36px;display:flex;align-items:center;
  flex-shrink:0;transition:background .1s;gap:4px}
.cand-item:first-child{background:var(--ac,#6090ff);color:#fff!important;
  color:#fff;font-weight:500;border:1px solid rgba(100,140,255,0.25)}
.cand-sub{font-size:8px;color:rgba(120,170,255,0.6)}
.cand-more{padding:0 10px;color:rgba(100,140,255,0.55);font-size:18px;cursor:pointer;
  flex-shrink:0;height:100%;display:flex;align-items:center}
.code-hide{flex-shrink:0;display:flex;align-items:center;justify-content:center;
  width:38px;height:30px;cursor:pointer;border-radius:7px;margin-left:4px}
.code-hide:active{background:rgba(0,0,0,0.08)}

.btn-bar{height:48px;display:flex;align-items:center;gap:3px;padding:0 5px;
  background:linear-gradient(180deg,var(--kbg1,#fbeee4),var(--kbg2,#f2e2d6))}

/* 工具栏按钮：柔色磨砂圆角 tile（统一主键盘风格，去药片感）*/
.sball{flex-shrink:0;width:36px;height:34px;border-radius:11px;margin:0;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  position:relative;transition:transform .14s cubic-bezier(.4,0,.2,1);
  background:linear-gradient(180deg,#ffffff,#f3e3d6);
  border:1px solid rgba(150,90,40,0.15);
  box-shadow:0 1px 2px rgba(120,60,20,0.12)}
.sball:active{transform:scale(0.9)}
/* 工具栏按钮「激活态」：符号/表情/剪贴板/123 面板开启时，按钮呈现当前主题色填充(联动反差)，
   寓示已按下、再按一下收回。配色随主题(--ac/--acl/--acd)。 */
.sball.on{background:radial-gradient(circle at 38% 30%,var(--acl,#f8a070),var(--ac,#e86030) 55%,var(--acd,#c03810));
  border-color:transparent;box-shadow:0 2px 7px rgba(180,70,20,0.38),inset 0 1px 1px rgba(255,255,255,0.25)}
.sball.on .sball-text{color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
.sball-text{position:relative;z-index:1;color:var(--acd,#9a4520);font-weight:600;
  font-size:12px}
/* 模式键(第一个)：accent 强调 */
#modeBtn{background:radial-gradient(circle at 38% 30%,var(--acl,#f8a070),var(--ac,#e86030) 55%,var(--acd,#c03810));
  border-color:transparent;box-shadow:0 2px 6px rgba(180,70,20,0.35)}
#modeBtn .sball-text{color:#fff;text-shadow:0 1px 2px rgba(0,0,0,0.3)}
/* 剪贴板球：完全复刻主题颜色球(themeBtn)的釉瓷质感(色随主题 var)，再叠加"内核"填充——寓示球内装着内容，区别于空的颜色球。 */
.clip-ball{width:34px;height:34px;border-radius:50%;position:relative;overflow:visible;
  background:
    radial-gradient(circle at 50% 16%,rgba(255,255,255,0.95) 0%,rgba(255,255,255,0) 24%),
    radial-gradient(circle at 50% 52%,var(--acl,#f0843a) 0%,var(--ac,#d8500e) 52%,var(--acd,#a8420f) 100%);
  box-shadow:0 3px 10px rgba(0,0,0,0.30),0 1px 4px rgba(0,0,0,0.20),
             inset 0 -3px 6px rgba(0,0,0,0.28),inset 0 2px 3px rgba(255,255,255,0.45)}
/* 内核：球体内部的实心核(顶高光+底内阴影)，让球"有填充感" */
.clip-ball::before{content:'';position:absolute;inset:27%;border-radius:50%;z-index:1;
  background:radial-gradient(circle at 50% 34%,rgba(255,255,255,0.58) 0%,rgba(255,255,255,0.12) 44%,rgba(0,0,0,0.20) 100%);
  box-shadow:inset 0 1px 2px rgba(255,255,255,0.45),inset 0 -2px 3px rgba(0,0,0,0.32),0 0 0 1px rgba(255,255,255,0.12)}
/* 釉面顶光：横向柔光带(同主题颜色球) */
.clip-ball::after{content:'';position:absolute;top:9%;left:26%;width:48%;height:22%;border-radius:50%;z-index:2;
  background:linear-gradient(180deg,rgba(255,255,255,0.95),rgba(255,255,255,0))}
/* 激活态(剪贴板展开)：保持釉瓷球外观，外加主题色高亮环 */
.sball.clip-ball.on{background:
    radial-gradient(circle at 50% 16%,rgba(255,255,255,0.95) 0%,rgba(255,255,255,0) 24%),
    radial-gradient(circle at 50% 52%,var(--acl,#f0843a) 0%,var(--ac,#d8500e) 52%,var(--acd,#a8420f) 100%);
  box-shadow:0 0 0 2px var(--acl,#f8a070),0 3px 10px rgba(0,0,0,0.30),inset 0 -3px 6px rgba(0,0,0,0.28),inset 0 2px 3px rgba(255,255,255,0.45)}

/* 主题球：唯一保留的陶瓷圆球（作品牌点缀）*/
.theme-ball{width:34px;height:34px;border-radius:50%;position:relative;overflow:visible;
  box-shadow:0 3px 10px rgba(0,0,0,0.30),
             inset 0 -3px 6px rgba(0,0,0,0.30),
             inset 0 2px 3px rgba(255,255,255,0.25)}

/* 主题颜色球 — 釉瓷·金属釉面（高温釉烧质感：顶部强反光、釉层下沉、底缘暗釉）*/
.theme-ball{background:
  radial-gradient(circle at 50% 16%,rgba(255,255,255,0.95) 0%,rgba(255,255,255,0) 24%),
  radial-gradient(circle at 50% 52%,#f0843a 0%,#d8500e 52%,#a8420f 100%);
  box-shadow:0 4px 9px rgba(150,60,20,0.34),0 1px 4px rgba(0,0,0,0.22),
             inset 0 -3px 6px rgba(120,55,20,0.30),inset 0 2px 3px rgba(255,255,255,0.45)}
/* 釉面顶光：横向柔光带（金属釉的高反光关键，非玻璃锐点）*/
.theme-ball::after{content:'';position:absolute;top:9%;left:26%;
  width:48%;height:22%;border-radius:50%;
  background:linear-gradient(180deg,rgba(255,255,255,0.95),rgba(255,255,255,0));
  transform:none;filter:none}
/* 底缘釉层反光（釉料下沉的细微回光）*/
.theme-ball::before{content:'';position:absolute;bottom:8%;left:50%;
  width:30%;height:12%;border-radius:50%;margin-left:-15%;
  background:radial-gradient(ellipse,rgba(255,200,160,0.4) 0%,rgba(255,200,160,0) 70%);
  transform:none}
.theme-ball.blue{background:
  radial-gradient(circle at 50% 16%,rgba(255,255,255,0.95) 0%,rgba(255,255,255,0) 24%),
  radial-gradient(circle at 50% 52%,#3a8ce8 0%,#1058c8 52%,#1a44b0 100%);
  box-shadow:0 4px 9px rgba(0,60,200,0.34),0 1px 4px rgba(0,0,0,0.22),
             inset 0 -3px 6px rgba(30,50,120,0.30),inset 0 2px 3px rgba(255,255,255,0.45)}
.theme-ball.purple{background:
  radial-gradient(circle at 50% 16%,rgba(255,255,255,0.95) 0%,rgba(255,255,255,0) 24%),
  radial-gradient(circle at 50% 52%,#b658f0 0%,#8a18e8 52%,#6a30b0 100%);
  box-shadow:0 4px 9px rgba(110,0,220,0.34),0 1px 4px rgba(0,0,0,0.22),
             inset 0 -3px 6px rgba(90,40,130,0.30),inset 0 2px 3px rgba(255,255,255,0.45)}
.theme-ball.red{background:
  radial-gradient(circle at 50% 16%,rgba(255,255,255,0.95) 0%,rgba(255,255,255,0) 24%),
  radial-gradient(circle at 50% 52%,#e84a4a 0%,#cc1414 52%,#a02828 100%);
  box-shadow:0 4px 9px rgba(180,0,0,0.34),0 1px 4px rgba(0,0,0,0.22),
             inset 0 -3px 6px rgba(150,40,40,0.30),inset 0 2px 3px rgba(255,255,255,0.45)}
.theme-ball.green{background:
  radial-gradient(circle at 50% 16%,rgba(255,255,255,0.95) 0%,rgba(255,255,255,0) 24%),
  radial-gradient(circle at 50% 52%,#3ac868 0%,#089838 52%,#0a7838 100%);
  box-shadow:0 4px 9px rgba(0,130,30,0.34),0 1px 4px rgba(0,0,0,0.22),
             inset 0 -3px 6px rgba(20,110,55,0.30),inset 0 2px 3px rgba(255,255,255,0.45)}
.theme-ball.pink{background:
  radial-gradient(circle at 50% 16%,rgba(255,255,255,0.95) 0%,rgba(255,255,255,0) 24%),
  radial-gradient(circle at 50% 52%,#f050b0 0%,#d82090 52%,#b03080 100%);
  box-shadow:0 4px 9px rgba(190,10,120,0.34),0 1px 4px rgba(0,0,0,0.22),
             inset 0 -3px 6px rgba(150,50,110,0.30),inset 0 2px 3px rgba(255,255,255,0.45)}
.theme-ball.brown{background:
  radial-gradient(circle at 50% 16%,rgba(255,255,255,0.95) 0%,rgba(255,255,255,0) 24%),
  radial-gradient(circle at 50% 52%,#bc803c 0%,#985828 52%,#8a5828 100%);
  box-shadow:0 4px 9px rgba(110,50,0,0.34),0 1px 4px rgba(0,0,0,0.22),
             inset 0 -3px 6px rgba(120,80,40,0.30),inset 0 2px 3px rgba(255,255,255,0.45)}
.theme-ball.cyan{background:
  radial-gradient(circle at 50% 16%,rgba(255,255,255,0.95) 0%,rgba(255,255,255,0) 24%),
  radial-gradient(circle at 50% 52%,#28b4e0 0%,#0090c0 52%,#0a6a96 100%);
  box-shadow:0 4px 9px rgba(0,120,180,0.34),0 1px 4px rgba(0,0,0,0.22),
             inset 0 -3px 6px rgba(20,100,140,0.30),inset 0 2px 3px rgba(255,255,255,0.45)}
.theme-ball.dark{background:
  radial-gradient(circle at 50% 16%,rgba(255,255,255,0.85) 0%,rgba(255,255,255,0) 24%),
  radial-gradient(circle at 50% 52%,#3a3a44 0%,#1a1a22 52%,#000000 100%);
  box-shadow:0 4px 9px rgba(0,0,0,0.45),0 1px 4px rgba(0,0,0,0.3),
             inset 0 -4px 8px rgba(0,0,0,0.6),inset 0 2px 3px rgba(255,255,255,0.3)}

.trackpad{flex:1;height:32px;margin:0 4px;border-radius:16px;
  background:linear-gradient(180deg,rgba(30,40,80,0.6),rgba(15,25,55,0.5));
  border:1px solid rgba(100,130,220,0.18);
  box-shadow:inset 0 1px 3px rgba(0,0,0,0.4),inset 0 0 0 1px rgba(255,255,255,0.04);
  display:flex;align-items:center;justify-content:center;
  color:rgba(100,140,255,0.35);font-size:16px;letter-spacing:6px;cursor:pointer}

.keyboard{border-radius:0 0 14px 14px;overflow:hidden;padding-bottom:4px}
.kb-row{display:flex;gap:5px;padding:5px 4px}
.kb-row#r2{padding-left:16px;padding-right:16px}
.kb-row#r3{padding-left:4px;padding-right:4px}

.key{flex:1;height:44px;border-radius:12px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;
  transition:transform .08s,box-shadow .08s;
  border:1px solid rgba(255,255,255,0.07)}
.key:active,.key.pressed{transform:scale(0.93) translateY(1px)}
.key .km{font-size:17px;color:#d8e8ff;line-height:1}
.key .ks{font-size:10px;color:rgba(140,180,255,0.6);line-height:1;margin-top:2px}

.key.func{}
.key.accent .km,.key.enter-key .km{color:#fff;font-size:13px;font-weight:600}
.key.shift-key{flex:1.5;min-width:0}
.key.shift-key .km{font-size:18px}
.key.space-key .km{font-size:13px;opacity:0.4}
.key.enter-key{flex:0 0 auto;width:70px}
.key.ctrl-key{flex:0 0 auto;width:50px}
.key.alt-key{flex:0 0 auto;width:40px}
.key.ctrl-key .km,.key.alt-key .km{font-size:12px}
.key.held{border-color:rgba(100,160,255,0.5)!important}
.key.locked{border-color:var(--ac,#e86030)!important;background:rgba(232,96,48,0.18)!important;box-shadow:0 0 0 1.5px var(--ac,#e86030) inset}
.key.arrow-active .km{font-size:15px!important;color:var(--ac,#e86030)!important;font-weight:600}
.key.arrow-active .ks{font-size:9px!important;color:var(--ac,#e86030)!important;margin-top:1px}
.key.del-r3 svg{color:var(--ktxt,#2a1408)}
.key.t9key{display:flex;flex-direction:column;align-items:center;justify-content:center}
.key.t9key.t9num .km{font-weight:600}
.key.t9key.t9num .ks{margin-top:1px}
.kb-row.t9row{padding-left:5px!important;padding-right:5px!important;padding-top:2px!important;padding-bottom:2px!important;gap:6px}
.kb-row.t9row .key{height:50px}
.key.t9pad{pointer-events:none;background:transparent!important;box-shadow:none!important;border:none!important}
.t-orange .key.del-r3 svg,.t-red .key.del-r3 svg,.t-green .key.del-r3 svg,
.t-pink .key.del-r3 svg,.t-brown .key.del-r3 svg,.t-cyan .key.del-r3 svg,
.t-blue .key.del-r3 svg,.t-purple .key.del-r3 svg{color:var(--ktxt)}
.t-dark .key.del-r3 svg{color:var(--ktxt)}

.numpad-wrap{padding:5px}
.num-key{border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-size:20px;cursor:pointer;transition:transform .08s;border:1px solid rgba(255,255,255,0.07)}
.num-key:active,.num-key.pressed{transform:scale(0.92)}
.calc-delz{position:relative;overflow:hidden;padding:0}
.calc-delz .delz-l,.calc-delz .delz-r{position:absolute;top:0;bottom:0;display:flex;align-items:center;justify-content:center}
.calc-delz .delz-l{left:0;right:50%;color:var(--ktxt,#2a1408)}
.calc-delz .delz-r{left:50%;right:0;font-size:11px;font-weight:600;color:var(--ktxt,#2a1408);
  background:rgba(0,0,0,0.10)}
.num-key .km{font-size:20px}
.calc-disp{min-height:54px;border-radius:12px;padding:6px 12px;display:flex;
  flex-direction:column;align-items:flex-end;justify-content:center;
  background:linear-gradient(180deg,var(--kbg1,#fef6f0),var(--kbg2,#f0ddd0));
  border:1px solid rgba(0,0,0,0.06);box-shadow:inset 0 1px 4px rgba(0,0,0,0.12)}
.calc-expr{font-size:22px;font-weight:600;color:var(--ktxt,#2a1408);line-height:1.2;
  word-break:break-all;max-width:100%}
.calc-res{font-size:14px;color:var(--ac,#e86030);margin-top:2px;font-weight:600}

.panel{height:var(--panelH,122px);max-height:none;display:flex;flex-direction:column;overflow:hidden;padding:0;
  border-radius:0 0 14px 14px;
  background:linear-gradient(180deg,var(--kbg1,#fbeee4),var(--kbg2,#f2e2d6))}
/* 面板内滚动区：拖杆冻结在其上方，内容只在此区域上下滚动(拖杆不随滚动) */
.panel-scroll{flex:1 1 auto;min-height:0;overflow-y:auto;overflow-x:hidden;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;touch-action:pan-y}
.panel-grid{display:block}
.pi{height:34px;display:flex;align-items:center;justify-content:center;
  text-align:center;font-size:18px;border-radius:10px;
  cursor:pointer;color:var(--ktxt,#2a1408);transition:background .1s,transform .08s;
  background:linear-gradient(180deg,rgba(255,255,255,0.92),rgba(255,255,255,0.42));
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.85),0 1px 2px rgba(150,110,80,0.16)}
.pi:active{background:linear-gradient(180deg,rgba(255,255,255,0.7),rgba(0,0,0,0.06));transform:scale(0.9)}
.panel-close{padding:7px;text-align:center;color:var(--ac,#e86030);opacity:0.7;
  font-size:12px;cursor:pointer;border-top:1px solid rgba(0,0,0,0.06);margin-top:3px}

.pager-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:100;
  display:flex;flex-direction:column;justify-content:flex-end}
.pager-box{border-radius:16px 16px 0 0;padding:12px;max-height:60vh;overflow-y:auto;background:linear-gradient(180deg,var(--kbg1,#fbeee4),var(--kbg2,#f2e2d6))}
.pager-title{display:flex;align-items:center;justify-content:space-between;
  font-size:13px;margin-bottom:8px;padding-bottom:6px;color:var(--ktxt,#2a1408);
  border-bottom:1px solid rgba(0,0,0,0.10)}
.pager-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.pager-item{padding:10px 4px;text-align:center;font-size:16px;border-radius:8px;
  cursor:pointer;color:var(--ktxt,#2a1408);transition:background .1s;
  background:linear-gradient(180deg,rgba(255,255,255,0.92),rgba(255,255,255,0.42));
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.85),0 1px 2px rgba(150,110,80,0.16)}
.pager-item:first-child{font-weight:600;color:#fff;
  background:linear-gradient(180deg,var(--acl,#eb976f),var(--ac,#c75f33))}
.pager-item:active{transform:scale(0.94)}
.wb-code{font-size:9px;display:block;margin-top:2px;color:rgba(120,80,40,0.7)}

</div>
<div id="mainKb" class="keyboard">

  <div class="kb-row" id="r4"></div>
</div>

</div>
<div id="symPanel" class="panel hidden"><div class="panel-grid" id="punctG"></div></div>
<div id="emjPanel" class="panel hidden"><div class="panel-grid" id="emjG"></div></div>
<div id="clipPanel" class="panel hidden" style="position:relative">
  <div id="clipList"></div></div>
</div>
<div class="pager-overlay hidden" id="pagerOv" onclick="closePager()">

    <div class="pager-title" id="pagerTitle">

  </div>
</div>

function saveClips(){ try{ localStorage.setItem('kbClips', JSON.stringify(clips)); }catch(e){} }
function addClip(txt){
  if(!txt || !txt.trim()) return;
  // 去重：已存在则提到最前
  const i=clips.indexOf(txt);
  if(i>=0) clips.splice(i,1);
  clips.unshift(txt);
  if(clips.length>50) clips.pop();   // 私有历史最多 50 条
  saveClips();
}

window.addEventListener('DOMContentLoaded', () => {
  buildKb(); buildNumpad(); buildPunct(); buildEmoji();
  initCatStripGestures(); clearCatStrip();   // 编码栏分类条：挂手势(一次) + 初始清空隐藏
  updateBtnStates();
  updateDisplay();
  installGhostClickGuard();   // 拦截候选字上屏后穿透到顶栏按钮的合成 click
  // 符号按钮：短按=符号面板(原行为)；长按=切数字键盘(替代已移除的"滑切数字键盘"手势)。
  //   主键盘滑切已彻底移除以根治"滑动误触编码+快打丢码"；数字键盘由顶栏 [123] 键进入。
  (function(){
    const sb=document.getElementById('symBtn');
    if(!sb) return;
    let _touchUsed=false;
    sb.addEventListener('touchstart',e=>{ _touchUsed=true; },{passive:true});
    sb.addEventListener('touchend',e=>{
      setTimeout(()=>{_touchUsed=false;},500);
      toggleSym();
    },{passive:true});
    sb.addEventListener('mousedown',e=>{ if(_touchUsed)return; toggleSym(); });
  })();
  // 触摸板 — 灵敏度最高，阈值6px
  const tp = document.getElementById('tp');
  let tpX=0, tpAccum=0, tpDir=0, tpActive=false;   // tpDir: 上一次累积方向，用于检测反向
  let _tpHitR=false, _tpHitL=false;                // 边界方向锁：本次滑动已探到文末/文首，该方向不再发键直到反向
  // 关键修复：把 touchmove/touchend 挂到 document 而非 tp 自身。
  //   根因——手指从触控条滑动时一旦移出 tp 的几何边界，挂在 tp 上的 touchmove 就不再触发，
  //   于是"滑出文首/末后回滑"收不到事件、光标卡死回不来。挂 document 后全程跟手。
  const tpMove=e=>{
    if(!tpActive) return;
    e.preventDefault();
    const cx=(e.touches&&e.touches[0])?e.touches[0].clientX:e.clientX;
    const dx=cx-tpX; tpX=cx;
    if(dx===0) return;
    const dir=dx>0?1:-1;
    if(dir!==tpDir){ tpAccum=0; tpDir=dir; _tpHitR=false; _tpHitL=false; }   // 方向反转立即清零并解除两端边界锁，回滑即时生效
    tpAccum+=dx;
    // 右移：每消费一步先查是否已到文末——到末则立即清零累积并停，不积累"越界credit"，光标硬停文末。
    //   _tpHitR 锁：一旦本次滑动探到文末，该方向后续步不再发键(兜底宿主键事件异步处理延迟、cursorAtBoundary 读到旧位的窗口)，直到反向解锁。
    while(tpAccum>=6){
      if(_tpHitR){ tpAccum=0; break; }
      if(typeof Android!=='undefined'){
        if(Android.cursorAtBoundary && Android.cursorAtBoundary(1)){ tpAccum=0; _tpHitR=true; break; }   // 已到文末→硬停并锁右
        Android.moveCursor(1,false);
      } else { if(tA.length>0)moveCur(1); else {tpAccum=0;break;} }
      tpAccum-=6;
    }
    // 左移：到文首同理硬停 + 锁左。
    while(tpAccum<=-6){
      if(_tpHitL){ tpAccum=0; break; }
      if(typeof Android!=='undefined'){
        if(Android.cursorAtBoundary && Android.cursorAtBoundary(-1)){ tpAccum=0; _tpHitL=true; break; }   // 已到文首→硬停并锁左
        Android.moveCursor(0,false);
      } else { if(tB.length>0)moveCur(-1); else {tpAccum=0;break;} }
      tpAccum+=6;
    }
  };
  const tpEnd=()=>{ tpActive=false; tpAccum=0; tpDir=0; _tpHitR=false; _tpHitL=false; };
  tp.addEventListener('touchstart', e=>{ tpActive=true; tpX=e.touches[0].clientX; tpAccum=0; tpDir=0; _tpHitR=false; _tpHitL=false; },{passive:true});
  document.addEventListener('touchmove', tpMove, {passive:false});
  document.addEventListener('touchend', tpEnd, {passive:true});
  document.addEventListener('touchcancel', tpEnd, {passive:true});
  // 滑切数字键盘的手势已彻底移除：切换改由顶栏 [123] 键(进)与数字键盘右上角 [删除·返回] 键(出)按钮完成，
  //   不再需要滑动进度条/横滑识别。原 _kbSwiping/SW_LOCK/SW_FULL/swHint 进度条等全部删除，杜绝死代码。
});

// ====== 黑轴风格点击音效（WebView 自合成，可静音；Ctrl+P 开关）======
let _audioCtx = null;
let soundOn = true;
try { const sv=localStorage.getItem('kbSound'); if(sv!==null) soundOn=(sv==='1'); } catch(e){}
function _ensureAudio(){
  if(!_audioCtx){ try{ _audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ _audioCtx=null; } }
  return _audioCtx;
}
function playClick() {
  if(!soundOn) return;
  const ac=_ensureAudio(); if(!ac) return;
  try {
    const t=ac.currentTime;
    // 1) 低频"thock"主体：三角波 ~180Hz 快速下滑，模拟黑轴落底
    const osc=ac.createOscillator(), g=ac.createGain();
    osc.type='triangle';
    osc.frequency.setValueAtTime(190,t);
    osc.frequency.exponentialRampToValueAtTime(95,t+0.05);
    g.gain.setValueAtTime(0.0001,t);
    g.gain.exponentialRampToValueAtTime(0.10,t+0.004);   // 极快起音
    g.gain.exponentialRampToValueAtTime(0.0001,t+0.06);  // 快速衰减
    osc.connect(g); g.connect(ac.destination);
    osc.start(t); osc.stop(t+0.07);
    // 2) 短噪声"咔"层：模拟按键机械接触
    const N=Math.floor(ac.sampleRate*0.012);
    const buf=ac.createBuffer(1,N,ac.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<N;i++){ d[i]=(Math.random()*2-1)*Math.pow(1-i/N,2.5); }
    const src=ac.createBufferSource(); src.buffer=buf;
    const ng=ac.createGain(); ng.gain.value=0.05;
    src.connect(ng); ng.connect(ac.destination); src.start(t);
  } catch(e) {}
}
function toggleSound(){
  soundOn=!soundOn;
  try{ localStorage.setItem('kbSound', soundOn?'1':'0'); }catch(e){}
  if(soundOn) playClick();   // 开启时给一声反馈
  buildKb();                 // 重建以刷新 Ctrl 模式 L 键静音图标态
}

function addKeyListeners(div, fn, immediate, noRepeat) {
  // 普通键盘键（重写 v2）：
  //   immediate=true（纯字母输入态）→ touchstart 按下**立即**出码，零延迟、零横移取消。
  //     根因修复：旧版有 50ms 微延迟 + 20px 横移取消，快打时手指自然横移>20px 就吃码丢字；
  //     现在主键盘已禁用"滑切数字键盘"手势(见下方滑切层 return)，字母键不再需要为滑切让路，
  //     于是可以像硬件键盘一样按下即出，再快也不丢。长按仍连发(连打/连删)。
  //   immediate=false（修饰层 alt/ctrl 的方向键/Tab）→ 保持 touchend 触发，防误触连发。
  let _t=null, _r=null, _fired=false, _moved=false, _sx=0, _sy=0, _touched=false, _longFired=false;
  const fire = () => { playClick(); fn(); };
  const startLong = () => {
    if (noRepeat) return;   // 空格等：不连发
    _t = setTimeout(() => {
      if (immediate || !_moved) {
        _longFired = true;
        _r = setInterval(() => { if (immediate || !_moved) { playClick(); fn(); } }, 50);
      }
    }, 400);
  };
  const start = e => {
    e.preventDefault();
    _touched = true; _moved = false; _fired = false; _longFired = false;
    if (e.touches) { _sx = e.touches[0].clientX; _sy = e.touches[0].clientY; }
    div.classList.add('pressed');
    if (immediate) {
      // 真·瞬发：按下立即出码，不等不判，快打绝不丢。
      fire(); _fired = true;
    }
    startLong();
  };
  const move = e => {
    if (!e.touches) return;
    const dx = Math.abs(e.touches[0].clientX - _sx);
    const dy = Math.abs(e.touches[0].clientY - _sy);
    if (immediate) {
      // 即时键已在按下瞬间出码；这里只负责"取消长按连发"(手指滑走时停止重复)，不撤销已出的码。
      if (dx > 24 || dy > 24) {
        _moved = true; clearTimeout(_t); clearInterval(_r); _t=null; _r=null;
        div.classList.remove('pressed');
      }
      return;
    }
    // 非即时键(方向/Tab)：横向或较大移动 → 取消本键
    if ((dx > 16 && dx > dy) || dx > 24 || dy > 22) {
      _moved = true;
      clearTimeout(_t); clearInterval(_r); _t=null; _r=null;
      div.classList.remove('pressed');
    }
  };
  const stop = () => {
    div.classList.remove('pressed');
    clearTimeout(_t); clearInterval(_r); _t=null; _r=null;
    // 非即时键：抬指触发(无大幅移动)。即时键已在按下时出码，此处不再补发。
    if (!immediate && !_moved && !_longFired && _touched && !_fired) { fire(); _fired = true; }
    setTimeout(() => { _touched = false; }, 350);
  };
  div.addEventListener('touchstart', start, {passive:false});
  div.addEventListener('touchmove',  move,  {passive:true});
  div.addEventListener('touchend',   stop,  {passive:true});
  div.addEventListener('touchcancel',()=>{ _moved=true; div.classList.remove('pressed'); clearTimeout(_t); clearInterval(_r); }, {passive:true});
  div.addEventListener('mousedown', e => { e.preventDefault(); if (_touched) return; playClick(); fn(); });
  div.addEventListener('mouseup',   ()=>{ div.classList.remove('pressed'); });
  div.addEventListener('mouseleave', ()=>{ div.classList.remove('pressed'); clearTimeout(_t); clearInterval(_r); });
}
function addPanelKey(div, fn) {
  // panel内键: touchend 触发（无大幅移动）；防 touch+mousedown 双触发（上屏2个bug的根源）
  let _sx=0, _sy=0, _moved=false, _touched=false;
  div.addEventListener('touchstart', e => {
    _sx = e.touches[0].clientX; _sy = e.touches[0].clientY; _moved = false; _touched = true;
  }, {passive:true});
  div.addEventListener('touchmove', e => {
    if (Math.abs(e.touches[0].clientX - _sx) > 10 || Math.abs(e.touches[0].clientY - _sy) > 10) _moved = true;
  }, {passive:true});
  div.addEventListener('touchend', e => {
    if (!_moved) { playClick(); fn(); }
    setTimeout(() => { _touched = false; }, 600);
  }, {passive:true});
  div.addEventListener('mousedown', e => {
    if (_touched) return;   // touch 后屏蔽 mousedown，防止双触发
    e.preventDefault(); playClick(); fn();
  });
}
function addKeyListenersOnce(div, fn) {
  // 修饰键专用：只触发一次，无长按重复，有音效
  let _touched=false;
  const start = e => { e.preventDefault(); _touched=true; playClick(); fn(); div.classList.add('pressed'); };
  const stop  = () => { div.classList.remove('pressed'); setTimeout(()=>{_touched=false;},600); };
  div.addEventListener('touchstart',  start, {passive:false});
  div.addEventListener('touchend',    stop,  {passive:true});
  div.addEventListener('touchcancel', stop,  {passive:true});
  div.addEventListener('mousedown', e => { e.preventDefault(); if(_touched)return; playClick(); fn(); });
  div.addEventListener('mouseup',    stop);
  div.addEventListener('mouseleave', stop);
}

function buildKb() {
  if(pyGrid && mode==='pinyin'){ buildPyGridKb(); return; }
  // 退出九宫格回全键盘：清除 t9row 残留样式，恢复正常行布局
  ['r1','r2','r3','r4'].forEach(id=>{ const r=document.getElementById(id); if(r) r.classList.remove('t9row'); });
  buildRow('r1',R1); buildRow('r2',R2); buildRow3(); buildRow4();
}
// ===== 拼音九宫格(T9) — 紧凑标准布局 =====
// 数字键左3列固定宽，右列为工具列（⌫/符/换/回车），底排拼英切换+空格
const T9_GROUPS={ '1':"", '2':"abc", '3':"def", '4':"ghi", '5':"jkl", '6':"mno", '7':"pqrs", '8':"tuv", '9':"wxyz" };
let t9code='';   // 已按的数字序列
let t9NumMode=false;   // Num 灯：亮=九宫输出纯数字，灭=九宫拼音
try{ t9NumMode=(localStorage.getItem('t9NumMode')==='1'); }catch(e){}
function buildPyGridKb(){
  const r1=document.getElementById('r1'), r2=document.getElementById('r2'), r3=document.getElementById('r3'), r4=document.getElementById('r4');
  r1.innerHTML=''; r2.innerHTML=''; r3.innerHTML=''; r4.innerHTML='';
  // 九宫格专属：清除全键盘 r2/r3 的缩进，加 t9row 标记统一布局
  [r1,r2,r3,r4].forEach(r=>{ r.classList.add('t9row'); r.style.paddingLeft=''; r.style.paddingRight=''; });
  // 布局：左功能列([Num]灯键) + 中间3列数字 + 右功能列
  const LW=0.72, RW=0.82;
  const mk=(label,sub,cls,fn,grow,imm)=>{
    const d=document.createElement('div');
    d.className='key t9key'+(cls?' '+cls:'');
    d.style.flex='0 0 auto';
    d.style.flexGrow=(grow==null?1:grow);
    d.style.flexBasis='0';
    if(sub){
      d.innerHTML=`<span class="km" style="font-size:18px;line-height:1.05">${label}</span><span class="ks" style="font-size:11px;letter-spacing:.5px;opacity:.85;font-weight:500">${sub}</span>`;
    }else{
      d.innerHTML=`<span class="km" style="font-size:16px">${label}</span>`;
    }
    addKeyListeners(d,fn,imm);
    return d;
  };
  // [Num] 灯键：亮=输出 1~9 纯数字，灭=九宫拼音；带圆点指示灯
  const mkNum=(grow)=>{
    const d=document.createElement('div');
    d.className='key t9key func'+(t9NumMode?' locked':'');
    d.style.flex='0 0 auto'; d.style.flexGrow=grow; d.style.flexBasis='0';
    const lampColor=t9NumMode?'#39d353':'rgba(0,0,0,0.25)';
    const lampGlow=t9NumMode?'box-shadow:0 0 6px 1px #39d353;':'';
    d.innerHTML=`<span class="km" style="font-size:13px;font-weight:600">Num</span>`+
      `<span style="display:block;width:7px;height:7px;border-radius:50%;margin-top:3px;background:${lampColor};${lampGlow}"></span>`;
    addKeyListeners(d,()=>{ t9NumMode=!t9NumMode; try{localStorage.setItem('t9NumMode',t9NumMode?'1':'0');}catch(e){} t9code=''; showCands([]); buildPyGridKb(); });
    return d;
  };
  // 空占位（右功能列对齐用）
  const pad=(grow)=>{ const d=document.createElement('div'); d.className='key t9pad'; d.style.flex='0 0 auto'; d.style.flexGrow=grow; d.style.flexBasis='0'; d.style.visibility='hidden'; return d; };

  // 行1: [Num灯] 1(主键盘) 2ABC 3DEF  ⌫
  r1.appendChild(mkNum(LW));
  // 1 键双义：Num 灯亮=数字1(即时)，灭=主键盘切换(延迟，防误触切走)
  r1.appendChild(mk('1', t9NumMode?'':'(主键盘)', ' t9num', ()=>{ if(t9NumMode){ t9press('1'); } else { togglePyGrid(); } }, 1, t9NumMode));
  r1.appendChild(mk('2','ABC',' t9num',()=>t9press('2'),1,true));
  r1.appendChild(mk('3','DEF',' t9num',()=>t9press('3'),1,true));
  r1.appendChild(mk('⌫','',' func',()=>t9del(),RW,true));
  // 行2: [空] 4GHI 5JKL 6MNO  0
  r2.appendChild(pad(LW));
  r2.appendChild(mk('4','GHI',' t9num',()=>t9press('4'),1,true));
  r2.appendChild(mk('5','JKL',' t9num',()=>t9press('5'),1,true));
  r2.appendChild(mk('6','MNO',' t9num',()=>t9press('6'),1,true));
  r2.appendChild(mk('0','',' t9num',()=>t9press('0'),RW,true));
  // 行3: [空] 7PQRS 8TUV 9WXYZ  退格已在行1，这里放空格占位保持网格；实际行3末放"全屏候选/无"——保留对齐用回车移到行4
  r3.appendChild(pad(LW));
  r3.appendChild(mk('7','PQRS',' t9num',()=>t9press('7'),1,true));
  r3.appendChild(mk('8','TUV',' t9num',()=>t9press('8'),1,true));
  r3.appendChild(mk('9','WXYZ',' t9num',()=>t9press('9'),1,true));
  r3.appendChild(pad(RW));
  // 行4: [计算器] 空格(=中3列宽) 回车
  r4.appendChild(mk('计算器','',' func',()=>{ t9code=''; showCands([]); calcFromGrid=true; num=true; calcMode=true; calcReset(); switchNum(); },LW));
  r4.appendChild(mk('空格','',' ',()=>{ if(t9code){t9commitFirst();} else commit(' '); },3));
  r4.appendChild(mk('回车','',' accent',()=>{ if(t9code){t9commitFirst();t9code='';} else pressEnter(); },RW));
}
function t9UpdateCode(cands){
  const el=document.getElementById('codeText');
  if(!el) return;
  if(!t9code){ el.textContent=''; return; }
  // 显示拼音字母：取置顶候选的拼音编码(c字段)，但**必须与已按键数对齐**——
  // 候选可能是更长编码的前缀匹配(按1键查出"hai"等3字母音节)，直接显示会让编码栏
  // 凭空多出未按的字母。只在候选拼音长度==已按键数时采用其拼写，否则按已按数字
  // 取各档首字母粗拼，保证"按几个键就显示几个字母"。
  const n=t9code.length;
  let py='';
  if(cands && cands.length && cands[0].c && cands[0].c.length===n){ py=cands[0].c; }
  if(!py){ py=t9code.split('').map(d=>(T9_GROUPS[d]||'').charAt(0)||'').join(''); }
  el.textContent=py;
}
let _t9QueryTimer=null;
function t9press(d){
  if(t9NumMode){ commit(d); return; }   // Num 灯亮：直接上屏纯数字
  // 灯灭(拼音模式)：1 无字母不参与拼音组合（按1是主键盘切换，已在按键处理）
  if(d==='1'){ return; }
  // 关键：计码即时累加，绝不丢码；候选查询去抖合并，避免连打时每键同步字典查询阻塞主线程。
  t9code+=d;
  if(_t9QueryTimer){ clearTimeout(_t9QueryTimer); _t9QueryTimer=null; }
  _t9QueryTimer=setTimeout(()=>{
    _t9QueryTimer=null;
    const cands=t9code?t9Cands(t9code,30):[];
    t9UpdateCode(cands);
    showCands(cands);
  }, 28);
}
// 连打中途需要立即用候选时（空格/回车上屏），强制冲刷待查询
function t9FlushQuery(){
  if(_t9QueryTimer){ clearTimeout(_t9QueryTimer); _t9QueryTimer=null; }
  const cands=t9code?t9Cands(t9code,30):[];
  t9UpdateCode(cands);
  showCands(cands);
  return cands;
}
function t9del(){
  if(_t9QueryTimer){ clearTimeout(_t9QueryTimer); _t9QueryTimer=null; }
  if(t9code){ t9code=t9code.slice(0,-1); const cands=t9code?t9Cands(t9code,30):[]; t9UpdateCode(cands); showCands(cands); }
  else doDelete();
}
function t9commitFirst(){
  if(_t9QueryTimer){ clearTimeout(_t9QueryTimer); _t9QueryTimer=null; }  // 取消待查询，防上屏后回填旧候选
  const c=t9Cands(t9code,1);
  if(c.length){ commit(c[0].w); }
  t9code=''; t9UpdateCode(); showCands([]);
}
function t9commitRaw(){ t9code=''; t9UpdateCode(); showCands([]); }
// T9 候选：真机走 Java 真实词库(含连打)，模拟器回退到内嵌 PINYIN
function t9Cands(code,maxN){
  if(!code) return [];
  if(typeof Android!=='undefined' && Android.queryT9){
    try{
      const r=JSON.parse(Android.queryT9(code)||'[]');
      if(r&&r.length) return r.slice(0,maxN);
    }catch(e){}
  }
  return t9CandsLocal(code,maxN);
}
// 模拟器本地回退（内嵌小词库，仅供浏览器预览）
function t9CandsLocal(code,maxN){
  if(!code) return [];
  const groups=code.split('').map(d=>T9_GROUPS[d]||'');
  if(groups.some(g=>!g)) return [];
  const seen=new Set(), out=[];
  for(const key of Object.keys(PINYIN)){
    if(key.length<groups.length) continue;
    let ok=true;
    for(let i=0;i<groups.length;i++){ if(groups[i].indexOf(key[i])<0){ ok=false; break; } }
    if(!ok) continue;
    for(const c of PINYIN[key]){
      if(!seen.has(c.w)){ seen.add(c.w); out.push({w:c.w, f:c.f, c:key}); if(out.length>=maxN*3) break; }
    }
    if(out.length>=maxN*3) break;
  }
  out.sort((a,b)=>(b.f||0)-(a.f||0));
  return out.slice(0,maxN);
}
function buildRow(id, keys) {
  const row=document.getElementById(id); row.innerHTML='';
  keys.forEach(k=>{
    const div=makeKey(k);
    const lbl=(shift||caps)?k:k.toLowerCase();
    const sub=(mode==='wubi'&&k!=='Z'&&ROOTS[k])?ROOTS[k]:'';
    setKeyContent(div,lbl,sub);
    // ===== Ctrl 功能层 =====
    if(ctrl||ctrlLock){
      // 第一排 QWERTYUIOP → 1234567890（纯阿拉伯数字，无"数字"字样）
      const numMap={Q:'1',W:'2',E:'3',R:'4',T:'5',Y:'6',U:'7',I:'8',O:'9',P:'0'};
      if(numMap[k]){
        div.classList.add('arrow-active');
        div.innerHTML=`<span class="km" style="font-size:20px">${numMap[k]}</span>`;
      }
      // a/z/x/c/v → 保留字母 + 功能字样(与方向键同款：主字母 km + 小字 ks)
      const editMap={A:'全选',Z:'撤销',X:'剪切',C:'复制',V:'粘贴'};
      if(editMap[k]){
        div.classList.add('arrow-active');
        div.innerHTML=`<span class="km" style="font-size:17px!important;color:var(--ktxt)!important;font-weight:400!important;line-height:1">${k.toLowerCase()}</span><span class="ks" style="font-size:8px">${editMap[k]}</span>`;
      }
      // L 键 → 音效开关
      if(k==='L'){
        div.classList.add('arrow-active');
        const icon = soundOn
          ? `<svg width="20" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9v6h4l5 4V5L7 9H3z"/><path d="M16 8a5 5 0 0 1 0 8"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>`
          : `<svg width="20" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9v6h4l5 4V5L7 9H3z"/><line x1="16" y1="9" x2="22" y2="15"/><line x1="22" y1="9" x2="16" y2="15"/></svg>`;
        div.innerHTML=`<span class="km">${icon}</span><span class="ks" style="font-size:8px">${soundOn?'音效':'静音'}</span>`;
      }
      // G 键 → 九宫格切换（仅拼音模式）
      if(k==='G' && mode==='pinyin'){
        div.classList.add('arrow-active');
        div.innerHTML=`<span class="km">⊞</span><span class="ks" style="font-size:8px">九宫格</span>`;
      }
    }
    if((alt||ctrl||ctrlLock)&&['J','B','N','M'].includes(k)){
      div.classList.add('arrow-active');
      const arrowMap={J:'↑',B:'←',N:'↓',M:'→'};
      const subMap=(ctrl||ctrlLock)?{J:'文首',B:'行首',N:'文末',M:'行尾'}:{J:'选上行',B:'左',N:'选下行',M:'右'};
      div.innerHTML=`<span class="km">${arrowMap[k]}</span>${subMap[k]?`<span class="ks" style="font-size:8px">${subMap[k]}</span>`:''}`;
    }
    // Alt 模式：q=Tab(下一段)、e=Tab(下一项)；a 恢复字母原状
    if(alt && k==='Q'){
      div.classList.add('arrow-active');
      div.innerHTML=`<span class="km">Tab</span><span class="ks" style="font-size:8px">下一段</span>`;
    }
    if(alt && k==='E'){
      div.classList.add('arrow-active');
      div.innerHTML=`<span class="km">Tab</span><span class="ks" style="font-size:8px">下一项</span>`;
    }
    // 纯输入态：字母键按下(touchstart)即时出码，像固件键盘瞬时响应、快打不丢码；
    // 修饰层(alt/ctrl/锁定)下是方向/Tab功能键，保持 touchend 防连触误选。
    addKeyListeners(div,()=>pressKey(k), !alt && !ctrl && !ctrlLock);
    row.appendChild(div);
  });
}

  <path d="M9.5 1H24C24.55 1 25 1.45 25 2V16C25 16.55 24.55 17 24 17H9.5C9.1 17 8.73 16.78 8.53 16.43L1.5 9L8.53 1.57C8.73 1.22 9.1 1 9.5 1Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
  <line x1="14" y1="6" x2="21" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="21" y1="6" x2="14" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
</svg>`;
  // 长按连续删除
  let _dt=null,_dr=null;
  const startD=()=>{doDelete();_dt=setTimeout(()=>{_dr=setInterval(doDelete,50);},500);};
  const stopD=()=>{clearTimeout(_dt);clearInterval(_dr);};
  delKey.addEventListener('touchstart',e=>{e.preventDefault();startD();delKey.classList.add('pressed');},{passive:false});
  delKey.addEventListener('touchend',()=>{stopD();delKey.classList.remove('pressed');},{passive:true});
  delKey.addEventListener('touchcancel',()=>{stopD();delKey.classList.remove('pressed');},{passive:true});
  delKey.addEventListener('mousedown',startD);

function buildRow4() {
  const row=document.getElementById('r4'); row.innerHTML='';
  // Ctrl（含 Ctrl+Shift 切换语言）
  const ctrlDiv=makeKey('CTRL','func ctrl-key'+(ctrl?' held':'')+(ctrlLock?' locked':''));
  // Ctrl 字样：颜色/字重与 Alt 标签一致(km 主字色)；锁定时附"锁定"小字
  ctrlDiv.innerHTML=`<span class="km" style="font-size:13px">Ctrl</span>${ctrlLock?'<span class="ks" style="font-size:8px">锁定</span>':''}`;
  let _ctrlTouched=false;
  const _ctrlToggle = () => {
    playClick();
    if (shift) { cycleMode(); ctrl=false; ctrlLock=false; shift=false; alt=false; buildKb(); return; }
    const now=Date.now();
    if (ctrlLock) {                       // 已锁定 → 任意点击解锁退出
      ctrlLock=false; ctrl=false; _lastCtrlTap=0; buildKb(); return;
    }
    if (ctrl && (now-_lastCtrlTap)<400) { // 第二次快速点击 → 锁定功能层
      ctrlLock=true; ctrl=true; alt=false; _lastCtrlTap=0; buildKb(); return;
    }
    ctrl = !ctrl; if(ctrl) alt=false;     // 单击：瞬时 Ctrl（按一个键后消费）
    _lastCtrlTap = ctrl?now:0;
    buildKb();
  };
  ctrlDiv.addEventListener('touchstart', e=>{e.preventDefault(); _ctrlTouched=true; _ctrlToggle();}, {passive:false});
  ctrlDiv.addEventListener('touchend', ()=>{setTimeout(()=>{_ctrlTouched=false;},600);}, {passive:true});
  ctrlDiv.addEventListener('mousedown',  e=>{e.preventDefault(); if(_ctrlTouched)return; _ctrlToggle();});
  row.appendChild(ctrlDiv);
  // Alt
  const altDiv=makeKey('ALT','func alt-key'+(alt?' held':''));
  setKeyContent(altDiv,'Alt','');
  let _altTouched=false;
  const _altToggle = () => {
    playClick();
    alt=!alt; if(alt){ctrl=false; shift=false; caps=false;}   // 互斥：开 Alt 时关 Ctrl/Shift
    buildKb();
  };
  altDiv.addEventListener('touchstart', e=>{e.preventDefault(); _altTouched=true; _altToggle();}, {passive:false});
  altDiv.addEventListener('touchend', ()=>{setTimeout(()=>{_altTouched=false;},600);}, {passive:true});
  altDiv.addEventListener('mousedown',  e=>{e.preventDefault(); if(_altTouched)return; _altToggle();});
  row.appendChild(altDiv);
  // 空格
  const sp=makeKey('SPC','space-key'); sp.style.flex='1';
  setKeyContent(sp,'空格','');
  addKeyListeners(sp,pressSpace,true);
  row.appendChild(sp);
  // 回车
  const en=makeKey('ENT','accent enter-key');
  setKeyContent(en,'回车','');
  addKeyListeners(en,pressEnter);
  row.appendChild(en);
}

function buildNumpad() {
  const np=document.getElementById('numpad'); np.innerHTML='';
  np.style.cssText='display:flex;gap:5px;padding:5px';
  if(calcMode){ buildCalcPad(np); return; }
  // ===== Issue3 普通数字键盘（重构）=====
  // 布局：
  //   7 8 9 | [删除·返回](双用：左半删除/长按连删，右半返回上一键盘)

// ===== 计算器模式 =====
function buildCalcPad(np){
  np.style.cssText='display:flex;flex-direction:column;gap:5px;padding:5px';
  // 显示条：算式 + 结果
  const disp=document.createElement('div');
  disp.className='calc-disp';
  disp.innerHTML=`<div class="calc-expr" id="calcExpr">${calcDisplayExpr()}</div>`+
                 `<div class="calc-res" id="calcRes">${calcResult!==null?('= '+calcResult):''}</div>`;
  np.appendChild(disp);
  // 键区：4列 × 4行
  const grid=document.createElement('div');
  grid.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,44px);gap:5px;flex:1';
  // %  | × | ÷ | 删除/归零(一键双用)
  // 7 8 9 -
  // 4 5 6 +
  // 1 2 3 =
  const layout=[
    [{k:'%',c:'func'},{k:'×',c:'func'},{k:'÷',c:'func'},{k:'DELZ',c:'func',dual:true}],
    [{k:'7'},{k:'8'},{k:'9'},{k:'-',c:'func'}],
    [{k:'4'},{k:'5'},{k:'6'},{k:'+',c:'func'}],
    [{k:'1'},{k:'2'},{k:'3'},{k:'PUTZ',c:'accent',putdual:true}],
  ];
  layout.forEach(row=>row.forEach(o=>{
    const div=document.createElement('div');
    div.className='num-key'+(o.c?' '+o.c:'');
    if(o.dual){
      // 一键双用：左半删除图标(正常色) + 右半归零(略深色)。单击删除、长按归零。
      div.classList.add('calc-delz');
      div.innerHTML=
        `<span class="delz-l">`+
          `<svg width="18" height="13" viewBox="0 0 26 18" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block">`+
          `<path d="M9.5 1H24C24.55 1 25 1.45 25 2V16C25 16.55 24.55 17 24 17H9.5C9.1 17 8.73 16.78 8.53 16.43L1.5 9L8.53 1.57C8.73 1.22 9.1 1 9.5 1Z" stroke="currentColor" stroke-width="1.5" fill="none"/>`+
          `<line x1="14" y1="6" x2="21" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>`+
          `<line x1="21" y1="6" x2="14" y2="13" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>`+
          `</svg>`+
        `</span>`+
        `<span class="delz-r">归零</span>`;
      // 单击删除、长按(≥500ms)归零；长按期间不再触发删除
      let _dz=null,_long=false;
      const startDZ=()=>{ _long=false; _dz=setTimeout(()=>{ _long=true; playClick(); calcKey('C'); },500); div.classList.add('pressed'); };
      const endDZ=()=>{ if(_dz){clearTimeout(_dz);_dz=null;} if(!_long){ playClick(); calcKey('DEL'); } div.classList.remove('pressed'); };
      const cancelDZ=()=>{ if(_dz){clearTimeout(_dz);_dz=null;} div.classList.remove('pressed'); };
      div.addEventListener('touchstart',e=>{e.preventDefault();startDZ();},{passive:false});
      div.addEventListener('touchend',e=>{e.preventDefault();endDZ();},{passive:false});
      div.addEventListener('touchcancel',cancelDZ,{passive:true});
      div.addEventListener('mousedown',e=>{e.preventDefault();startDZ();});
      div.addEventListener('mouseup',endDZ);
      div.addEventListener('mouseleave',cancelDZ);
    } else if(o.putdual){
      // Issue4: 上屏键改 DELZ 同款一键双用：左半=上屏(结果)，右半=算式(略深底)。
      //   单击=上屏计算结果；长按(≥500ms)=完整上屏(算式+结果，形如 "12+8=20")。
      div.classList.add('calc-delz');
      div.innerHTML=`<span class="delz-l" style="font-size:13px;font-weight:600">上屏</span>`+
                    `<span class="delz-r" style="font-size:13px;font-weight:600">算式</span>`;
      let _pz=null,_long=false;
      const startPZ=()=>{ _long=false; _pz=setTimeout(()=>{ _long=true; playClick(); calcKey('PUTALL'); },500); div.classList.add('pressed'); };
      const endPZ=()=>{ if(_pz){clearTimeout(_pz);_pz=null;} if(!_long){ playClick(); calcKey('PUT'); } div.classList.remove('pressed'); };
      const cancelPZ=()=>{ if(_pz){clearTimeout(_pz);_pz=null;} div.classList.remove('pressed'); };
      div.addEventListener('touchstart',e=>{e.preventDefault();startPZ();},{passive:false});
      div.addEventListener('touchend',e=>{e.preventDefault();endPZ();},{passive:false});
      div.addEventListener('touchcancel',cancelPZ,{passive:true});
      div.addEventListener('mousedown',e=>{e.preventDefault();startPZ();});
      div.addEventListener('mouseup',endPZ);
      div.addEventListener('mouseleave',cancelPZ);
    } else {
      div.innerHTML=`<span class="km" style="${o.t&&o.t.length>1?'font-size:13px':''}">${o.t||o.k}</span>`;
      addKeyListeners(div,()=>calcKey(o.k));
    }
    grid.appendChild(div);
  }));
  np.appendChild(grid);
  // 底行（等宽4格）：退出  0  .  =
  const bottom=document.createElement('div');
  bottom.style.cssText='display:grid;grid-template-columns:repeat(4,1fr);gap:5px;height:44px';
  [{k:'EXIT',c:'func',t:'退出'},
   {k:'0'},
   {k:'.'},
   {k:'=',c:'accent'}].forEach(o=>{
    const div=document.createElement('div');
    div.className='num-key'+(o.c?' '+o.c:'');
    div.innerHTML=`<span class="km" style="${o.t?'font-size:13px':''}">${o.t||o.k}</span>`;
    addKeyListeners(div,()=>calcKey(o.k));
    bottom.appendChild(div);
  });
  np.appendChild(bottom);
}

function calcReset(){ calcExpr=''; calcResult=null; }
// Issue6: 计算器显示转换——百分号团显示为「(数字%」，数字排在左括号与百分号之间。
//   calcExpr 仍按用户输入顺序存(如 100%20.22，% 紧跟左数之后)，仅显示层做转换：
//     · 把 % 处替换为 '('，并将 % 移到其后数字串的末尾 → 100%20.22 显示 100(20.22%
//     · 该百分团之后若还有字符(运算符/继续输入介入)→ 收括 → 100(20.22%)÷
//     · 团仍在末尾(还在输入)→ 只开括不收括 → 100(20.22%
//   仅影响显示，calcExpr 本身保持纯净供 calcEval。
function calcDisplayExpr(seal){
  const s=calcExpr;
  if(!s) return '0';
  if(s.indexOf('%')<0) return s;
  let out=''; let i=0;
  while(i<s.length){
    const c=s[i];
    if(c==='%'){
      // % 后紧跟的数字串(可含小数点)
      let j=i+1;
      while(j<s.length && (s[j]>='0'&&s[j]<='9' || s[j]==='.')) j++;
      const num=s.slice(i+1,j);          // % 后面的数字，如 "20.22"
      // 数字夹在 ( 与 % 之间；团后还有字符、或强制收口(=/上屏)则收括
      out += '(' + num + '%' + ((j<s.length||seal) ? ')' : '');
      i=j;
    } else { out+=c; i++; }
  }
  return out;
}
function calcRefresh(seal){
  const e=document.getElementById('calcExpr'); if(e)e.textContent=calcDisplayExpr(seal);
  const r=document.getElementById('calcRes'); if(r)r.textContent=(calcResult!==null?('= '+calcResult):'');
}
function calcKey(k){
  if(k==='C'){ calcReset(); calcRefresh(); return; }       // 归零（长按删除键触发）
  if(k==='DEL'){ calcExpr=calcExpr.slice(0,-1); calcLive(); return; }
  if(k==='EXIT'){
    calcMode=false;
    if(calcFromGrid){ calcFromGrid=false; num=false; switchNum(); return; }  // 回退九宫格
    buildNumpad(); return;
  }
  if(k==='PUT'){
    // 上屏：优先上屏结果，无结果则先算；上屏后保留算式可继续算
    let val=calcResult;
    if(val===null){ val=calcEval(calcExpr); }
    if(val!==null && val!=='错误'){ commit(String(val)); }
    return;
  }
  if(k==='PUTALL'){
    // Issue6: 完整上屏——把计算器【显示内容】原样上屏(含百分号括号)，再接 "=结果"。
    //   不得丢任何显示元素：用 calcDisplayExpr() 而非纯 calcExpr，故 85+100(20.22%)=105.32。
    if(!calcExpr){ return; }
    let val=calcResult;
    if(val===null){ val=calcEval(calcExpr); }
    const shown=calcDisplayExpr(true);
    if(val!==null && val!=='错误'){ commit(shown+'='+String(val)); }
    else { commit(shown); }
    return;
  }
  if(k==='='){ const v=calcEval(calcExpr); calcResult=(v===null?'错误':v); calcRefresh(true); return; }
  if(k==='%'){
    // 百分号：紧跟数字/小数点后才追加（只允许一个 %）
    const last=calcExpr.slice(-1);
    if(calcExpr && (last>='0'&&last<='9' || last==='.') && !calcExpr.includes('%')) calcExpr+='%';
    calcLive(); return;
  }
  // 数字/运算符/小数点 追加
  const ops='+-×÷';
  if(ops.includes(k)){
    if(!calcExpr) { if(k==='-'){calcExpr='-';} } // 允许负号开头
    else if(ops.includes(calcExpr.slice(-1))) { calcExpr=calcExpr.slice(0,-1)+k; } // 替换末运算符
    else calcExpr+=k;
  } else {
    calcExpr+=k; // 数字或 .
  }
  calcLive();
}
// #11 实时预算：每次输入后自动算出中间结果显示（不需按=）
function calcLive(){
  const v=calcEval(calcExpr);
  calcResult=(v===null? null : v);   // 非法表达式不显示错误，仅留空，避免输入中途闪“错误”
  calcRefresh();
}
// 安全表达式求值：支持 + - × ÷ % 与优先级，无 eval。词法→%折叠→shunting-yard→求值
// 百分号规则（财务式·依附左数·成团优先级最高）：
//   "数%" 表示该数/100 的比例；它去乘紧邻左侧（隔一个运算符）的那个数，先结算成具体值。
//   + - 时：N% → 左数*N/100，运算符保留    (100+10% → 100+10 = 110)
//   × ÷ 时：左数 OP N% 整团 → 左数*N/100，运算符吸收  (12668×23.78% → 3012.45 成一团)
//   无左邻数（开头 N%）：退化为 N/100。
function calcEval(expr){
  if(!expr) return null;
  expr=expr.replace(/×/g,'*').replace(/÷/g,'/');
  // 词法
  const toks=[]; let i=0;
  while(i<expr.length){
    const c=expr[i];
    if(c>='0'&&c<='9'||c==='.'){ let j=i+1; while(j<expr.length&&(expr[j]>='0'&&expr[j]<='9'||expr[j]==='.'))j++; toks.push(expr.slice(i,j)); i=j; }
    else if(c==='%'){ toks.push('%'); i++; }
    else if('+-*/'.includes(c)){
      // 一元负号：表达式开头或前一个是运算符
      if(c==='-'&&(toks.length===0||'+-*/'.includes(toks[toks.length-1]))){ toks.push('u-'); i++; }
      else { toks.push(c); i++; }
    }
    else return null; // 非法字符
  }
  // 第一遍：折叠 %（t2 内数字已转为 number，运算符仍为字符串）
  const t2=[];
  for(let k=0;k<toks.length;k++){
    const tk=toks[k];
    if(tk==='%'){
      const N=t2.pop();
      if(N===undefined||typeof N!=='number') return null;
      // #11 "A%B" 形态：% 后面紧跟数字 → 表示「A 的 B%」= A*B/100
      const nxt=toks[k+1];
      if(nxt!==undefined && /^[\d.]+$/.test(nxt)){
        if((nxt.match(/\./g)||[]).length>1) return null;
        const B=parseFloat(nxt);
        t2.push(N*B/100);
        k++;               // 消费掉 B
        continue;
      }
      // 否则：N% 依附左数（财务式）
      if(t2.length>=2 && ['+','-','*','/'].includes(t2[t2.length-1]) && typeof t2[t2.length-2]==='number'){
        const OP=t2[t2.length-1], L=t2[t2.length-2];
        if(OP==='*'||OP==='/'){ t2.pop(); t2.pop(); t2.push(L*N/100); }   // 吸收运算符，整团
        else { t2.push(L*N/100); }                                       // 保留运算符
      } else {
        t2.push(N/100);                                                  // 无左邻数
      }
    } else if(/^[\d.]+$/.test(tk)){
      if((tk.match(/\./g)||[]).length>1) return null;
      t2.push(parseFloat(tk));
    } else {
      t2.push(tk);   // 运算符 / u-
    }
  }
  // 第二遍：shunting-yard → RPN
  const prec={'+':1,'-':1,'*':2,'/':2,'u-':3};
  const out=[],ops=[];
  for(const t of t2){
    if(typeof t==='number'){ out.push(t); }
    else if(t==='u-'){ ops.push(t); }
    else {
      while(ops.length){ const o=ops[ops.length-1]; if(prec[o]>=prec[t]){ out.push(ops.pop()); } else break; }
      ops.push(t);
    }
  }
  while(ops.length) out.push(ops.pop());
  // 求值
  const st=[];
  for(const t of out){
    if(typeof t==='number'){ st.push(t); }
    else if(t==='u-'){ if(!st.length)return null; st.push(-st.pop()); }
    else {
      if(st.length<2)return null;
      const b=st.pop(),a=st.pop();
      let v; if(t==='+')v=a+b; else if(t==='-')v=a-b; else if(t==='*')v=a*b;
      else { if(b===0)return null; v=a/b; }
      st.push(v);
    }
  }
  if(st.length!==1) return null;
  let r=st[0];
  if(!isFinite(r)) return null;
  // 浮点修整：最多保留 8 位小数，去尾零
  r=Math.round(r*1e8)/1e8;
  return r;
}

let _symCat=0;
// ===== 符号：每类可长按拖拽自由排序(持久化) + 短前缀在前、长缀加宽排到末行 =====
let _symOrder={};
try{ const so=localStorage.getItem('kbSymOrder'); if(so) _symOrder=JSON.parse(so)||{}; }catch(e){ _symOrder={}; }
function symSaveOrder(){ try{ localStorage.setItem('kbSymOrder', JSON.stringify(_symOrder)); }catch(e){} }
// 列跨度：短符号占1列(每行8个)，长前缀按字符数加宽以充分显示
function symSpan(p){ const L=[...p].length; return L<=2?1 : L<=4?2 : L<=6?3 : 4; }
// 默认顺序：按列跨度升序稳定排序 → 短的在前(密排8/行)，长缀自然落到末行
function symDefaultOrder(ci){
  return SYMBOL_CATS[ci].list.map((p,i)=>[p,i])
    .sort((a,b)=>{ const d=symSpan(a[0])-symSpan(b[0]); return d!==0?d:a[1]-b[1]; })
    .map(x=>x[0]);
}
// 取某类当前顺序：有自定义则用自定义(并校正失效/补齐新增)，否则用默认
function symGetOrder(ci){
  const def=symDefaultOrder(ci);
  const saved=_symOrder[ci];
  if(!saved || !saved.length) return def;
  const valid=new Set(SYMBOL_CATS[ci].list), seen=new Set(), out=[];
  saved.forEach(p=>{ if(valid.has(p)&&!seen.has(p)){ out.push(p); seen.add(p); } });
  def.forEach(p=>{ if(!seen.has(p)){ out.push(p); seen.add(p); } });
  return out;
}

//   位移/横滚判定 → 区分「点击切换分类」与「左右滑动浏览」；命中标签调当前面板的回调。
function initCatStripGestures(){
  const tabs=document.getElementById('catStrip');
  if(!tabs || tabs._wired) return; tabs._wired=true;
  let x0=0,y0=0,sl0=0;
  const hit=(cx,cy)=>{ let el=document.elementFromPoint(cx,cy); while(el&&el!==tabs&&!(el.dataset&&el.dataset.tabIdx!=null)) el=el.parentElement; return (el&&el.dataset&&el.dataset.tabIdx!=null)?parseInt(el.dataset.tabIdx):-1; };
  tabs.addEventListener('touchstart',e=>{ x0=e.touches[0].clientX; y0=e.touches[0].clientY; sl0=tabs.scrollLeft; },{passive:true});
  tabs.addEventListener('touchend',e=>{
    const c=e.changedTouches[0];
    if(Math.abs(c.clientX-x0)>=14 || Math.abs(c.clientY-y0)>=14 || Math.abs(tabs.scrollLeft-sl0)>=6) return;  // 滑动→不选
    const idx=hit(c.clientX,c.clientY); if(idx>=0 && _catSelectFn) _catSelectFn(idx);
  },{passive:true});
  tabs.addEventListener('click',e=>{                                   // 鼠标/模拟器
    if('ontouchstart' in window) return;
    let el=e.target; while(el&&el!==tabs&&!(el.dataset&&el.dataset.tabIdx!=null)) el=el.parentElement;
    if(el&&el.dataset&&el.dataset.tabIdx!=null && _catSelectFn) _catSelectFn(parseInt(el.dataset.tabIdx));
  });
}
// 在面板顶部插入一个拖拽手柄，上下拖动改变面板高度（rAF 节流，丝滑无颤）
function mkDragHandle(){
  const bar=document.createElement('div');
  // Issue7: 重做为"两条跟随主题色的长直线"——这两条平行直线即调节高度的滑杆。
  //   符号/表情/剪贴板三个面板共用此手柄。背景透明，仅靠两条主题色线表达可拖拽。
  bar.style.cssText='position:relative;z-index:5;display:flex;flex-direction:column;align-items:stretch;justify-content:center;gap:3px;height:14px;flex:0 0 auto;cursor:ns-resize;touch-action:none;padding:0 10px;';
  const line1=document.createElement('div');
  line1.style.cssText='width:100%;height:2px;border-radius:2px;background:var(--ac,#c75f33)';
  const line2=document.createElement('div');
  line2.style.cssText='width:100%;height:2px;border-radius:2px;background:var(--acl,#eb976f)';
  bar.appendChild(line1); bar.appendChild(line2);
  let startY=0,startH=0,drag=false,pendH=_panelH,raf=0;
  // rAF 节流：touchmove 只记录目标值，下一帧统一应用一次，避免每次事件都 reflow 造成抖动
  const flush=()=>{ raf=0; _panelH=pendH; document.documentElement.style.setProperty('--panelH', _panelH+'px'); };
  const down=y=>{ drag=true; startY=y; startH=_panelH; };
  const move=y=>{ if(!drag)return; const dy=startY-y; let h=startH+dy; h=Math.max(80,Math.min(420,h)); pendH=h; if(!raf) raf=requestAnimationFrame(flush); };
  const up=()=>{ if(!drag)return; drag=false; if(raf){cancelAnimationFrame(raf);flush();} try{localStorage.setItem('panelH2',String(_panelH));}catch(e){} };
  bar.addEventListener('touchstart',e=>{ down(e.touches[0].clientY); },{passive:true});
  bar.addEventListener('touchmove',e=>{ e.preventDefault(); move(e.touches[0].clientY); },{passive:false});
  bar.addEventListener('touchend',up,{passive:true});
  bar.addEventListener('touchcancel',up,{passive:true});
  bar.addEventListener('mousedown',e=>{ down(e.clientY); const mm=ev=>move(ev.clientY); const mu=()=>{up();document.removeEventListener('mousemove',mm);document.removeEventListener('mouseup',mu);}; document.addEventListener('mousemove',mm); document.addEventListener('mouseup',mu); });
  return bar;
}
function buildPunct() {
  const wrap = document.getElementById('punctG');
  wrap.innerHTML = '';

  wrap.appendChild(mkDragHandle());   // 顶部拖拽手柄(冻结置顶，不随内容滚动)

  const tabs=document.getElementById('catStrip');

  const grid=document.createElement('div');

  // 渲染某分类符号到网格(仅替换网格内容)：8/行、单击上屏、长按拖拽排序
  const renderGrid=(ci)=>{
    grid.innerHTML='';
    const order=symGetOrder(ci);
    // 拖拽共享态(单指，跨格共用)
    let dragEl=null,dragSym=null,clone=null,longTimer=null,startX=0,startY=0,dragging=false;
    const cleanupDrag=()=>{
      if(longTimer){ clearTimeout(longTimer); longTimer=null; }
      if(clone){ clone.remove(); clone=null; }
      if(dragEl){ dragEl.style.opacity=''; dragEl=null; }
      dragging=false; dragSym=null;
      Array.from(grid.children).forEach(c=>{ c.style.outline=''; });
    };
    const finishReorder=(targetSym,after)=>{
      const cur=symGetOrder(ci).slice();
      const from=cur.indexOf(dragSym);
      if(from<0){ cleanupDrag(); return; }
      cur.splice(from,1);
      let to=cur.indexOf(targetSym);
      if(to<0) cur.push(dragSym);
      else { if(after) to+=1; cur.splice(to,0,dragSym); }

        startX=e.touches[0].clientX; startY=e.touches[0].clientY;
        longTimer=setTimeout(()=>{        // 长按 280ms → 进入拖拽排序
          dragging=true; dragSym=p; dragEl=div;
          try{ if(navigator.vibrate) navigator.vibrate(12); }catch(_){}
          const r=div.getBoundingClientRect();
          clone=document.createElement('div');
          clone.textContent=p;
          clone.style.cssText='position:fixed;left:'+r.left+'px;top:'+r.top+'px;width:'+r.width+'px;height:'+r.height+'px;margin:0;z-index:300;pointer-events:none;opacity:0.96;transform:scale(1.12);box-shadow:0 6px 18px rgba(0,0,0,0.28);border-radius:10px;display:flex;align-items:center;justify-content:center;background:var(--ac,#e86030);color:#fff;font-size:'+div.style.fontSize;
          document.body.appendChild(clone);
          div.style.opacity='0.25';
        },280);
      },{passive:true});
      div.addEventListener('touchmove',e=>{
        const t=e.touches[0];
        if(!dragging){     // 未进入拖拽：位移即取消长按，放行面板滚动
          if(Math.abs(t.clientX-startX)>10||Math.abs(t.clientY-startY)>10){ _moved=true; if(longTimer){ clearTimeout(longTimer); longTimer=null; } }
          return;
        }
        e.preventDefault();
        if(clone){ clone.style.left=(t.clientX-clone.offsetWidth/2)+'px'; clone.style.top=(t.clientY-clone.offsetHeight/2)+'px'; }
        let el=document.elementFromPoint(t.clientX,t.clientY);
        while(el&&el!==grid&&!(el.dataset&&el.dataset.sym)) el=el.parentElement;
        Array.from(grid.children).forEach(c=>{ c.style.outline=''; });
        if(el&&el.dataset&&el.dataset.sym&&el!==div){ el.style.outline='2px solid var(--ac,#e86030)'; el.style.outlineOffset='-2px'; }
      },{passive:false});
      div.addEventListener('touchend',e=>{
        if(dragging){
          const t=e.changedTouches[0];
          let el=document.elementFromPoint(t.clientX,t.clientY);
          while(el&&el!==grid&&!(el.dataset&&el.dataset.sym)) el=el.parentElement;
          if(el&&el.dataset&&el.dataset.sym&&el.dataset.sym!==dragSym){
            const r=el.getBoundingClientRect();
            finishReorder(el.dataset.sym, t.clientX>r.left+r.width/2);
          } else cleanupDrag();
          return;
        }
        if(longTimer){ clearTimeout(longTimer); longTimer=null; }
        if(_touched&&!_moved&&Date.now()-_t0<500){ insPunct(p); }   // 快速点 → 上屏
        _touched=false;
      },{passive:true});
      div.addEventListener('touchcancel',()=>{ cleanupDrag(); _touched=false; },{passive:true});
      div.addEventListener('click',()=>{ if(!('ontouchstart' in window)) insPunct(p); });  // 模拟器
      grid.appendChild(div);
    });
  };
  // 切换分类：更新高亮 + 换网格，**不动标签条 DOM、不动滚动位置**
  const selectCat=(ci)=>{
    _symCat=ci;
    Array.from(tabs.children).forEach((t,i)=>{ t.classList.toggle('on', i===ci); });
    renderGrid(ci);
  };
  _catSelectFn=selectCat;

  // 标签条手势统一由 initCatStripGestures() 在 #catStrip 上挂一次处理(点击/横滑判定)。
  SYMBOL_CATS.forEach((cat,i)=>{
    const t=document.createElement('div');
    const active=(i===_symCat);
    t.className='cat-chip'+(active?' on':'');
    t.setAttribute('data-tab-idx',i);

  wrap.appendChild(grid);
  renderGrid(_symCat);
  syncCodeBar();
  // 首次构建时把当前分类标签滚入可视区(仅不可见才滚，夹紧不越界)；之后切换不再重建、不重置滚动。
  requestAnimationFrame(()=>{
    const at=tabs.querySelector('[data-active-tab]');
    if(!at) return;
    const sL=tabs.scrollLeft, sW=tabs.clientWidth, tL=at.offsetLeft, tW=at.offsetWidth;
    if(tL>=sL && tL+tW<=sL+sW) return;
    const target=Math.max(0, Math.min(tabs.scrollWidth-sW, tL-(sW-tW)/2));
    if(tabs.scrollTo) tabs.scrollTo({left:target,behavior:'smooth'});
    else tabs.scrollLeft=target;
  });
}

// ====== 输入逻辑 ======
function pressKey(k) {
  const l=k.toLowerCase();
  // ===== Ctrl 锁定层：连续输入数字，方向键可用，仅按 Ctrl 键本身退出 =====
  if(ctrlLock){
    const numMap={q:'1',w:'2',e:'3',r:'4',t:'5',y:'6',u:'7',i:'8',o:'9',p:'0'};
    if(numMap[l]){ commit(numMap[l]); return; }          // 连续上屏数字，不退出锁定
    if(['j','b','n','m'].includes(l)){ handleCtrl(l); return; }  // 方向键：行首/行尾/文首/文末，不退出
    // 编辑功能键：与单击 Ctrl 同款，锁定层保持不退出，可连续操作
    if(l==='a'){ handleCtrl('a'); return; }   // 全选
    if(l==='z'){ handleCtrl('z'); return; }   // 撤销
    if(l==='x'){ handleCtrl('x'); return; }   // 剪切
    if(l==='c'){ handleCtrl('c'); return; }   // 复制
    if(l==='v'){ handleCtrl('v'); return; }   // 粘贴
    if(l==='l'){ toggleSound(); buildKb(); return; }                         // 音效开关
    if(l==='g'&&mode==='pinyin'){ togglePyGrid(); return; }                  // 九宫格
    // 其余键在锁定层无动作，忽略
    return;
  }
  if(alt||ctrl) {
    if(['j','b','n','m'].includes(l)){
      if(alt) handleAlt(l);   // Alt 方向：保持 Alt 以便连续扩选
      else { handleCtrl(l); ctrl=false; setTimeout(buildKb,0); }
      return;
    }
    if(alt && l==='q'){ handleAlt('q'); return; }   // Alt+Tab：跳段末，保持 Alt 可连续跳
    if(alt && l==='e'){ handleAlt('a'); return; }   // Alt+E：跨文本框跳转，保持 Alt 可连续跨
    if(ctrl){
      // Ctrl 功能层
      const numMap={q:'1',w:'2',e:'3',r:'4',t:'5',y:'6',u:'7',i:'8',o:'9',p:'0'};
      if(numMap[l]){ ctrl=false; commit(numMap[l]); setTimeout(buildKb,0); return; }   // 第一排数字
      if(l==='l'){ ctrl=false; toggleSound(); return; }                                 // Ctrl+L：音效开关
      if(l==='g'&&mode==='pinyin'){ ctrl=false; togglePyGrid(); return; }               // Ctrl+G：拼音九宫格
    }
    if(alt){ alt=false; setTimeout(buildKb,0); }   // Alt 模式按非方向键：自动退出 Alt，继续正常输入该键
    else if(ctrl){ handleCtrl(l); ctrl=false; setTimeout(buildKb,0); return; }
  }
  if(mode==='english'){ commit((shift||caps)?k:l); if(shift){shift=false;buildKb();} return; }
  // 五笔/拼音模式：Shift 或 Caps 激活时，字母键直接上屏大写字母（Shift 主打大写字母上屏），不进编码
  if((shift||caps)&&/^[A-Za-z]$/.test(k)){
    commit(k.toUpperCase());
    if(shift){shift=false;buildKb();}
    return;
  }
  if(mode==='wubi'&&!code&&l==='z'){ revMode=true; code='z'; updateCode(); return; }
  const ch=l;
  code+=ch; updateCode();
  if(mode==='wubi'&&!revMode&&code.length===4){
    const c=queryCands(1); if(c.length>0){commitCand(c[0]);return;}
  }
  if(shift){shift=false;buildKb();}
}
function pressShift() {
  if(alt) alt=false;   // 互斥：按 Shift 时关 Alt
  const now=Date.now();
  if(now-lastShiftT<380){caps=!caps;shift=false;}
  else{if(caps){caps=false;shift=false;}else shift=!shift;}
  lastShiftT=now; buildKb();
}
function pressSpace() {
  if(code){const c=queryCands(1);if(c.length>0)commitCand(c[0]);else{commit(' ');clearCode();}}
  else commit(' ');
}
function pressEnter() {
  if(code){const raw=revMode?code.slice(1):code;commit(raw);clearCode();}
  else commit('\n');
}
function pressNum(k) {
  if(k==='↵')commit('\n');
  else if(k==='空格')commit(' ');
  else if(k==='⌫'){ doDelete(); }
  else commit(k);
}
// ====== 选区工具 ======
function getFullText(){return tB+tA;}
function getCursorPos(){return tB.length;}
function setCursor(pos){const full=getFullText();pos=Math.max(0,Math.min(pos,full.length));tB=full.slice(0,pos);tA=full.slice(pos);clearSel();updateEditor();}

function getSelRange(){
  if(selAnchor<0)return null;
  const active=getCursorPos();
  const s=Math.min(selAnchor,active),e=Math.max(selAnchor,active);
  return s===e?null:{start:s,end:e};
}
function getSelText(){
  const r=getSelRange();
  return r?getFullText().slice(r.start,r.end):'';
}
function hasSelection(){return getSelRange()!==null;}
function deleteSelection(){
  const r=getSelRange();if(!r)return false;
  const full=getFullText();
  tB=full.slice(0,r.start);tA=full.slice(r.end);selAnchor=-1;return true;
}
function clearSel(){selAnchor=-1;}
function lineStartOf(pos){const full=getFullText();const i=full.lastIndexOf('\n',pos-1);return i<0?0:i+1;}
function lineEndOf(pos){const full=getFullText();const i=full.indexOf('\n',pos);return i<0?full.length:i;}

// ====== 组合键 ======
function handleAlt(l){
  const pos = getCursorPos(), full = getFullText();
  // 首次操作时设置选区锚点（固定端）
  if (selAnchor < 0) selAnchor = pos;
  if (l === 'b') {                        // Alt+B → 向左扩选一字符（←）
    if (pos > 0) { tB = full.slice(0, pos-1); tA = full.slice(pos-1); }
    updateEditor(); return;
  }
  if (l === 'm') {                        // Alt+M → 向右扩选一字符（→）
    if (pos < full.length) { tB = full.slice(0, pos+1); tA = full.slice(pos+1); }
    updateEditor(); return;
  }
  if (l === 'j') {                        // Alt+J → 扩选至行首（↑ / Home）
    const ls = lineStartOf(pos);
    tB = full.slice(0, ls); tA = full.slice(ls);
    updateEditor(); return;
  }
  if (l === 'n') {                        // Alt+N → 扩选至行尾（↓ / End）
    const le = lineEndOf(pos);
    tB = full.slice(0, le); tA = full.slice(le);
    updateEditor(); return;
  }
}
function handleCtrl(l){
  const pos=getCursorPos(),full=getFullText();
  if(l==='b'){// Ctrl+B(←): 跳至行首
    setCursor(lineStartOf(pos));return;}
  if(l==='m'){// Ctrl+M(→): 跳至行尾
    setCursor(lineEndOf(pos));return;}
  if(l==='j'){// Ctrl+J(Home): 跳至全文开头
    setCursor(0);return;}
  if(l==='n'){// Ctrl+N(End): 跳至全文末尾
    setCursor(full.length);return;}
  if(l==='a'){selAnchor=0;tB=full;tA='';updateEditor();return;}
  if(l==='c'){
    const txt=hasSelection()?getSelText():full;
    if(txt){addClip(txt);}
    navigator.clipboard&&navigator.clipboard.writeText(txt);
    return;}
  if(l==='x'){
    const txt=hasSelection()?getSelText():full;
    if(txt){addClip(txt);}
    navigator.clipboard&&navigator.clipboard.writeText(txt);
    if(hasSelection())deleteSelection();else{tB='';tA='';clearSel();}
    updateEditor();return;}
  if(l==='v'){
    const doPaste=t=>{deleteSelection();commit(t);};
    if(navigator.clipboard&&navigator.clipboard.readText){
      navigator.clipboard.readText().then(doPaste).catch(()=>{if(clips.length)doPaste(clips[0]);});
    } else if(clips.length){doPaste(clips[0]);}
    return;
  }
}
function moveCur(n) {
  clearSel();
  if(n>0&&tA.length>0){tB+=tA[0];tA=tA.slice(1);}
  else if(n<0&&tB.length>0){tA=tB[tB.length-1]+tA;tB=tB.slice(0,-1);}
  updateEditor();
}
function moveCurLine(n) {
  clearSel();
  if(n<0){const i=tB.lastIndexOf('\n');if(i>=0){tA=tB.slice(i+1)+tA;tB=tB.slice(0,i);}else{tA=tB+tA;tB='';}}
  else{const i=tA.indexOf('\n');if(i>=0){tB+=tA.slice(0,i);tA=tA.slice(i+1);}else{tB+=tA;tA='';}}
  updateEditor();
}
function doDelete() {
  if(code.length>0){code=code.slice(0,-1);if(!code)revMode=false;updateCode();return;}
  if(deleteSelection()){updateEditor();return;}
  if(tB.length>0){tB=tB.slice(0,-1);updateEditor();}
}
function commit(txt) {
  deleteSelection();
  tB+=txt; updateEditor();
}
function commitCand(c){commit(c.w);clearCode();if(typeof _t9QueryTimer!=='undefined'&&_t9QueryTimer){clearTimeout(_t9QueryTimer);_t9QueryTimer=null;}if(typeof t9code!=='undefined')t9code='';}
function clearCode(){code='';revMode=false;updateCode();}
function insPunct(p){lastSym=p;commit(p);}

// ====== 查询 ======
function queryCands(maxN) {
  maxN=maxN||15; if(!code)return[];
  const lcode=code.toLowerCase();
  // Android模式: 走Java DictEngine查完整词库
  if(typeof Android!=='undefined'&&Android.queryWubi) {
    if(mode==='wubi') {
      if(revMode&&lcode.length>1) {
        // 反查: 用拼音查，结果附加五笔编码
        try {
          const py=lcode.slice(1);
          const raw=JSON.parse(Android.queryPinyin(py));
          return raw.map(c=>({w:c.w,f:c.f,wbCode:lookupWubi(c.w)}));
        } catch(e){ return []; }
      }
      try {
        return JSON.parse(Android.queryWubi(lcode));
      } catch(e){ return []; }
    } else {
      try {
        let base=JSON.parse(Android.queryPinyin(lcode));
        // 连打整句：输入较长且首选未覆盖整串时，把整句切分结果置顶
        if(lcode.length>=4){
          try{
            const sent=Android.querySentence(lcode);
            if(sent && (!base.length || base[0].w!==sent)){
              // 去重后置顶
              base=base.filter(c=>c.w!==sent);
              base.unshift({w:sent,f:99999});
            }
          }catch(e){}
        }
        // 整词声母简拼：wm→我们（仅当全拼无精确命中时补充，避免污染正常拼音）
        if(lcode.length>=2 && lcode.length<=5){
          try{
            const brief=JSON.parse(Android.queryBrief(lcode));
            if(brief&&brief.length){
              const seen=new Set(base.map(c=>c.w));
              brief.forEach(c=>{ if(!seen.has(c.w)){ base.push(c); } });
            }
          }catch(e){}
        }
        return base;
      } catch(e){ return []; }
    }
  }
  // 浏览器fallback: 用内嵌JS词典
  if(mode==='wubi') {
    if(revMode&&lcode.length>1) {
      const py=lcode.slice(1);
      const res=qDict(PINYIN,py,maxN);
      return res.map(c=>({...c,wbCode:lookupWubi(c.w)}));
    }
    return qDict(WUBI,lcode,maxN);
  }
  const full=qDict(PINYIN,lcode,maxN);
  if(full.length<maxN&&lcode.length<=4) {
    const seen=new Set(full.map(c=>c.w));
    for(const k of Object.keys(PINYIN)) {
      if(full.length>=maxN)break;
      if(k.length>=2&&isBrief(k,lcode)) {
        for(const c of PINYIN[k]) if(!seen.has(c.w)){seen.add(c.w);full.push(c);}
      }
    }
  }
  return full.slice(0,maxN);
}
function isBrief(code,input) {
  // 把code拆成声母序列，看首字母是否匹配input
  const parts=code.match(/[bpmfdtnlgkhjqxzcsryw]h?|[aeiouü]/g)||[];
  if(parts.length<2)return false;
  return parts.map(p=>p[0]).join('').startsWith(input);
}
function qDict(dict,prefix,maxN) {
  // 精确匹配优先，不参与排序；前缀匹配补充并按词频排
  const exact=(dict[prefix]||[]).slice(); // 保持原序（已按词频降序）
  const seen=new Set(exact.map(c=>c.w));
  const prefRes=[];
  for(const k of Object.keys(dict)) {
    if(prefRes.length>=maxN*4)break;
    if(k!==prefix&&k.startsWith(prefix))
      for(const c of dict[k])if(!seen.has(c.w)){seen.add(c.w);prefRes.push(c);}
  }
  prefRes.sort((a,b)=>b.f-a.f);
  return [...exact,...prefRes].slice(0,maxN);
}
function lookupWubi(word) {
  for(const[k,v]of Object.entries(WUBI))if(v.some(c=>c.w===word))return k;
  return '';
}

// ====== UI ======
function updateCode() {
  let disp=code;
  if(revMode&&code.length>0) disp='反查:'+code.slice(1);
  document.getElementById('codeText').textContent=disp;
  const cands=queryCands();
  if(cands.length>0)showCand(cands);else showBtns();
  syncCodeBar();   // 编码栏在「分类条 / 编码文字」间切换
}
function showCand(cands) {
  document.getElementById('candBar').classList.remove('hidden');
  document.getElementById('btnBar').classList.add('hidden');
  const list=document.getElementById('candList');
  list.innerHTML='';
  cands.slice(0,60).forEach(c=>{
    const div=document.createElement('div');
    div.className='cand-item';
    div.textContent=c.w;
    if(revMode&&c.wbCode){const s=document.createElement('span');s.className='cand-sub';s.textContent=c.wbCode;div.appendChild(s);}
    addCandListeners(div,()=>commitCand(c));
    list.appendChild(div);
  });
  document.getElementById('candMore').style.display=cands.length>=6?'flex':'none';
}
// 候选项/可横滑列表项专用绑定：不 preventDefault → 不阻断容器原生横向滚动；
// 按位移判定点击(位移<10px=点击；否则是滑动，交给原生滚动，不触发上屏)。
// 关键修复：候选栏(candBar)与顶栏按钮栏(btnBar)占同一位置，互斥显示。点候选字上屏后
// candBar 立即隐藏、btnBar 显形，而触摸抬指后浏览器会在原坐标补发一个合成 click，
// 这个 click 落到刚显形的 btnBar 按钮上(最左候选≈模式键、第2候选≈颜色球)，造成"误触双击"。
// touchend 是 passive 无法 preventDefault 阻止合成 click，故改为：上屏瞬间记录时间戳，
// 由 btnBar 捕获阶段在短窗口内吞掉这次穿透 click。见 installGhostClickGuard。
function addCandListeners(div, fn){
  let _x=0,_y=0,_moved=false,_t0=0;
  div.addEventListener('touchstart',e=>{ _x=e.touches[0].clientX; _y=e.touches[0].clientY; _moved=false; _t0=Date.now(); },{passive:true});
  div.addEventListener('touchmove',e=>{
    // 阈值降到 6px 并一旦判定为移动就永久锁定本次触摸为"滑动"，
    // 杜绝主键盘横滑候选条时末帧抬指误触上屏(用户反复反馈的"滑动总上屏")。
    if(Math.abs(e.touches[0].clientX-_x)>6 || Math.abs(e.touches[0].clientY-_y)>6) _moved=true;
  },{passive:true});
  div.addEventListener('touchend',e=>{
    // 仅"无位移 且 触摸时长够短(<400ms，排除长按后微动)"才算点击上屏。
    if(!_moved && (Date.now()-_t0)<400){ _candCommitTs=Date.now(); playClick(); fn(); }
  },{passive:true});
  div.addEventListener('touchcancel',()=>{ _moved=true; },{passive:true});
  div.addEventListener('mousedown',e=>{ e.preventDefault(); playClick(); fn(); });
}
// 防穿透：candBar 上屏后的时间戳；btnBar 捕获阶段拦截短窗口内的合成 click。
let _candCommitTs=0;
function installGhostClickGuard(){
  const bar=document.getElementById('btnBar');
  if(!bar) return;
  // 穿透 ghost click 的真正特征：候选区上屏后由触点坐标合成的 click，落点处的按钮【没有】收到过真实 touchstart。
  //   用户【主动】点 btnBar 按钮一定先有 touchstart 命中该按钮。故只吞"无 touchstart 命中"的合成 click，
  //   绝不误吞用户主动点[符号]/[表情]/[剪贴板]/[123]（旧逻辑无差别按 700ms 窗口拦截，导致上屏后这些键点不开/要点两次）。
  let _btnTouched=false;
  bar.addEventListener('touchstart',()=>{ _btnTouched=true; setTimeout(()=>{_btnTouched=false;},700); },{passive:true,capture:true});
  bar.addEventListener('click',e=>{
    if(!_btnTouched && Date.now()-_candCommitTs < 700){
      e.stopPropagation(); e.preventDefault();   // 仅吞穿透 ghost click
      _candCommitTs=0;
    }
  }, true);  // 捕获阶段，先于按钮自身 onclick 执行
}
function showBtns() {
  document.getElementById('candBar').classList.add('hidden');
  document.getElementById('btnBar').classList.remove('hidden');
}
// 兼容别名：Android 端 commit/pressEnter 调用 showCands([]) 清空候选
function showCands(cands){
  if(!cands||cands.length===0){showBtns();return;}
  showCand(cands);
}
function updateEditor() {
  const tBEl=document.getElementById('tB');
  const tAEl=document.getElementById('tA');
  // 浏览器fallback预览编辑器(tA/tB)在 Android 真机不存在；缺失则直接返回，杜绝空指针崩溃。
  if(!tBEl || !tAEl) return;
  const full=getFullText();
  const pos=getCursorPos();
  if(!full){
    tBEl.textContent='';
    tAEl.innerHTML='<span class="ph">在这里输入...</span>';
    return;
  }
  const r=getSelRange();
  if(!r){
    tBEl.textContent=tB;
    tAEl.textContent=tA;
  } else {
    const before=full.slice(0,r.start);
    const sel=full.slice(r.start,r.end);
    const after=full.slice(r.end);
    if(pos<=selAnchor){
      // 光标在选区前(活动端=start)
      tBEl.textContent=before;
      tAEl.innerHTML=`<span class="sel">${escH(sel)}</span>${escH(after)}`;
    } else {
      // 光标在选区后(活动端=end)
      tBEl.innerHTML=`${escH(before)}<span class="sel">${escH(sel)}</span>`;
      tAEl.textContent=after;
    }
  }
}
function escH(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function updateDisplay() {
  const tags={wubi:'五笔',pinyin:'拼音',english:'英文'};

//   原数字键盘删除键的"右半返回"已取消(删除键改纯删除·长按连删)，返回功能统一由此键承担。

function switchNum() {
  clearCode();
  closeApp();   // 切键盘=离开应用，关 overlay
  ['symPanel','emjPanel','clipPanel'].forEach(id=>{
    const el=document.getElementById(id);if(el)el.classList.add('hidden');
  });

  if(num){ buildNumpad(); } else if(calcMode){ calcMode=false; buildNumpad(); }
  document.getElementById('mainKb').classList.toggle('hidden',num);
  document.getElementById('numKb').classList.toggle('hidden',!num);
  // [123] 键标签恒为"123"，开启时靠按钮激活态(主题色反差)指示，再按一下恢复——不再变"返回"文字。
  const nl=document.getElementById('numLbl'); if(nl) nl.textContent='123';
  updateBtnStates();

// 工具栏右上角按钮：主键盘=收起(双线下滑SVG:横线+下箭头)，数字键盘=删除键(单击删除·长按连删)

  const ms=['wubi','pinyin','english'];

function hideKb(){

  if(typeof Android!=='undefined' && Android.hideKeyboard){ Android.hideKeyboard(); }
}
// 剪贴条目"进门"：在剪贴面板内覆盖一个完整内容详情视图，可上屏/删除/返回
// ===== 内嵌应用（密码生成器等）：在剪贴板面板内覆盖一个全屏 iframe 加载，关闭即返回键盘 =====
//   应用 HTML 解码到 assets/apps/ 下，离线自包含(内联 React)。数据走 AndroidPW Java 桥加密存本地。
let _appOverlay=null;
// ===== 笔记本输入路由：app 打开且笔记本编辑框获得焦点时，把五笔上屏/删除/回车 postMessage 进 iframe =====
let _appName=null;          // 当前打开的内嵌应用名
let _noteEditing=false;     // 笔记本是否正在编辑（由 iframe 上报 focus 状态）
function _noteFrame(){ return _appOverlay ? _appOverlay.querySelector('iframe') : null; }
function _postNote(msg){ const fr=_noteFrame(); if(fr&&fr.contentWindow){ try{ fr.contentWindow.postMessage(msg,'*'); }catch(e){} } }
function _routeNote(){ return (typeof Android!=='undefined') && _appName==='note' && _noteEditing && !!_appOverlay; }
window.addEventListener('message', function(e){
  const d=e.data; if(!d||d.src!=='note') return;
  if(d.type==='focus'){ _noteEditing=!!d.editing; }
});
function openApp(name){
  closeApp();   // 防止重复叠加
  const ov=document.createElement('div');
  ov.id='appOverlay';
  // 真·全屏：固定定位铺满整个视口(配合 Java 把输入法视图撑到整屏-状态栏)，不再局限于剪贴板小面板。
  //   顶部留出安全区(刘海/状态栏)内边距，返回条不被遮。
  ov.style.cssText='position:fixed;inset:0;z-index:120;background:#f6f3ee;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top,0px)';
  // 顶部返回条
  const bar=document.createElement('div');
  bar.style.cssText='flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--ac,#d6822e);color:#fff';
  bar.innerHTML='<span style="display:flex"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg></span>'+
                '<span style="font-size:15px;font-weight:600">返回键盘</span>';
  const back=()=>{ playClick(); closeApp(); };
  (function(){ let _t=false;
    bar.addEventListener('touchstart',e=>{ _t=true; e.preventDefault(); back(); setTimeout(()=>{_t=false;},400); },{passive:false});
    bar.addEventListener('mousedown',e=>{ if(_t)return; e.preventDefault(); back(); });
  })();
  ov.appendChild(bar);
  // iframe 加载应用
  const fr=document.createElement('iframe');
  fr.style.cssText='flex:1;width:100%;border:0;background:#f6f3ee';
  fr.src='apps/'+name+'.html';
  ov.appendChild(fr);
  document.body.appendChild(ov);    // 挂到 body：充满真实视口，而非剪贴面板
  _appOverlay=ov;
  _appName=name;
  // 通知原生把输入法视图撑成整屏高度(撑高后 fixed 覆盖层自动铺满)
  try{ if(typeof Android!=='undefined' && Android.setAppFullscreen) Android.setAppFullscreen(true); }catch(e){}
  // 暴露关闭回调给 iframe 内应用（其退出按钮调 window.parent.pwgenClose）
  window.pwgenClose=closeApp;
}
function closeApp(){
  const had=!!_appOverlay || !!document.getElementById('appOverlay');
  if(_appOverlay){ _appOverlay.remove(); _appOverlay=null; }
  _appName=null; _noteEditing=false;
  const o=document.getElementById('appOverlay'); if(o) o.remove();
  // 恢复键盘正常高度
  if(had){ try{ if(typeof Android!=='undefined' && Android.setAppFullscreen) Android.setAppFullscreen(false); }catch(e){} }
}
function showClipDetail(txt, idx){
  const panel=document.getElementById('clipPanel');
  let door=document.getElementById('clipDoor');
  if(door) door.remove();
  door=document.createElement('div');
  door.id='clipDoor';
  door.style.cssText='position:absolute;inset:0;z-index:20;background:var(--panel,#f3e8e0);display:flex;flex-direction:column;padding:10px;box-sizing:border-box';
  // 顶部栏：返回 + 删除
  const bar=document.createElement('div');
