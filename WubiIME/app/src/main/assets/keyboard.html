// ===== Android WebView Bridge =====
// 检测是否在Android WebView中运行
const isAndroid = typeof Android !== 'undefined';

// 覆盖commit函数：在Android中调用JSBridge，否则保持原有模拟器行为
const _origCommit = commit;
window.commit = function(txt) {
  if (isAndroid) {
    if (_routeNote()) {
      if (txt === '\n') { _postNote({src:'wubi',type:'enter'}); }
      else { _postNote({src:'wubi',type:'commit',text:txt}); }
      code = ''; revMode = false; updateCode(); showCands([]); return;
    }
    if (txt === '\n') { Android.commitEnter(); return; }
    Android.commitText(txt);
    // 清除编码状态
    code = ''; revMode = false; updateCode(); showCands([]);
  } else {
    _origCommit(txt);
  }
};
// 旗帜上屏：与普通 commit 相同，删除时由 Java deleteBefore 智能识别整簇一次删除
function commitFlag(f){ commit(f); }

// 覆盖doDelete
const _origDelete = doDelete;
window.doDelete = function() {
  if (isAndroid) {
    // 先清编码，无编码则删字符
    if (code.length > 0) {
      code = code.slice(0,-1);
      if (!code) revMode = false;
      updateCode();
    } else {
      if (_routeNote()) { _postNote({src:'wubi',type:'delete'}); }
      else { Android.deleteBefore(); }
    }
  } else {
    _origDelete();
  }
};

// 覆盖pressSpace
const _origSpace = pressSpace;
window.pressSpace = function() {
  if (isAndroid) {
    if (code.length > 0) {
      // 有编码时空格上屏第一候选
      const cands = queryCands();
      if (cands.length > 0) { commit(cands[0].w); }
      else { commit(' '); }
    } else {
      commit(' ');
    }
  } else {
    _origSpace();
  }
};

// 覆盖pressEnter
const _origEnter = pressEnter;
window.pressEnter = function() {
  if (isAndroid) {
    if (code.length > 0) {
      // 编码态回车：上屏编码原文(字母)，而非候选。空格才上屏首选候选。
      const raw = revMode ? code.slice(1) : code;
      commit(raw); code=''; revMode=false; updateCode(); showCands([]);
    } else {
      commit('\n');
    }
  } else {
    _origEnter();
  }
};

// Ctrl/Alt 组合键 → Android JSBridge
const _origHandleCtrl = typeof handleCtrl === 'function' ? handleCtrl : null;
const _origHandleAlt = typeof handleAlt === 'function' ? handleAlt : null;

if (isAndroid) {
  window.handleCtrl = function(l) {
    switch(l) {
      case 'a': Android.selectAll(); break;
      case 'c':
        // 私有捕获：把选区文本存入输入法私有历史（不依赖系统剪贴板）
        try{ const s=Android.getSelectedText&&Android.getSelectedText(); if(s) addClip(s); }catch(e){}
        Android.copyText();
        break;
      case 'v': Android.pasteText(); break;
      case 'x':
        try{ const s=Android.getSelectedText&&Android.getSelectedText(); if(s) addClip(s); }catch(e){}
        Android.cutText();
        break;
      case 'z': Android.undoText(); break;
      case 'b': Android.moveCursor(4, false); break; // ←: 光标移到当前行最左端
      case 'm': Android.moveCursor(5, false); break; // →: 光标移到当前行最右端
      case 'j': Android.moveCursor(6, false); break; // ↑: 跳全文开头
      case 'n': Android.moveCursor(7, false); break; // ↓: 跳全文末尾
    }
    if(!ctrlLock){ ctrl = false; buildKb(); }   // 锁定层保持，不复位
  };
  window.handleAlt = function(l) {
    // J=上 B=左 N=下 M=右(扩选); Q=Tab(段末); A=跨文本框跳转
    switch(l) {
      case 'j': Android.moveCursor(10, true); break;  // ↑：选中至上一视觉行行首
      case 'b': Android.moveCursor(0, true); break;   // ←：左扩/缩选1字符
      case 'n': Android.moveCursor(11, true); break;  // ↓：选中至下一视觉行行尾
      case 'm': Android.moveCursor(1, true); break;   // →：右扩/缩选1字符
      case 'q': Android.moveCursor(12, false); break; // Tab：跳到段末/下一段末
      case 'a': Android.moveCursor(13, false); break; // 跨文本框：跳到下一个输入框(循环)
    }
  };
}

// 点击音效：统一走 WebView 自合成黑轴音效（受 soundOn 控制）。
// 不再调用 Android.playClick（系统音不可换、且无法静音控制）。

// ===== 白屏/卡旧画根治：切到别的 App 再切回时，WebView 的合成缓冲常被系统回收，
//   表现为整片白屏或停在上一帧、点不动，需反复切换才恢复。这里在「重新可见」的所有
//   时机强制重绘 + 校验 DOM 完整，零闪烁地把画面拉回来。Java 端也可直接调 window.imeRepaint()。=====
let _repaintRaf=0;
function imeRepaint(){
  const ime=document.getElementById('ime');
  if(!ime) return;
  // 1) DOM 兜底：若主键盘行被系统回收成空（极端情况），按当前状态重建一次
  try{
    const r1=document.getElementById('r1');
    const numHidden=document.getElementById('numKb') && document.getElementById('numKb').classList.contains('hidden');
    if(r1 && r1.childElementCount===0 && numHidden){ buildKb(); }
  }catch(e){}
  // 2) 强制合成层重绘：切换一个极廉价、不可见的变换并在下一帧复位，
  //    迫使 WebView 重新提交缓冲（解决「白屏 / 停在旧帧」两种表现）。
  if(_repaintRaf) cancelAnimationFrame(_repaintRaf);
  ime.style.transform='translateZ(0)';
  void ime.offsetHeight;                 // 同步触发一次回流
  _repaintRaf=requestAnimationFrame(()=>{
    ime.style.transform='';
    // 二次保险：再下一帧轻推 opacity，覆盖个别机型首帧不提交的情况
    requestAnimationFrame(()=>{ ime.style.opacity='0.999'; requestAnimationFrame(()=>{ ime.style.opacity=''; }); });
  });
}
window.imeRepaint=imeRepaint;            // 暴露给 Java：onStartInputView 里 evaluateJavascript("imeRepaint()")
// 监听一切「重新回到前台/重新可见」的浏览器侧时机
document.addEventListener('visibilitychange',()=>{ if(!document.hidden) imeRepaint(); });
window.addEventListener('pageshow',imeRepaint);
window.addEventListener('focus',imeRepaint);
window.addEventListener('resume',imeRepaint);      // 部分 WebView 容器会派发
window.addEventListener('orientationchange',()=>{ setTimeout(imeRepaint,60); });

function onIMEFocus(){
  updateCode();
  imeRepaint();
}
function onIMEBlur(){
  // 失焦时可选择清空编码
}
</script>
