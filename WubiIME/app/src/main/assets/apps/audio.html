// ─── Drag reorder（合成模式） ─────────────────────────────────────────
function initDrag(){
  const list=document.getElementById('seg-list');
  const items=[...list.querySelectorAll('.seg-item')];
  let dragSrc=null, dragSrcIdx=-1, overIdx=-1, longPressTimer=null;

  items.forEach((item)=>{
    const handle=item.querySelector('.drag-handle');
    if(!handle) return;
    const idx=parseInt(item.dataset.idx);

    // Touch长按启动拖拽
    handle.addEventListener('touchstart',e=>{
      longPressTimer=setTimeout(()=>{
        dragSrc=item; dragSrcIdx=idx;
        item.classList.add('drag-active');
        navigator.vibrate&&navigator.vibrate(30);
      },280);
    },{passive:true});

    handle.addEventListener('touchend',()=>{ clearTimeout(longPressTimer); },{passive:true});

    handle.addEventListener('touchmove',e=>{
      clearTimeout(longPressTimer);
      if(!dragSrc) return;
      e.preventDefault();
      const touch=e.touches[0];
      const els=document.elementsFromPoint(touch.clientX,touch.clientY);
      const target=els.find(el=>el.classList&&el.classList.contains('seg-item')&&el!==dragSrc);
      items.forEach(it=>it.classList.remove('drag-over'));
      if(target){ target.classList.add('drag-over'); overIdx=parseInt(target.dataset.idx); }
      else overIdx=-1;
    },{passive:false});

    handle.addEventListener('touchend',e=>{
      if(dragSrc && overIdx>=0 && overIdx!==dragSrcIdx){
        // 执行reorder
        pushHistory();
        const moved=segments.splice(dragSrcIdx,1)[0];
        const insertAt=overIdx>(dragSrcIdx)?overIdx-1:overIdx; // splice后位移补偿
        segments.splice(insertAt,0,moved);
        segments.forEach((s,j)=>{ s.label=buildLabel(j); });
        renderSegList(); drawWaveform(); drawOverview();
      }
      if(dragSrc) dragSrc.classList.remove('drag-active');
      items.forEach(it=>it.classList.remove('drag-over'));
      dragSrc=null; dragSrcIdx=-1; overIdx=-1;
    },{passive:true});

    // Mouse拖拽（桌面）
    handle.addEventListener('mousedown',e=>{
      dragSrc=item; dragSrcIdx=idx;
      item.classList.add('drag-active');
      const onMove=ev=>{
        const els=document.elementsFromPoint(ev.clientX,ev.clientY);
        const target=els.find(el=>el.classList&&el.classList.contains('seg-item')&&el!==dragSrc);
        items.forEach(it=>it.classList.remove('drag-over'));
        if(target){ target.classList.add('drag-over'); overIdx=parseInt(target.dataset.idx); }
        else overIdx=-1;
      };
      const onUp=()=>{
        if(dragSrc && overIdx>=0 && overIdx!==dragSrcIdx){
          pushHistory();
          const moved=segments.splice(dragSrcIdx,1)[0];
          const insertAt=overIdx>dragSrcIdx?overIdx-1:overIdx;
          segments.splice(insertAt,0,moved);
          segments.forEach((s,j)=>{ s.label=buildLabel(j); });
          renderSegList(); drawWaveform(); drawOverview();
        }
        if(dragSrc) dragSrc.classList.remove('drag-active');
        items.forEach(it=>it.classList.remove('drag-over'));
        dragSrc=null; dragSrcIdx=-1; overIdx=-1;
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
      };
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    });
  });
}

// ─── Format helpers ───────────────────────────────────────────────────
function getFmtInfo(){
  const v=document.getElementById('fmt-select').value;
  if(v.startsWith('mp3')) return {type:'mp3',kbps:parseInt(v.split('-')[1])};
  if(v==='wav-32f') return {type:'wav',bits:'32f'};
  return {type:'wav',bits:parseInt(v.split('-')[1])};
}
function getFmtExt(){ return getFmtInfo().type==='mp3'?'mp3':'wav'; }

// ─── Core render → Blob ───────────────────────────────────────────────
async function renderToBlob(i){
  const seg=segments[i];
  if(!audioBuffer||!audioCtx) return null;
  const sr=audioBuffer.sampleRate, ch=audioBuffer.numberOfChannels;
  const s0=Math.floor(seg.in*sr), s1=Math.floor(seg.out*sr), len=s1-s0;
  if(len<=0){ setStatus('片段长度为零','err'); return null; }

  const gainLinear=Math.pow(10,(seg.gainDb||0)/20);
  const fadeInSec=Math.min((seg.fadeIn||0)/1000, len/sr*0.45);
  const fadeOutSec=Math.min((seg.fadeOut||0)/1000, len/sr*0.45);
  const durSec=len/sr;

  let rendered;
  try{
    const oac=new OfflineAudioContext(ch,len,sr);
    const buf=oac.createBuffer(ch,len,sr);
    for(let c2=0;c2<ch;c2++) buf.copyToChannel(audioBuffer.getChannelData(c2).subarray(s0,s1),c2);
    const src2=oac.createBufferSource(); src2.buffer=buf;
    const gn=oac.createGain();
    applyFade(gn, gainLinear, 0, durSec, fadeInSec, fadeOutSec);
    const fxc=buildFxChain(oac);
    if(fxc){ gn.connect(fxc.input); fxc.output.connect(oac.destination); }
    else gn.connect(oac.destination);
    src2.connect(gn); src2.start();
    rendered=await oac.startRendering();
  }catch(e){ setStatus('渲染失败：'+e.message,'err'); return null; }

  const fmt=getFmtInfo();
  try{
    if(fmt.type==='mp3') return await encodeToMp3Blob(rendered, fmt.kbps);
    return encodeToWavBlob(rendered, fmt.bits);
  }catch(e){ setStatus('编码失败：'+e.message,'err'); return null; }
}

async function exportSegment(i){
  setStatus(`导出中：${segments[i].label}…`);
  const blob=await renderToBlob(i);
  if(!blob) return;
  const ext=getFmtExt();
  const name=safeFilename(segments[i].label)+'.'+ext;
  await triggerDownload(blob, name);
  setStatus(`已导出：${segments[i].label}.${ext}`,'ok');
}

async function exportAll(){
  if(segments.length===0) return;
  const eb=document.getElementById('btn-export-all');
  eb.classList.add('busy');
  try{ await exportAllInner(); } finally { eb.classList.remove('busy'); setProgress(0); }
}
async function exportAllInner(){

  // ── 合成模式 ──────────────────────────────────────────────────────
  if(exportMode==='merge'){
    // 按连接器断点分组
    const groups=[];
    let cur=[0];
    for(let i=0;i<segments.length-1;i++){
      if(segments[i].connectedToNext===false){ groups.push([...cur]); cur=[i+1]; }
      else cur.push(i+1);
    }
    groups.push(cur);

    setStatus(`合成渲染中，${groups.length} 个输出文件…`);
    const ext=getFmtExt();
    const isIOS=/iP(ad|hone|od)/.test(navigator.userAgent)&&/WebKit/.test(navigator.userAgent)&&!/CriOS|FxiOS/.test(navigator.userAgent);

    if(groups.length===1){
      // 单组：直接输出
      const blob=await renderMergedBlob(groups[0]);
      if(!blob){ setStatus('合成失败','err'); return; }
      const outName=groups[0].length===1?safeFilename(segments[groups[0][0]].label)+'.'+ext:'合成音频.'+ext;
      await triggerDownload(blob, outName);
      setStatus('合成导出完成','ok');
    } else if(zipReady){
      // 多组：全平台zip打包
      const zip=new JSZip();
      for(let g=0;g<groups.length;g++){
        setStatus(`合成 ${g+1}/${groups.length}…`);
        setProgress(Math.round(g/groups.length*100),`合成 ${g+1}/${groups.length}`);
        const blob=await renderMergedBlob(groups[g]);
        if(blob){
          const fname=groups[g].length===1
            ?safeFilename(segments[groups[g][0]].label)+'.'+ext
            :`合成${g+1}.${ext}`;
          zip.file(fname,blob); // 只加音频，无txt
        }
      }
      const zipBlob=await zip.generateAsync({type:'blob',compression:'STORE'});
      await triggerDownload(zipBlob,'合成音频_全部.zip');
      setStatus(`已打包 ${groups.length} 个合成文件`,'ok');
    } else {
      // 多组桌面：串行下载
      for(let g=0;g<groups.length;g++){
        setStatus(`合成导出 ${g+1}/${groups.length}…`);
        setProgress(Math.round(g/groups.length*100),`合成导出 ${g+1}/${groups.length}`);
        const blob=await renderMergedBlob(groups[g]);
        if(!blob) continue;
        const fname=groups[g].length===1
          ?safeFilename(segments[groups[g][0]].label)+'.'+ext
          :`合成${g+1}.${ext}`;
        await triggerDownload(blob,fname);
        if(g<groups.length-1) await new Promise(r=>setTimeout(r,250));
      }
      setStatus(`已导出 ${groups.length} 个合成文件`,'ok');
    }
    return;
  }

  // ── 逐段模式 ──────────────────────────────────────────────────────
  if(segments.length>1 && zipReady){
    setStatus('批量打包中…');
    const zip=new JSZip();
    const ext=getFmtExt();
    for(let i=0;i<segments.length;i++){
      setStatus(`编码 ${i+1}/${segments.length}…`);
      setProgress(Math.round(i/segments.length*100),`编码 ${i+1}/${segments.length}`);
      const blob=await renderToBlob(i);
      if(blob) zip.file(safeFilename(segments[i].label)+'.'+ext, blob);
    }
    const zipBlob=await zip.generateAsync({type:'blob',compression:'STORE'});
    await triggerDownload(zipBlob,'音频片段_全部.zip');
    setStatus(`已打包 ${segments.length} 段`,'ok');
    return;
  }
  for(let i=0;i<segments.length;i++){
    setStatus(`导出 ${i+1}/${segments.length}：${segments[i].label}…`);
    setProgress(Math.round(i/segments.length*100),`导出 ${i+1}/${segments.length}`);
    if(i>0) await new Promise(r=>setTimeout(r,300));
    const blob=await renderToBlob(i);
    if(!blob) continue;
    await triggerDownload(blob, safeFilename(segments[i].label)+'.'+getFmtExt());
    if(i<segments.length-1) await new Promise(r=>setTimeout(r,250));
  }
  setStatus(`已导出全部 ${segments.length} 段`,'ok');
}

// ─── 分组合成渲染 ─────────────────────────────────────────────────────
async function renderMergedBlob(idxArr){
  if(!audioBuffer||!audioCtx||!idxArr||idxArr.length===0) return null;
  const sr=audioBuffer.sampleRate, ch=audioBuffer.numberOfChannels;
  const gapMs=Math.max(0,parseInt(document.getElementById('merge-gap')?.value)||0);
  const gapLen=Math.floor(gapMs/1000*sr);
  const segs=idxArr.map(i=>segments[i]);
  const segLens=segs.map(seg=>Math.max(0,Math.floor(seg.out*sr)-Math.floor(seg.in*sr)));
  const totalLen=segLens.reduce((a,b)=>a+b,0)+gapLen*Math.max(0,segs.length-1);
  if(totalLen<=0) return null;
  try{
    const oac=new OfflineAudioContext(ch,totalLen,sr);
    const fxc=buildFxChain(oac);
    const fxDest=fxc?fxc.input:oac.destination;
    if(fxc) fxc.output.connect(oac.destination);
    let offset=0;
    for(let k=0;k<segs.length;k++){
      const seg=segs[k]; const len=segLens[k];
      if(len<=0) continue;
      const s0=Math.floor(seg.in*sr);
      const gainLinear=Math.pow(10,(seg.gainDb||0)/20);
      const durSec=len/sr; const startTime=offset/sr;
      const fadeInSec=Math.min((seg.fadeIn||0)/1000,durSec*0.45);
      const fadeOutSec=Math.min((seg.fadeOut||0)/1000,durSec*0.45);
      const buf=oac.createBuffer(ch,len,sr);
      for(let c2=0;c2<ch;c2++) buf.copyToChannel(audioBuffer.getChannelData(c2).subarray(s0,s0+len),c2);
      const src2=oac.createBufferSource(); src2.buffer=buf;
      const gn=oac.createGain();
      applyFade(gn, gainLinear, startTime, durSec, fadeInSec, fadeOutSec);
      src2.connect(gn); gn.connect(fxDest); src2.start(startTime);
      offset+=len; if(k<segs.length-1) offset+=gapLen;
    }
    const rendered=await oac.startRendering();
    const fmt=getFmtInfo();
    return fmt.type==='mp3'?await encodeToMp3Blob(rendered,fmt.kbps):encodeToWavBlob(rendered,fmt.bits);
  }catch(e){ setStatus('合成失败：'+e.message,'err'); return null; }
}



// ─── WAV encoder（支持16/24/32bit）────────────────────────────────────
function encodeToWavBlob(buf, bits){
  const ch=buf.numberOfChannels, sr=buf.sampleRate, len=buf.length;
  const is32f=(bits==='32f');
  const fmtTag=is32f?3:1;
  const bitsN=is32f?32:(bits||16);
  const bps=bitsN/8;
  const ab=new ArrayBuffer(44+len*ch*bps);
  const v=new DataView(ab);
  const ws=(o,s)=>{ for(let k=0;k<s.length;k++) v.setUint8(o+k,s.charCodeAt(k)); };
  ws(0,'RIFF'); v.setUint32(4,ab.byteLength-8,true); ws(8,'WAVE');
  ws(12,'fmt '); v.setUint32(16,16,true); v.setUint16(20,fmtTag,true);
  v.setUint16(22,ch,true); v.setUint32(24,sr,true);
  v.setUint32(28,sr*ch*bps,true); v.setUint16(32,ch*bps,true); v.setUint16(34,bitsN,true);
  ws(36,'data'); v.setUint32(40,len*ch*bps,true);
  let off=44;
  for(let i=0;i<len;i++) for(let c=0;c<ch;c++){
    const s=Math.max(-1,Math.min(1,buf.getChannelData(c)[i]));
    if(is32f){
      v.setFloat32(off,s,true); off+=4;
    } else if(bitsN===24){
      const val=s<0?Math.round(s*8388608):Math.round(s*8388607);
      v.setUint8(off,val&0xFF); v.setUint8(off+1,(val>>8)&0xFF); v.setUint8(off+2,(val>>16)&0xFF); off+=3;
    } else {
      v.setInt16(off,s<0?Math.round(s*32768):Math.round(s*32767),true); off+=2;
    }
  }
  return new Blob([ab],{type:'audio/wav'});
}

// ─── MP3 encoder：Worker优先，主线程兜底 ─────────────────────────────
function getMp3Worker(){
  if(mp3Worker) return mp3Worker;
  const code="importScripts('https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.min.js');"+
"onmessage=function(e){try{var d=e.data,enc=new lamejs.Mp3Encoder(d.ch===1?1:2,d.sr,d.kbps||192),CHUNK=1152,len=d.left.length,parts=[],last=0;"+
"function toI16(f,s,en){var o=new Int16Array(en-s);for(var i=s;i<en;i++){var v=Math.max(-1,Math.min(1,f[i]));o[i-s]=v<0?Math.round(v*32768):Math.round(v*32767);}return o;}"+
"for(var i=0;i<len;i+=CHUNK){var en=Math.min(len,i+CHUNK);"+
"var out=d.ch===1?enc.encodeBuffer(toI16(d.left,i,en)):enc.encodeBuffer(toI16(d.left,i,en),toI16(d.right,i,en));"+
"if(out.length>0)parts.push(new Uint8Array(out));"+
"var pct=Math.floor(i/len*100);if(pct>=last+5){last=pct;postMessage({id:d.id,progress:pct});}}"+
"var fl=enc.flush();if(fl.length>0)parts.push(new Uint8Array(fl));"+
"postMessage({id:d.id,done:true,parts:parts},parts.map(function(p){return p.buffer;}));"+
"}catch(err){postMessage({id:e.data.id,error:String(err&&err.message||err)});}};";
  mp3Worker=new Worker(URL.createObjectURL(new Blob([code],{type:'application/javascript'})));
  mp3Worker.onmessage=ev=>{
    const m=ev.data, job=mp3Jobs[m.id];
    if(!job) return;
    if(m.progress!=null){ setStatus('MP3编码 '+m.progress+'%'); return; }
    delete mp3Jobs[m.id];
    if(m.error) job.reject(new Error(m.error));
    else job.resolve(new Blob(m.parts,{type:'audio/mpeg'}));
  };
  mp3Worker.onerror=()=>{
    Object.keys(mp3Jobs).forEach(id=>{ mp3Jobs[id].reject(new Error('worker error')); delete mp3Jobs[id]; });
    try{ mp3Worker.terminate(); }catch(e){}
    mp3Worker=null;
  };
  return mp3Worker;
}
function encodeMp3ViaWorker(rendered, kbps){
  return new Promise((resolve,reject)=>{
    let w;
    try{ w=getMp3Worker(); }catch(e){ return reject(e); }
    const ch=rendered.numberOfChannels;
    const left=new Float32Array(rendered.getChannelData(0));
    const right=ch>1?new Float32Array(rendered.getChannelData(1)):null;
    const id=++mp3JobId;
    mp3Jobs[id]={resolve,reject};
    const tf=[left.buffer]; if(right) tf.push(right.buffer);
    w.postMessage({id, sr:rendered.sampleRate, ch, kbps, left, right}, tf);
  });
}
function encodeToMp3Blob(rendered, kbps){
  if(typeof Worker!=='undefined'){
    return encodeMp3ViaWorker(rendered,kbps).catch(()=>encodeToMp3Main(rendered,kbps));
  }
  return encodeToMp3Main(rendered,kbps);
}
function encodeToMp3Main(rendered, kbps){
  if(!lameReady) return Promise.reject(new Error('MP3编码库未加载，请刷新页面重试'));
  return new Promise((resolve,reject)=>{
    try{
      const sr=rendered.sampleRate, ch=rendered.numberOfChannels, len=rendered.length;
      const encoder=new lamejs.Mp3Encoder(ch===1?1:2, sr, kbps||192);
      const CHUNK=1152;
      const parts=[];
      if(ch===1){
        const f=rendered.getChannelData(0);
        for(let i=0;i<len;i+=CHUNK){
          const sl=f32ToInt16(f,i,Math.min(len,i+CHUNK));
          const enc=encoder.encodeBuffer(sl);
          if(enc.length>0) parts.push(new Uint8Array(enc));
        }
      } else {
        const fl=rendered.getChannelData(0), fr=rendered.getChannelData(1);
        for(let i=0;i<len;i+=CHUNK){
          const end=Math.min(len,i+CHUNK);
          const enc=encoder.encodeBuffer(f32ToInt16(fl,i,end),f32ToInt16(fr,i,end));
          if(enc.length>0) parts.push(new Uint8Array(enc));
        }
      }
      const fl2=encoder.flush();
      if(fl2.length>0) parts.push(new Uint8Array(fl2));
      resolve(new Blob(parts,{type:'audio/mpeg'}));
    }catch(e){ reject(e); }
  });
}

function f32ToInt16(f32,start,end){
  const out=new Int16Array(end-start);
  for(let i=start;i<end;i++){
    const s=Math.max(-1,Math.min(1,f32[i]));
    out[i-start]=s<0?Math.round(s*32768):Math.round(s*32767);
  }
  return out;
}

async function saveViaBridge(blob, filename){
  // AnKey AppActivity SAF 管道：saveBegin/saveChunk(b64≤512K)/saveEnd → 系统"保存至"对话框 → onSaveResult 回调
  return new Promise(async (resolve)=>{
    try{
      const buf=new Uint8Array(await blob.arrayBuffer());
      AndroidPW.saveBegin(filename, blob.type||'application/octet-stream');
      const RAW=384*1024; // b64后约512K，单次跨桥安全
      for(let i=0;i<buf.length;i+=RAW){
        let bin=''; const end=Math.min(buf.length,i+RAW);
        for(let j=i;j<end;j++) bin+=String.fromCharCode(buf[j]);
        if(!AndroidPW.saveChunk(btoa(bin))){ resolve(false); return; }
      }
      window.onSaveResult=(ok,msg)=>{ setStatus(ok?('已保存：'+msg):('保存失败：'+msg), ok?'ok':'err'); resolve(ok); };
      const r=AndroidPW.saveEnd();
      if(r!=='PICKER'){ resolve(false); }
    }catch(e){ resolve(false); }
  });
}
async function triggerDownload(blob, filename){
  // 安卓 AnKey 容器内：走 SAF 桥（可保存到任意位置/下载目录）
  if(typeof AndroidPW!=='undefined' && AndroidPW.saveBegin){
    const ok=await saveViaBridge(blob, filename);
    if(ok) return;
    // 桥失败继续走通用路径兜底
  }
  // iOS Safari: <a download> 无效，优先用 Web Share API
  const isIOS=/iP(ad|hone|od)/.test(navigator.userAgent)&&/WebKit/.test(navigator.userAgent)&&!/CriOS|FxiOS/.test(navigator.userAgent);
  if(isIOS && navigator.canShare && navigator.canShare({files:[new File([blob],filename,{type:blob.type})]})){
    try{
      await navigator.share({
        files:[new File([blob],filename,{type:blob.type})],
        title:filename
      });
      return;
    }catch(e){
      if(e.name==='AbortError') return; // 用户取消，正常情况
      // 其他错误降级到 window.open
    }
  }
  // 标准浏览器 / iOS fallback：新标签打开，长按可存储
  const url=URL.createObjectURL(blob);
  if(isIOS){
    window.open(url,'_blank');
    // iOS下blob url只在当前session有效，延迟清理
    setTimeout(()=>URL.revokeObjectURL(url),60000);
  } else {
    const a=document.createElement('a');
    a.href=url; a.download=filename;
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url),30000);
  }
}

// ─── Keyboard shortcuts ───────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(!audioBuffer) return;
  const tag=document.activeElement.tagName;
  if(tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA') return;
  switch(e.code){
    case 'KeyZ':
      if(e.ctrlKey||e.metaKey){ e.preventDefault(); if(e.shiftKey) redoOp(); else undoOp(); }
      break;
    case 'KeyY':
      if(e.ctrlKey||e.metaKey){ e.preventDefault(); redoOp(); }
      break;
    case 'Space':
      e.preventDefault(); togglePlay(); break;
    case 'KeyI':
      if(!document.getElementById('btn-in').disabled) markIn(); break;
    case 'KeyO':
      if(!document.getElementById('btn-out').disabled) markOut(); break;
    case 'Enter':
      e.preventDefault();
      if(!document.getElementById('btn-add').disabled) addSegment(); break;
    case 'ArrowLeft':
      e.preventDefault(); seekTo(currentTime-0.05); break;
    case 'ArrowRight':
      e.preventDefault(); seekTo(currentTime+0.05); break;
    case 'Equal': case 'NumpadAdd':{
      const zs=document.getElementById('zoom-slider');
      zs.value=Math.min(100,parseFloat(zs.value)+5);
      zs.dispatchEvent(new Event('input')); break;
    }
    case 'Minus': case 'NumpadSubtract':{
      const zs=document.getElementById('zoom-slider');
      zs.value=Math.max(0,parseFloat(zs.value)-5);
      zs.dispatchEvent(new Event('input')); break;
    }
  }
});
