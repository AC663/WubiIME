  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\u002Fspan>\n      <\u002Fdiv>\n\n      <!-- ============================ LIBRARY ============================ -->\n      <sc-if value=\"{{ isLib }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"flex:1; display:flex; flex-direction:column; min-height:0;\">\n        <div style=\"padding:54px 24px 16px;\">\n          <div style=\"display:flex; align-items:flex-end; justify-content:space-between;\">\n            <div style=\"font-family:'Space Mono',monospace; font-size:13px; letter-spacing:3px; color:#E8451F; font-weight:700;\">妙计 · 笔记本<\u002Fdiv>\n            <span style=\"font-family:'Space Mono',monospace; font-size:12px; color:#999;\">{{ countLabel }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"height:1.5px; background:#111; margin-top:14px;\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"flex:1; overflow-y:auto; padding:6px 18px 24px;\">\n          <div id=\"lib-grid\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:14px;\">\n            <sc-for list=\"{{ libNotebooks }}\" as=\"n\" hint-placeholder-count=\"4\">\n              <div class=\"nb\" data-card=\"1\" data-id=\"{{ n.id }}\" style=\"cursor:pointer; background:#fff; border:1.5px solid #111; aspect-ratio:3/4; padding:14px 13px; display:flex; flex-direction:column; box-shadow:4px 4px 0 #111;\">\n                <div style=\"font-weight:900; font-size:18px; line-height:1.1; letter-spacing:-.5px; color:#111; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;\">{{ n.title }}<\u002Fdiv>\n                <div style=\"display:flex; align-items:center; gap:6px; margin:9px 0 8px;\"><div style=\"width:5px; height:5px; background:{{ n.accent }};\"><\u002Fdiv><div style=\"flex:1; height:1px; background:#111;\"><\u002Fdiv><\u002Fdiv>\n                <div style=\"font-size:10.5px; line-height:1.45; color:#666; display:-webkit-box; -webkit-line-clamp:4; -webkit-box-orient:vertical; overflow:hidden;\">{{ n.snippet }}<\u002Fdiv>\n                <div style=\"margin-top:auto; display:flex; justify-content:space-between; align-items:center; font-family:'Space Mono',monospace; font-size:8.5px; color:#999; padding-top:8px;\"><span>{{ n.foot }}<\u002Fspan><span>{{ n.words }} 字<\u002Fspan><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"padding:14px 22px 30px; border-top:1.5px solid #111; background:#FAFAF7;\">\n          <div onclick=\"{{ onNew }}\" style=\"cursor:pointer; height:52px; background:#111; color:#fff; display:flex; align-items:center; justify-content:center; gap:10px; font-family:'Space Mono',monospace; font-size:13px; font-weight:700; letter-spacing:1px;\">＋ 新建笔记本<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============================ EDITOR ============================ -->\n      <sc-if value=\"{{ isEd }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"flex:1; display:flex; flex-direction:column; min-height:0;\">\n        <!-- nav -->\n        <div style=\"padding:50px 20px 12px; border-bottom:1.5px solid #111; background:#FAFAF7; z-index:20;\">\n          <div style=\"display:flex; align-items:center; justify-content:space-between;\">\n            <div onclick=\"{{ onBack }}\" style=\"cursor:pointer; display:flex; align-items:center; gap:6px; font-family:'Space Mono',monospace; font-size:12px; letter-spacing:1px; color:#111; text-transform:uppercase;\">← 笔记本<\u002Fdiv>\n            <div style=\"display:flex; gap:8px;\">\n              <div onclick=\"{{ onExportOpen }}\" style=\"cursor:pointer; height:32px; padding:0 14px; border:1.5px solid #111; display:flex; align-items:center; gap:6px; font-family:'Space Mono',monospace; font-size:11px; font-weight:700; letter-spacing:1px; color:#111;\">导出 ↧<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- scrollable editor -->\n        <div id=\"editor-scroll\" style= px; background:#E8451F;\"><\u002Fdiv><div style=\"flex:1; height:1.5px; background:#111;\"><\u002Fdiv><\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n              <span class=\"del\" data-id=\"{{ b.id }}\" onclick=\"{{ onDel }}\" style=\"opacity:0; cursor:pointer; font-size:13px; color:#bbb; padding:4px 2px 4px 6px; transition:opacity .15s;\">✕<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n\n          <div style=\"height:30px;\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <sc-if value=\"{{ addMenuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n          <div onclick=\"{{ onAddOpen }}\" style=\"position:absolute; inset:0; z-index:35;\"><\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- add bar -->\n        <div style=\"position:relative; padding:14px 22px 30px; border-top:1.5px solid #111; background:#FAFAF7; display:flex; gap:10px;\">\n          <sc-if value=\"{{ addMenuOpen }}\" hint-placeholder-val=\"{{ false }}\">\n            <div class=\"sheet\" style=\"position:absolute; left:22px; right:22px; bottom:84px; background:#fff; border:1.5px solid #111; box-shadow:5px 5px 0 #111; padding:6px; display:grid; grid-template-columns:1fr 1fr; gap:6px; z-index:40;\">\n              <div data-type=\"h1\" onclick=\"{{ onAdd }}\" style=\"cursor:pointer; padding:12px; border:1.5px solid #111; display:flex; flex-direction:column; gap:2px;\"><span style=\"font-weight:900; font-size:17px;\">大标题<\u002Fspan><span style=\"font-family:'Space Mono',monospace; font-size:9px; color:#999;\">一级标题<\u002Fspan><\u002Fdiv>\n              <div data-type=\"h2\" onclick=\"{{ onAdd }}\" style=\"cursor:pointer; padding:12px; border:1.5px solid #111; display:flex; flex-direction:column; gap:2px;\"><span style=\"font-weight:700; font-size:15px;\">小标题<\u002Fspan><span style=\"font-family:'Space Mono',monospace; font-size:9px; color:#999;\">二级标题<\u002Fspan><\u002Fdiv>\n              <div data-type=\"p\" onclick=\"{{ onAdd }}\" style=\"cursor:pointer; padding:12px; border:1.5px solid #111; display:flex; flex-direction:column; gap:2px;\"><span style=\"font-weight:400; font-size:15px;\">正文段落<\u002Fspan><span style=\"font-family:'Space Mono',monospace; font-size:9px; color:#999;\">正文<\u002Fspan><\u002Fdiv>\n              <div data-type=\"divider\" onclick=\"{{ onAdd }}\" style=\"cursor:pointer; padding:12px; border:1.5px solid #111; display:flex; align-items:center; gap:8px;\"><span style=\"width:6px;height:6px;background:#E8451F;\"><\u002Fspan><span style=\"flex:1;height:1.5px;background:#111;\"><\u002Fspan><span style=\"font-family:'Space Mono',monospace; font-size:9px; color:#999;\">分隔线<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <div onclick=\"{{ onAddOpen }}\" style=\"cursor:pointer; flex:1; height:48px; background:#111; color:#fff; display:flex; align-items:center; justify-content:center; gap:8px; font-family:'Space Mono',monospace; font-size:12px; font-weight:700; letter-spacing:1px;\">＋ 文本类型<\u002Fdiv>\n          <div onclick=\"{{ onExportOpen }}\" style=\"cursor:pointer; width:48px; height:48px; background:#E8451F; color:#fff; display:flex; align-items:center; justify-content:center; font-size:19px;\">↧<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ============================ EXPORT SHEET ============================ -->\n      <sc-if value=\"{{ exportOpen }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"scrim\" onclick=\"{{ onExportClose }}\" style=\"position:absolute; inset:0; background:rgba(17,17,17,.42); z-index:50;\"><\u002Fdiv>\n        <div class=\"sheet\" style=\"position:absolute; left:0; right:0; bottom:0; z-index:60; background:#FAFAF7; border-top:2px solid #111; border-radius:24px 24px 0 0; max-height:90%; display:flex; flex-direction:column;\">\n          <div style=\"padding:12px 0 4px; display:flex; justify-content:center;\"><div style=\"width:38px; height:4px; border-radius:2px; background:#111;\"><\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:6px 22px 14px; display:flex; align-items:center; justify-content:space-between;\">\n            <h2 style=\"margin:0; font-weight:900; font-size:22px; letter-spacing:-.5px; color:#111;\">导出笔记<\u002Fh2>\n            <div onclick=\"{{ onExportClose }}\" style=\"cursor:pointer; width:30px; height:30px; border:1.5px solid #111; display:flex; align-items:center; justify-content:center; font-size:15px;\">✕<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"flex:1; overflow-y:auto; padding:0 22px 8px;\">\n            <!-- format chips -->\n            <div style=\"font-family:'Space Mono',monospace; font-size:10px; letter-spacing:2px; color:#999; font-weight:700; margin-bottom:8px;\">选择格式<\u002Fdiv>\n            <div style=\"display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px;\">\n              <sc-for list=\"{{ formats }}\" as=\"f\" hint-placeholder-count=\"6\">\n                <div class=\"chip\" data-fmt=\"{{ f.id }}\" onclick=\"{{ onFmt }}\" style=\"{{ f.style }}\">\n                  <span style=\"font-family:'Space Mono',monospace; font-size:14px; font-weight:700;\">{{ f.ext }}<\u002Fspan>\n                  <span style=\"font-size:10px; opacity:.7; margin-top:2px;\">{{ f.label }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n\n            <!-- per-format options -->\n            <div style=\"margin-top:16px;\">\n              <sc-if value=\"{{ isPng }}\" hint-placeholder-val=\"{{ true }}\">\n                <div style=\"font-family:'Space Mono',monospace; font-size:10px; letter-spacing:2px; color:#999; font-weight:700; margin-bottom:8px;\">图片模式<\u002Fdiv>\n                <div style=\"display:flex; gap:8px; margin-bottom:12px;\">\n                  <div data-mode=\"long\" onclick=\"{{ onPngMode }}\" style=\"{{ longStyle }}\">长图<span style=\"display:block; font-size:9px; opacity:.7; font-weight:400; margin-top:2px;\">单张 · 适合短笔记<\u002Fspan><\u002Fdiv>\n                  <div data-mode=\"paged\" onclick=\"{{ onPngMode }}\" style=\"{{ pagedStyle }}\">分页<span style=\"display:block; font-size:9px; opacity:.7; font-weight:400; margin-top:2px;\">多张 · 海量内容<\u002Fspan><\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <sc-if value=\"{{ isZip }}\" hint-placeholder-val=\"{{ false }}\">\n                <div style=\"font-family:'Space Mono',monospace; font-size:10px; letter-spacing:2px; color:#999; font-weight:700; margin-bottom:8px;\">加密压缩包<\u002Fdiv>\n                <div style=\"border:1.5px solid #111; padding:12px; margin-bottom:12px;\">\n                  <div style=\"font-size:11px; color:#666; margin-bottom:6px;\">打包内容<\u002Fdiv>\n                  <div style=\"display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;\">\n                    <div data-z=\"md\" onclick=\"{{ onZipTog }}\" style=\"{{ zMdStyle }}\">.md<\u002Fdiv>\n                    <div data-z=\"html\" onclick=\"{{ onZipTog }}\" style=\"{{ zHtmlStyle }}\">.html<\u002Fdiv>\n                    <div data-z=\"docx\" onclick=\"{{ onZipTog }}\" style=\"{{ zDocxStyle }}\">.docx<\u002Fdiv>\n                    <div data-z=\"pdf\" onclick=\"{{ onZipTog }}\" style=\"{{ zPdfStyle }}\">.pdf<\u002Fdiv>\n                  <\u002Fdiv>\n                  <div style=\"font-size:11px; color:#666; margin-bottom:6px;\">设置密码（AES-256）<\u002Fdiv>\n                  <input value=\"{{ zipPwd }}\" oninput=\"{{ onPwd }}\" type=\"text\" placeholder=\"留空则不加密\" style=\"width:100%; border:1.5px solid #111; padding:10px 12px; font-family:'Space Mono',monospace; font-size:13px; background:#fff; color:#111;\">\n                <\u002Fdiv>\n              <\u002Fsc-if>\n\n              <!-- preview viewport (browser-like scroll) -->\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:8px;\">\n                <div style=\"font-family:'Space Mono',monospace; font-size:10px; letter-spacing:2px; color:#999; font-weight:700;\">预览 · 可上下滑动<\u002Fdiv>\n                <div style=\"font-family:'Space Mono',monospace; font-size:10px; color:#E8451F; font-weight:700;\">{{ previewHint }}<\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"border:1.5px solid #111; background:#999; padding:0; max-height:300px; overflow-y:auto; box-shadow:inset 0 0 0 1px #fff;\">\n                <div id=\"export-src\" style=\"{{ exportSrcStyle }}\">\n                  <sc-for list=\"{{ pblocks }}\" as=\"b\" hint-placeholder-count=\"5\">\n                    <div style=\"{{ b.pvWrap }}\">\n                      <sc-if value=\"{{ b.isH1 }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-weight:900; font-size:26px; line-height:1.1; letter-spacing:-1px; color:#111;\">{{ b.text }}<\u002Fdiv><\u002Fsc-if>\n                      <sc-if value=\"{{ b.isH2 }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"font-weight:700; font-size:17px; line-height:1.3; color:#111;\">{{ b.text }}<\u002Fdiv><\u002Fsc-if>\n                      <sc-if value=\"{{ b.isP }}\" hint-placeholder-val=\"{{ true }}\"><div style=\"font-weight:400; font-size:13px; line-height:1.7; color:#222;\">{{ b.text }}<\u002Fdiv><\u002Fsc-if>\n                      <sc-if value=\"{{ b.isDiv }}\" hint-placeholder-val=\"{{ false }}\"><div style=\"display:flex; align-items:center; gap:8px; padding:6px 0;\"><div style=\"width:6px;height:6px;background:#E8451F;\"><\u002Fdiv><div style=\"flex:1;height:1.5px;background:#111;\"><\u002Fdiv><\u002Fdiv><\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"padding:12px 22px 28px; border-top:1.5px solid #111; background:#FAFAF7;\">\n            <div onclick=\"{{ onExport }}\" style=\"cursor:pointer; height:54px; background:{{ exportBtnBg }}; color:#fff; display:flex; align-items:center; justify-content:center; gap:10px; font-family:'Space Mono',monospace; font-size:14px; font-weight:700; letter-spacing:1px;\">{{ exportBtnLabel }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- toast -->\n      <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"position:absolute; left:50%; bottom:108px; transform:translateX(-50%); z-index:80; background:#111; color:#fff; padding:11px 18px; font-family:'Space Mono',monospace; font-size:12px; font-weight:700; letter-spacing:.5px; white-space:nowrap; box-shadow:0 8px 24px -8px rgba(0,0,0,.5);\">{{ toast }}<\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- home indicator -->\n      <div class=\"home-indicator\" style=\"position:absolute; bottom:8px; left:50%; transform:translateX(-50%); width:130px; height:5px; border-radius:3px; background:#111; opacity:.85; z-index:90;\"><\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  PALETTE = ['#E8451F','#1769E8','#0E9F6E','#9333EA'];\n  STRATAGEMS = [\n    {name:'瞒天过海', text:'备周则意怠；常见则不疑。阴在阳之内，不在阳之对。太阳，太阴。'},\n    {name:'围魏救赵', text:'共敌不如分敌；敌阳不如敌阴。'},\n    {name:'借刀杀人', text:'敌已明，友未定，引友杀敌，不自出力，以《损》推演。'},\n    {name:'以逸待劳', text:'困敌之势，不以战；损刚益柔。'},\n    {name:'趁火打劫', text:'敌之害大，就势取利；刚决柔也。'},\n    {name:'声东击西', text:'敌志乱萃，不虞，坤下兑上之象；利其不自主而取之。'},\n    {name:'无中生有', text:'诳也，非诳也，实其所诳也。少阴、太阴、太阳。'},\n    {name:'暗渡陈仓', text:'示之以动，利其静而有主；益动而巽。'},\n    {name:'隔岸观火', text:'阳乖序乱，阴以待逆。暴戾恣睢，其势自毙。顺以动豫，豫顺以动。'},\n    {name:'笑里藏刀', text:'信而安之，阴以图之。备而后动，勿使有变。刚中柔外也。'},\n    {name:'李代桃僵', text:'势必有损，损阴以益阳。'},\n    {name:'顺手牵羊', text:'微隙在所必乘；微利在所必得。少阴，少阳。'},\n    {name:'打草惊蛇', text:'疑以叩实，察而后动；复者，阴之媒也。'},\n    {name:'借尸还魂', text:'有用者，不可借；不能用者，求借。借不能用者而用之。匪我求童蒙，童蒙求我。'},\n    {name:'调虎离山', text:'待天以困之，用人以诱之；往蹇来返。'},\n    {name:'欲擒故纵', text:'逼则反兵；走则减势。紧随勿迫，累其气力，消其斗志，散而后擒，兵不血刃。需，有孚，光。'},\n    {name:'抛砖引玉', text:'类以诱之，击蒙也。'},\n    {name:'擒贼擒王', text:'摧其坚，夺其魁，以解其体。龙战于野，其道穷也。'},\n    {name:'釜底抽薪', text:'不敌其力，而消其势，兑下乾上之象。'},\n    {name:'混水摸鱼', text:'乘其阴乱，利其弱而无主。随，以向晦入宴息。'},\n    {name:'金蝉脱壳', text:'存其形，完其势；友不疑，敌不动。巽而止蛊。'},\n    {name:'关门捉贼', text:'小敌困之。剥，不利有攸往。'},\n    {name:'远交近攻', text:'形禁势格，利从近取，害以远隔。上火下泽。'},\n    {name:'假途伐虢', text:'两大之间，敌胁以从，我假以势。困，有言不信。'},\n    {name:'偷梁换柱', text:'频更其阵，抽其劲旅，待其自败，而后乘之。曳其轮也。'},\n    {name:'指桑骂槐', text:'大凌小者，警以诱之。刚中而应，行险而顺。'},\n    {name:'假痴不癫', text:'宁伪作不知不为，不伪作假知妄为。静不露机，云雷屯也。'},\n    {name:'上屋抽梯', text:'假之以便，唆之使前，断其援应，陷之死地。遇毒，位不当也。'},\n    {name:'树上开花', text:'借局布势，力小势大。鸿渐于陆，其羽可用为仪也。'},\n    {name:'反客为主', text:'乘隙插足，扼其主机，渐之进也。'},\n    {name:'美人计', text:'兵强者，攻其将；将智者，伐其情。将弱兵颓，其势自萎。利用御寇，顺相保也。'},\n    {name:'空城计', text:'虚者虚之，疑中生疑；刚柔之际，奇而复奇。'},\n    {name:'反间计', text:'疑中之疑。比之自内，不自失也。'},\n    {name:'苦肉计', text:'人不自害，受害必真；假真真假，间以得行。童蒙之吉，顺以巽也。'},\n    {name:'连环计', text:'将多兵众，不可以敌，使其自累，以杀其势。在师中吉，承天宠也。'},\n    {name:'走为上', text:'全师避敌。左次无咎，未失常也。'},\n  ];\n  todayFoot(){\n    const d = new Date(), w = ['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];\n    const p = x => String(x).padStart(2,'0');\n    return p(d.getMonth()+1)+'·'+p(d.getDate())+' '+w;\n  }\n  makeStrat(n){\n    const s = this.STRATAGEMS[n-1];\n    return { id:this.uid(), accent:this.PALETTE[(n-1)%4], tag:'计 / '+String(n).padStart(2,'0'),\n      seedTitle:s.name, seedBody:s.text, foot:this.todayFoot(),\n      blocks:[ {id:this.uid(),type:'h1',text:''}, {id:this.uid(),type:'p',text:''} ] };\n  }\n\n  state = {\n    view: 'library',\n    nextStrat: 4,\n    currentId: 'n1',\n    dragId: null,\n    addMenuOpen: false,\n    exportOpen: false,\n    fmt: 'png',\n    pngMode: 'long',\n    zip: { md: true, html: true, docx: false, pdf: false },\n    zipPwd: '',\n    busy: false,\n    toast: null,\n    notebooks: [\n      { id:'n1', tag:'NOTE / 03', accent:'#E8451F', date:'06.17 WED', foot:'06·17 周三', blocks:[\n        { id:'b1', type:'h1', text:'灵感一闪' },\n        { id:'b2', type:'p', text:'把每一个想法都当作一粒种子。不需要立刻知道它会长成什么，先放进土里，剩下的交给时间。' },\n      ]},\n      { id:'s1', tag:'计 / 01', accent:'#E8451F', foot:'06·16 周二', seedTitle:'瞒天过海', seedBody:'备周则意怠；常见则不疑。阴在阳之内，不在阳之对。太阳，太阴。', blocks:[\n        { id:'s1a', type:'h1', text:'' }, { id:'s1b', type:'p', text:'' },\n      ]},\n      { id:'s2', tag:'计 / 02', accent:'#1769E8', foot:'06·15 周一', seedTitle:'围魏救赵', seedBody:'共敌不如分敌；敌阳不如敌阴。', blocks:[\n        { id:'s2a', type:'h1', text:'' }, { id:'s2b', type:'p', text:'' },\n      ]},\n      { id:'s3', tag:'计 / 03', accent:'#0E9F6E', foot:'06·14 周日', seedTitle:'借刀杀人', seedBody:'敌已明，友未定，引友杀敌，不自出力，以《损》推演。', blocks:[\n        { id:'s3a', type:'h1', text:'' }, { id:'s3b', type:'p', text:'' },\n      ]},\n    ],\n  };\n\n  cur(){ return this.state.notebooks.find(n => n.id === this.state.currentId) || this.state.notebooks[0]; }\n  uid(){ return 'x' + Math.random().toString(36).slice(2,8); }\n\n  setCur(blocks){\n    this.setState(s => ({ notebooks: s.notebooks.map(n => n.id === s.currentId ? { ...n, blocks } : n) }));\n  }\n  flash(msg, ms){\n    this.setState({ toast: msg });\n    clearTimeout(this._t); this._t = setTimeout(() => this.setState({ toast: null }), ms || 2200);\n  }\n\n  // ---- nav ----\n  onOpen = (e) => { this.setState({ currentId: e.currentTarget.dataset.id, view: 'editor', addMenuOpen:false }); };\n\n  // ---- library card drag-reorder (long-press to lift; tap to open; move-before-lift = scroll) ----\n  onCardDown = (e, card) => {\n    if(e.button != null && e.button !== 0) return;\n    const id = card.dataset.id, pid = e.pointerId;\n    const startX = e.clientX, startY = e.clientY;\n    let activated = false;\n    const grid = document.getElementById('lib-grid');\n    try { card.setPointerCapture(pid); } catch(_){}\n\n    const cleanup = () => {\n      clearTimeout(timer);\n      window.removeEventListener('pointermove', move);\n      window.removeEventListener('pointerup', up);\n      window.removeEventListener('pointercancel', cancel);\n      try { card.releasePointerCapture(pid); } catch(_){}\n    };\n    const activate = () => { activated = true; this.beginCardDrag(grid, id, card, startX, startY); };\n    const timer = setTimeout(activate, 180);\n\n    const move = (ev) => {\n      const dx = ev.clientX - startX, dy = ev.clientY - startY;\n      if(!activated){\n        if(Math.abs(dx) > 12 || Math.abs(dy) > 12){ cleanup(); } // it's a scroll\n        return;\n      }\n      ev.preventDefault();\n      this.cardDragMove(ev);\n    };\n    const up = () => { cleanup(); if(activated){ this.endCardDrag(); } else { this.setState({ currentId:id, view:'editor', addMenuOpen:false }); } };\n    const cancel = () => { cleanup(); if(activated) this.endCardDrag(); };\n\n    window.addEventListener('pointermove', move, { passive:false });\n    window.addEventListener('pointerup', up);\n    window.addEventListener('pointercancel', cancel);\n  };\n\n  beginCardDrag(grid, id, dragEl, startX, startY){\n    if(!grid){ return; }\n    const cards = [...grid.querySelectorAll('[data-card]')];\n    const ids = cards.map(c => c.dataset.id);\n    const base = cards.map(c => { const r = c.getBoundingClientRect(); return { x:r.left, y:r.top, cx:r.left+r.width/2, cy:r.top+r.height/2 }; });\n    const fromIdx = ids.indexOf(id);\n    document.body.style.userSelect = 'none';\n    this._cdrag = { grid, id, dragEl, cards, ids, base, fromIdx, target:fromIdx, startX, startY, origBox: dragEl.style.boxShadow };\n    dragEl.style.transition = 'none';\n    dragEl.style.position = 'relative';\n    dragEl.style.zIndex = '50';\n    dragEl.style.boxShadow = '7px 9px 0 rgba(17,17,17,.32)';\n    dragEl.style.transform = 'scale(1.04)';\n  }\n\n  cardDragMove(ev){\n    const d = this._cdrag; if(!d) return;\n    const dx = ev.clientX - d.startX, dy = ev.clientY - d.startY;\n    d.dragEl.style.transform = 'translate(' + dx + 'px,' + dy + 'px) scale(1.04)';\n    let target = d.fromIdx, best = Infinity;\n    for(let i=0;i<d.base.length;i++){\n      const dd = Math.hypot(ev.clientX - d.base[i].cx, ev.clientY - d.base[i].cy);\n      if(dd < best){ best = dd; target = i; }\n    }\n    if(target !== d.target){\n      d.target = target;\n      const order = d.ids.slice();\n      const [m] = order.splice(d.fromIdx, 1);\n      order.splice(target, 0, m);\n      d.cards.forEach((c, origIdx) => {\n        if(origIdx === d.fromIdx) return;\n        const slot = order.indexOf(d.ids[origIdx]);\n        const ddx = d.base[slot].x - d.base[origIdx].x;\n        const ddy = d.base[slot].y - d.base[origIdx].y;\n        c.style.transition = 'transform .2s cubic-bezier(.2,.8,.2,1)';\n        c.style.transform = (ddx || ddy) ? ('translate(' + ddx + 'px,' + ddy + 'px)') : '';\n      });\n    }\n  }\n\n  endCardDrag(){\n    const d = this._cdrag; if(!d) return;\n    this._cdrag = null;\n    document.body.style.userSelect = '';\n    d.cards.forEach(c => { c.style.transition=''; c.style.transform=''; });\n    const de = d.dragEl;\n    de.style.transition=''; de.style.transform=''; de.style.zIndex=''; de.style.position='';\n    de.style.boxShadow = d.origBox;\n    if(d.target !== d.fromIdx){\n      this.setState(s => {\n        const arr = s.notebooks.slice();\n        const [m] = arr.splice(d.fromIdx, 1);\n        arr.splice(d.target, 0, m);\n        return { notebooks: arr };\n      });\n    }\n  }\n  onBack = () => this.setState({ view: 'library' });\n  onNew = () => {\n    const s = this.state, n = s.nextStrat;\n    let nb;\n    if(n <= 36){\n      nb = this.makeStrat(n);\n      this.setState({ notebooks:[...s.notebooks, nb], currentId:nb.id, view:'editor', nextStrat:n+1 });\n    } else {\n      nb = { id:this.uid(), tag:'计 / 新', accent:this.PALETTE[s.notebooks.length%4], seedTitle:null, seedBody:null, foot:this.todayFoot(), blocks:[\n        { id:this.uid(), type:'h1', text:'' }, { id:this.uid(), type:'p', text:'' },\n      ]};\n      this.setState({ notebooks:[...s.notebooks, nb], currentId:nb.id, view:'editor' });\n    }\n  };\n\n  // ---- editing (uncontrolled: text injected via refs so React never fights the caret) ----\n  componentDidMount(){\n    try {\n      const raw = (typeof AndroidPW!=='undefined'&&AndroidPW.loadAppData)?AndroidPW.loadAppData('notebook'):localStorage.getItem('miaoji_v2');\n      if(raw){ const d = JSON.parse(raw); if(d && d.notebooks && d.notebooks.length){ this.setState({ notebooks:d.notebooks, nextStrat:d.nextStrat||4, currentId:d.notebooks[0].id }); } }\n    } catch(e){}\n    this.syncEditables();\n    // delegated pointerdown — survives bundling (onPointerDown attrs get lowercased & dropped by React)\n    this._deleg = (e) => {\n      if(e.button != null && e.button !== 0) return;\n      const t = e.target; if(!t || !t.closest) return;\n      const hdl = t.closest('.hdl'); if(hdl){ this.onHandleDown(e, hdl); return; }\n      const card = t.closest('[data-card]'); if(card){ this.onCardDown(e, card); return; }\n    };\n    document.addEventListener('pointerdown', this._deleg, true);\n  }\n  componentWillUnmount(){\n    if(this._deleg) document.removeEventListener('pointerdown', this._deleg, true);\n  }\n  componentDidUpdate(){\n    this.syncEditables();\n    clearTimeout(this._save);\n    this._save = setTimeout(() => {\n      try { var _nd=JSON.stringify({ notebooks:this.state.notebooks, nextStrat:this.state.nextStrat }); if(typeof AndroidPW!=='undefined'&&AndroidPW.saveAppData){AndroidPW.saveAppData('notebook',_nd);}else{localStorage.setItem('miaoji_v2',_nd);} } catch(e){}\n    }, 400);\n  }\n  onFocusEd = (e) => { const el = e.currentTarget; if(document.activeElement !== el) el.focus(); };\n  caretEnd(el){ try { const r = document.createRange(); r.selectNodeContents(el); r.collapse(false); const s = getSelection(); s.removeAllRanges(); s.addRange(r); } catch(e){} }\n  focusBlock(id, end){\n    setTimeout(() => {\n      const ed = document.querySelector('#editor-scroll [data-blk=\"'+id+'\"] [contenteditable]');\n      if(ed){ ed.focus(); if(end) this.caretEnd(ed); }\n    }, 60);\n  }\n  onKey = (e) => {\n    const id = e.currentTarget.dataset.id;\n    if(e.key === 'Enter' && !e.shiftKey){\n      e.preventDefault();\n      const text = e.currentTarget.innerText.replace(/\\n+$/,'');\n      const blocks = this.cur().blocks.map(b => b.id === id ? { ...b, text } : b);\n      const idx = blocks.findIndex(b => b.id === id);\n      const nb = { id:this.uid(), type:'p', text:'' };\n      blocks.splice(idx+1, 0, nb);\n      this.setCur(blocks);\n      this.focusBlock(nb.id, false);\n    } else if(e.key === 'Backspace' && e.currentTarget.innerText === ''){\n      const blocks = this.cur().blocks;\n      if(blocks.length <= 1) return;\n      const idx = blocks.findIndex(b => b.id === id);\n      e.preventDefault();\n      const prev = blocks[idx-1];\n      this.setCur(blocks.filter(b => b.id !== id));\n      if(prev) this.focusBlock(prev.id, true);\n    }\n  };\n  syncEditables(){\n    if(this.state.view !== 'editor') return;\n    const map = {}; this.cur().blocks.forEach(b => { map[b.id] = b; });\n    document.querySelectorAll('#editor-scroll [contenteditable][data-id]').forEach(el => {\n      const b = map[el.dataset.id]; if(!b) return;\n      if(document.activeElement === el) return;\n      if((el.innerText || '') !== (b.text || '')) el.textContent = b.text || '';\n    });\n  }\n  onInput = (e) => {\n    const id = e.currentTarget.dataset.id, text = e.currentTarget.innerText.replace(/\\n+$/,'');\n    const blk = this.cur().blocks.find(b => b.id === id);\n    if(blk) blk.text = text; // mutate in place: no re-render, caret stays put\n  };\n  onEdit = (e) => {\n    const id = e.currentTarget.dataset.id, text = e.currentTarget.innerText.replace(/\\n+$/,'');\n    this.setCur(this.cur().blocks.map(b => b.id === id ? { ...b, text } : b));\n  };\n  onAddOpen = () => this.setState(s => ({ addMenuOpen: !s.addMenuOpen }));\n  onAdd = (e) => {\n    const type = e.currentTarget.dataset.type;\n    const nb = { id:this.uid(), type, text:'' };\n    this.setCur([...this.cur().blocks, nb]);\n    this.setS    if(sel.docx){ const db = await this.buildDocxBlob(nb); await writer.add(this.fname(nb)+'.docx', new z.BlobReader(db)); n++; }\n      if(sel.pdf){\n        const canvas = await this.renderCanvas();\n        const JsPDF = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;\n        const pdf = new JsPDF({ unit:'pt', format:'a4' });\n        const pw = pdf.internal.pageSize.getWidth(), ph = pdf.internal.pageSize.getHeight();\n        const imgH = pw * canvas.height / canvas.width; const img = canvas.toDataURL('image/png');\n        let left = imgH, y = 0; pdf.addImage(img,'PNG',0,0,pw,imgH); left -= ph;\n        while(left>0){ y -= ph; pdf.addPage(); pdf.addImage(img,'PNG',0,y,pw,imgH); left -= ph; }\n        const blob = pdf.output('blob');\n        await writer.add(this.fname(nb)+'.pdf', new z.BlobReader(blob)); n++;\n      }\n      if(n === 0){ await writer.add('readme.txt', new z.TextReader('未选择任何内容')); }\n      const blob = await writer.close();\n      await this.saveBlob(this.fname(nb)+'.zip', blob);\n      this.flash(pwd ? ('已生成加密压缩包 🔒 ('+n+'项)') : ('已生成压缩包 ('+n+'项)'));\n    } finally { this.setState({ busy:false }); }\n  }\n\n  // ---- render ----\n  renderVals(){\n    const s = this.state, nb = this.cur();\n    const fmtList = [\n      { id:'md', ext:'MD', label:'Markdown' },\n      { id:'html', ext:'HTML', label:'网页' },\n      { id:'pdf', ext:'PDF', label:'文档' },\n      { id:'png', ext:'IMG', label:'长图/分页' },\n      { id:'zip', ext:'ZIP', label:'加密包' },\n      { id:'docx', ext:'DOCX', label:'Word' },\n    ];\n    const chipOn = 'cursor:pointer; padding:13px 6px; border:1.5px solid #111; background:#111; color:#fff; display:flex; flex-direction:column; align-items:center; text-align:center;';\n    const chipOff = 'cursor:pointer; padding:13px 6px; border:1.5px solid #111; background:#fff; color:#111; display:flex; flex-direction:column; align-items:center; text-align:center;';\n    const segOn = 'flex:1; cursor:pointer; padding:11px; border:1.5px solid #1 n      };\n    });\n    const pblocks = nb.blocks.map(b => ({\n      ...b, isH1:b.type==='h1', isH2:b.type==='h2', isP:b.type==='p', isDiv:b.type==='divider',\n      pvWrap: b.type==='h1' ? 'margin:0 0 6px;' : (b.type==='divider' ? 'margin:4px 0;' : 'margin:8px 0;'),\n    }));\n\n    const paged = s.pngMode === 'paged';\n    return {\n      isLib: s.view === 'library',\n      isEd: s.view === 'editor',\n      countLabel: s.notebooks.length + ' 本',\n      libNotebooks,\n      edMeta: nb.tag + ' — ' + (nb.date || nb.foot || ''),\n      blocks, pblocks,\n      onOpen:this.onOpen, onCardDown:this.onCardDown, onBack:this.onBack, onNew:this.onNew,\n      onHandleDown:this.onHandleDown, onEdit:this.onEdit, onInput:this.onInput, onFocusEd:this.onFocusEd, onKey:this.onKey,\n      onAddOpen:this.onAddOpen, addMenuOpen:s.addMenuOpen, onAdd:this.onAdd, onDel:this.onDel,\n      onExportOpen:this.onExportOpen, onExportClose:this.onExportClose, exportOpen:s.exportOpen,\n      formats: fmtList.map(f => ({ ...f, style: s.fmt===f.id ? chipOn : chipOff })),\n      onFmt:this.onFmt,\n      isPng: s.fmt==='png', isZip: s.fmt==='zip',\n      longStyle: !paged ? segOn : segOff, pagedStyle: paged ? segOn : segOff, onPngMode:this.onPngMode,\n      zMdStyle: s.zip.md?tagOn:tagOff, zHtmlStyle: s.zip.html?tagOn:tagOff, zDocxStyle: s.zip.docx?tagOn:tagOff, zPdfStyle: s.zip.pdf?tagOn:tagOff, onZipTog:this.onZipTog,\n      zipPwd:s.zipPwd, onPwd:this.onPwd,\n      previewHint: s.fmt==='png' ? (paged ? '将分页输出' : '将输出单张长图') : '最终内容',\n      exportSrcStyle: 'background:#fff; padding:'+(s.fmt==='png'?'26px 22px':'22px 20px')+'; min-height:200px; '+(paged? 'max-width:none;':''),\n      onExport:this.onExport,\n      busy:s.busy,\n      exportBtnBg: s.busy ? '#888' : '#E8451F',\n      exportBtnLabel: s.busy ? '生成中…' : ('下载 .' + (s.fmt==='png'?'png':s.fmt) + (s.fmt==='png'&&paged?' ×N':'')),\n      toast:s.toast,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
