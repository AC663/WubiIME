<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="妙计">
<meta name="theme-color" content="#FAFAF7">
<title>妙计 · 笔记本</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  :root{
    --paper:#FAFAF7; --ink:#111; --accent:#E8451F; --muted:#666; --faint:#999;
    /* 系统字体：安卓走 Noto/Source Han（系统自带），苹果走 PingFang，全部零下载 */
    --sans:-apple-system,BlinkMacSystemFont,"PingFang SC","Noto Sans CJK SC","Source Han Sans SC","Microsoft YaHei","Heiti SC",sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,"Roboto Mono","Cascadia Mono",monospace;
  }
  html,body{margin:0;height:100%;}
  body{background:#cfccc4;font-family:var(--sans);color:var(--ink);-webkit-font-smoothing:antialiased;}
  [contenteditable]{outline:none;caret-color:var(--accent);}
  [contenteditable].ph:empty:before{content:attr(data-ph);color:#c4c0b8;pointer-events:none;display:block;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-thumb{background:#cdc9c0;border-radius:3px;}

  .phone-outer{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;}
  .phone-bezel{width:393px;height:852px;border-radius:48px;background:#111;padding:11px;position:relative;
    box-shadow:0 40px 90px -30px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.06) inset;}
  .phone-screen{width:100%;height:100%;border-radius:37px;overflow:hidden;background:var(--paper);position:relative;display:flex;flex-direction:column;}
  html,body{overflow-x:hidden;max-width:100vw;}
  .status-bar{position:absolute;top:0;left:0;right:0;z-index:30;display:flex;justify-content:space-between;align-items:center;
    padding:14px 30px 6px;font-family:var(--mono);font-size:14px;font-weight:700;color:#111;pointer-events:none;}
  .status-bar .dots{font-size:11px;letter-spacing:1px;}
  .home-indicator{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);width:130px;height:5px;border-radius:3px;background:#111;opacity:.85;z-index:90;}

  #app{flex:1;display:flex;flex-direction:column;min-height:0;}

  /* ---------- library ---------- */
  .lib{flex:1;display:flex;flex-direction:column;min-height:0;}
  .lib-head{padding:54px 24px 16px;}
  .lib-head .row{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;}
  .brand{font-family:var(--mono);font-size:13px;letter-spacing:3px;color:var(--accent);font-weight:700;}
  .head-right{display:flex;align-items:center;gap:10px;}
  .count{font-family:var(--mono);font-size:12px;color:var(--faint);}
  .kb-exit{cursor:pointer;display:flex;align-items:center;gap:5px;height:28px;padding:0 11px;border:1.5px solid #111;background:#fff;
    font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:.5px;color:#111;}
  .kb-exit:active{background:#111;color:#fff;}
  .rule{height:1.5px;background:#111;margin-top:14px;}
  .lib-scroll{flex:1;overflow-y:auto;padding:6px 18px 24px;}
  .lib-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:14px;width:100%;box-sizing:border-box;}   /* minmax(0,1fr)：长串永远撑不破列宽 */
  .nb{cursor:pointer;background:#fff;border:1.5px solid #111;aspect-ratio:3/4;padding:14px 13px;display:flex;flex-direction:column;
    min-width:0;max-width:100%;overflow:hidden;box-sizing:border-box;
    box-shadow:4px 4px 0 #111;transition:transform .18s cubic-bezier(.2,.8,.2,1),box-shadow .18s;}
  .nb:active{transform:scale(.97);}
  .nb-title{font-weight:900;font-size:18px;line-height:1.1;letter-spacing:-.5px;color:#111;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .nb-rule{display:flex;align-items:center;gap:6px;margin:9px 0 8px;}
  .nb-dot{width:5px;height:5px;}
  .nb-line{flex:1;height:1px;background:#111;}
  .nb-snip{font-size:10.5px;line-height:1.45;color:#666;display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;word-break:break-all;overflow-wrap:anywhere;min-width:0;}
  .nb-foot{margin-top:auto;display:flex;justify-content:space-between;align-items:center;font-family:var(--mono);font-size:8.5px;color:#999;padding-top:8px;}
  .lib-foot{padding:14px 22px 30px;border-top:1.5px solid #111;background:var(--paper);}
  .btn-block{cursor:pointer;height:52px;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;gap:10px;
    font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:1px;}

  /* ---------- editor ---------- */
  .ed{flex:1;display:flex;flex-direction:column;min-height:0;}
  .ed-nav{padding:50px 20px 12px;border-bottom:1.5px solid #111;background:var(--paper);z-index:20;display:flex;align-items:center;justify-content:space-between;}
  .nav-back{cursor:pointer;display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:12px;letter-spacing:1px;color:#111;text-transform:uppercase;}
  .nav-actions{display:flex;gap:8px;}
  .nav-exp{cursor:pointer;height:32px;padding:0 14px;border:1.5px solid #111;display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:1px;color:#111;background:#fff;}
  .nav-exp:active{background:#111;color:#fff;}
  .ed-scroll{flex:1;overflow-y:auto;padding:22px 22px 16px;}
  .blk{display:flex;gap:10px;align-items:flex-start;margin:7px 0;padding:2px 0;position:relative;}
  .blk .hdl{opacity:.32;font-family:var(--mono);font-size:13px;line-height:1.4;cursor:grab;user-select:none;touch-action:none;color:#111;padding-top:4px;}
  .blk:hover .hdl{opacity:.45;}
  .blk .body{flex:1;min-width:0;}
  .blk .del{opacity:0;cursor:pointer;font-size:13px;color:#bbb;padding:4px 2px 4px 6px;transition:opacity .15s;}
  .blk:hover .del{opacity:1;}
  .blk.on .del{opacity:1;color:#e05a4e;}          /* 触屏无hover：点击/聚焦的块挂 .on，× 跟随该块 */
  .blk.on .hdl{opacity:.5;}
  .b-h1{margin:0;font-weight:900;font-size:33px;line-height:1.08;letter-spacing:-1px;color:#111;white-space:pre-wrap;word-break:break-all;overflow-wrap:anywhere;}
  .b-h2{margin:0;font-weight:700;font-size:21px;line-height:1.25;color:#111;white-space:pre-wrap;word-break:break-all;overflow-wrap:anywhere;}
  .b-p{margin:0;font-weight:400;font-size:17px;line-height:1.72;color:#222;white-space:pre-wrap;word-break:break-all;overflow-wrap:anywhere;}   /* 长数字串/URL 必断行，绝不横向溢出 */
  .b-div{display:flex;align-items:center;gap:10px;padding:8px 0;}
  .b-div .sq{width:7px;height:7px;background:var(--accent);}
  .b-div .ln{flex:1;height:1.5px;background:#111;}
  .ed-addbar{position:relative;padding:14px 22px 30px;border-top:1.5px solid #111;background:var(--paper);display:flex;gap:10px;}
  .add-main{cursor:pointer;flex:1;min-width:0;height:48px;background:#111;color:#fff;display:flex;align-items:center;justify-content:center;gap:8px;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:1px;}
  .add-exp{cursor:pointer;flex:0 0 auto;height:48px;padding:0 16px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;gap:6px;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:1px;white-space:nowrap;}
  .add-scrim{position:absolute;inset:0;z-index:35;}
  .add-sheet{position:absolute;left:22px;right:22px;bottom:84px;background:#fff;border:1.5px solid #111;box-shadow:5px 5px 0 #111;padding:6px;display:grid;grid-template-columns:1fr 1fr;gap:6px;z-index:40;animation:up .32s cubic-bezier(.16,1,.3,1);}
  .add-opt{cursor:pointer;padding:12px;border:1.5px solid #111;display:flex;flex-direction:column;gap:2px;}
  .add-opt.dv{flex-direction:row;align-items:center;gap:8px;}
  .add-opt .s{font-family:var(--mono);font-size:9px;color:#999;}

  /* ---------- toast ---------- */
  .toast{position:absolute;left:50%;bottom:108px;transform:translateX(-50%);z-index:80;background:#111;color:#fff;padding:11px 18px;
    font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:.5px;white-space:nowrap;box-shadow:0 8px 24px -8px rgba(0,0,0,.5);}

  @keyframes up{from{transform:translateY(100%);}to{transform:translateY(0);}}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .scrim{animation:fade .25s ease;}

  /* 嵌入输入法时显示区又窄又矮：窄屏或矮屏一律去外壳全屏铺满(避免"小窗并列"观感) */
  /* 原生宿主标记(html.native 由 JS 检测 AndroidPW 注入)：与媒体查询双通道，任一命中即全屏 */
  html.native body{background:var(--paper);}
  html.native .phone-outer{padding:0;min-height:100dvh;display:block;}
  html.native .phone-bezel{width:100vw;height:100vh;height:100dvh;border-radius:0;padding:0;box-shadow:none;}
  html.native .phone-screen{border-radius:0;}
  html.native .status-bar,html.native .home-indicator{display:none;}
  html.native .lib-head{padding-top:14px;}
  html.native .ed-nav{padding-top:10px;padding-bottom:8px;}
  @media (max-width:600px), (max-height:900px){
    body{background:var(--paper);}
    .phone-outer{padding:0;min-height:100dvh;display:block;}
    .phone-bezel{width:100vw;height:100vh;height:100dvh;border-radius:0;padding:0;box-shadow:none;}
    .phone-screen{border-radius:0;}
    .status-bar,.home-indicator{display:none;}
    .lib-head{padding-top:14px;}
    .ed-nav{padding-top:10px;padding-bottom:8px;}
  }
</style>
</head>
<body>
<div class="phone-outer">
  <div class="phone-bezel">
    <div class="phone-screen">
      <div class="status-bar"><span>9:41</span><span class="dots">●●●  ▮▮▮  ▮</span></div>
      <div id="app"></div>
      <div class="home-indicator"></div>
    </div>
  </div>
</div>

<script>
try{ if(window.AndroidPW) document.documentElement.classList.add('native'); }catch(e){}
"use strict";
/* ============================================================================
   妙计 · 笔记本 — 纯自包含单文件版（零外部脚本 / 零外部字体 / 离线可用）
   数据走输入法私有加密桥 AndroidPW(key='notebook')，浏览器回退 localStorage。
   ========================================================================== */
(function(){
  const PALETTE = ['#E8451F','#1769E8','#0E9F6E','#9333EA'];
  const STRATAGEMS = [
    {name:'瞒天过海', text:'备周则意怠；常见则不疑。阴在阳之内，不在阳之对。太阳，太阴。'},
    {name:'围魏救赵', text:'共敌不如分敌；敌阳不如敌阴。'},
    {name:'借刀杀人', text:'敌已明，友未定，引友杀敌，不自出力，以《损》推演。'},
    {name:'以逸待劳', text:'困敌之势，不以战；损刚益柔。'},
    {name:'趁火打劫', text:'敌之害大，就势取利；刚决柔也。'},
    {name:'声东击西', text:'敌志乱萃，不虞，坤下兑上之象；利其不自主而取之。'},
    {name:'无中生有', text:'诳也，非诳也，实其所诳也。少阴、太阴、太阳。'},
    {name:'暗渡陈仓', text:'示之以动，利其静而有主；益动而巽。'},
    {name:'隔岸观火', text:'阳乖序乱，阴以待逆。暴戾恣睢，其势自毙。顺以动豫，豫顺以动。'},
    {name:'笑里藏刀', text:'信而安之，阴以图之。备而后动，勿使有变。刚中柔外也。'},
    {name:'李代桃僵', text:'势必有损，损阴以益阳。'},
    {name:'顺手牵羊', text:'微隙在所必乘；微利在所必得。少阴，少阳。'},
    {name:'打草惊蛇', text:'疑以叩实，察而后动；复者，阴之媒也。'},
    {name:'借尸还魂', text:'有用者，不可借；不能用者，求借。借不能用者而用之。匪我求童蒙，童蒙求我。'},
    {name:'调虎离山', text:'待天以困之，用人以诱之；往蹇来返。'},
    {name:'欲擒故纵', text:'逼则反兵；走则减势。紧随勿迫，累其气力，消其斗志，散而后擒，兵不血刃。需，有孚，光。'},
    {name:'抛砖引玉', text:'类以诱之，击蒙也。'},
    {name:'擒贼擒王', text:'摧其坚，夺其魁，以解其体。龙战于野，其道穷也。'},
    {name:'釜底抽薪', text:'不敌其力，而消其势，兑下乾上之象。'},
    {name:'混水摸鱼', text:'乘其阴乱，利其弱而无主。随，以向晦入宴息。'},
    {name:'金蝉脱壳', text:'存其形，完其势；友不疑，敌不动。巽而止蛊。'},
    {name:'关门捉贼', text:'小敌困之。剥，不利有攸往。'},
    {name:'远交近攻', text:'形禁势格，利从近取，害以远隔。上火下泽。'},
    {name:'假途伐虢', text:'两大之间，敌胁以从，我假以势。困，有言不信。'},
    {name:'偷梁换柱', text:'频更其阵，抽其劲旅，待其自败，而后乘之。曳其轮也。'},
    {name:'指桑骂槐', text:'大凌小者，警以诱之。刚中而应，行险而顺。'},
    {name:'假痴不癫', text:'宁伪作不知不为，不伪作假知妄为。静不露机，云雷屯也。'},
    {name:'上屋抽梯', text:'假之以便，唆之使前，断其援应，陷之死地。遇毒，位不当也。'},
    {name:'树上开花', text:'借局布势，力小势大。鸿渐于陆，其羽可用为仪也。'},
    {name:'反客为主', text:'乘隙插足，扼其主机，渐之进也。'},
    {name:'美人计', text:'兵强者，攻其将；将智者，伐其情。将弱兵颓，其势自萎。利用御寇，顺相保也。'},
    {name:'空城计', text:'虚者虚之，疑中生疑；刚柔之际，奇而复奇。'},
    {name:'反间计', text:'疑中之疑。比之自内，不自失也。'},
    {name:'苦肉计', text:'人不自害，受害必真；假真真假，间以得行。童蒙之吉，顺以巽也。'},
    {name:'连环计', text:'将多兵众，不可以敌，使其自累，以杀其势。在师中吉，承天宠也。'},
    {name:'走为上', text:'全师避敌。左次无咎，未失常也。'},
  ];

  /* ---- 私有数据通道 ---- */
  const Store = {
    /* ===== 分块存储 =====================================================
       真机走 AndroidPW 加密桥：每个 key 落一个独立 {key}.enc 文件(AES-256-GCM)；
       浏览器回退 localStorage(键加前缀 miaoji_)。笔记本按"本"切块：
         · nb_index  —— 索引：仅元数据 + 预览/字数(体积极小，秒读)
         · nb_<id>   —— 每本独立文件，含正文 blocks
       写入只触碰当前这一本 + 索引；读取在打开某本时才按需载入该本正文。
       从根本上避免"把全部笔记当一个大文件反复整体加解密"的性能拖累。 ===== */
    _hasPW(){ return typeof AndroidPW!=='undefined' && !!AndroidPW.saveAppData && !!AndroidPW.loadAppData; },
    _safe(k){ return String(k).replace(/[^A-Za-z0-9_]/g,'_'); },
    _get(key){
      try{
        if(this._hasPW()){ const s=AndroidPW.loadAppData(key); return s||null; }
        return localStorage.getItem('miaoji_'+key);
      }catch(e){ return null; }
    },
    _put(key,str){
      try{
        if(this._hasPW()){ AndroidPW.saveAppData(key,str); return; }
        localStorage.setItem('miaoji_'+key,str);
      }catch(e){}
    },
    _del(key){
      try{
        if(this._hasPW()){ AndroidPW.saveAppData(key,''); return; }   // 桥无删除接口：写空等效作废
        localStorage.removeItem('miaoji_'+key);
      }catch(e){}
    },
    bookKey(id){ return 'nb_'+this._safe(id); },
    loadIndex(){ try{ const s=this._get('nb_index'); const o=s?JSON.parse(s):null; return (o&&o.list)?o:null; }catch(e){ return null; } },
    saveIndex(idx){ this._put('nb_index', JSON.stringify(idx)); },
    loadBook(id){ try{ const s=this._get(this.bookKey(id)); return s?JSON.parse(s):null; }catch(e){ return null; } },
    saveBook(book){ this._put(this.bookKey(book.id), JSON.stringify(book)); },
    delBook(id){ this._del(this.bookKey(id)); },
    /* 旧版单文件 blob(notebook / miaoji_v2)：仅迁移时读一次；迁移后保留作备份(数据安全优先，绝不删) */
    loadLegacy(){
      try{
        const s = this._hasPW() ? AndroidPW.loadAppData('notebook') : localStorage.getItem('miaoji_v2');
        const o = s ? JSON.parse(s) : null;
        return (o && o.notebooks && o.notebooks.length) ? o : null;
      }catch(e){ return null; }
    },
    copy(text){
      try{ if(typeof AndroidPW!=='undefined' && AndroidPW.copyToClipboard){ AndroidPW.copyToClipboard(text); return; } }catch(e){}
      try{ navigator.clipboard && navigator.clipboard.writeText(text).catch(()=>{}); }catch(e){}
    },
    close(){
      try{ if(typeof AndroidPW!=='undefined' && AndroidPW.closeApp){ AndroidPW.closeApp(); return; } }catch(e){}
      try{ if(window.parent && window.parent.noteClose) window.parent.noteClose(); }catch(e){}
    }
  };

  const esc = s => String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const uid = () => 'x' + Math.random().toString(36).slice(2,8);
  function todayFoot(){
    const d=new Date(), w=['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
    const p=x=>String(x).padStart(2,'0');
    return p(d.getMonth()+1)+'·'+p(d.getDate())+' '+w;
  }
  function makeStrat(n){
    const s=STRATAGEMS[n-1];
    return { id:uid(), accent:PALETTE[(n-1)%4], tag:'计 / '+String(n).padStart(2,'0'),
      seedTitle:s.name, seedBody:s.text, foot:todayFoot(),
      blocks:[ {id:uid(),type:'h1',text:''}, {id:uid(),type:'p',text:''} ] };
  }

  /* ====================================================================== */
  const App = {
    state: {
      view:'library', nextStrat:4, currentId:'n1', addMenuOpen:false, pasteOpen:false, clips:[],
      exportOpen:false, fmt:'png', pngMode:'long',
      zip:{md:true,html:true,docx:false,pdf:false}, zipPwd:'', busy:false, toast:null,
      notebooks:[
        { id:'n1', tag:'NOTE / 03', accent:'#E8451F', foot:'06·17 周三', blocks:[
          { id:'b1', type:'h1', text:'灵感一闪' },
          { id:'b2', type:'p', text:'把每一个想法都当作一粒种子。不需要立刻知道它会长成什么，先放进土里，剩下的交给时间。' },
        ]},
        { id:'s1', tag:'计 / 01', accent:'#E8451F', foot:'06·16 周二', seedTitle:'瞒天过海', seedBody:'备周则意怠；常见则不疑。阴在阳之内，不在阳之对。太阳，太阴。', blocks:[ {id:'s1a',type:'h1',text:''},{id:'s1b',type:'p',text:''} ]},
        { id:'s2', tag:'计 / 02', accent:'#1769E8', foot:'06·15 周一', seedTitle:'围魏救赵', seedBody:'共敌不如分敌；敌阳不如敌阴。', blocks:[ {id:'s2a',type:'h1',text:''},{id:'s2b',type:'p',text:''} ]},
        { id:'s3', tag:'计 / 03', accent:'#0E9F6E', foot:'06·14 周日', seedTitle:'借刀杀人', seedBody:'敌已明，友未定，引友杀敌，不自出力，以《损》推演。', blocks:[ {id:'s3a',type:'h1',text:''},{id:'s3b',type:'p',text:''} ]},
      ],
    },
    root:null,

    cur(){ return this.state.notebooks.find(n=>n.id===this.state.currentId) || this.state.notebooks[0]; },
    setCur(blocks){
      const id=this.state.currentId;
      this.state.notebooks = this.state.notebooks.map(n=> n.id===id ? Object.assign({},n,{blocks}) : n);
      this.persist();
    },
    persist(){
      // 轻防抖：连续击键合并写，只写"当前这一本 + 索引"，不再整库落盘
      clearTimeout(this._save);
      this._save = setTimeout(()=> this.flushBook(), 250);
    },
    // 立即落盘（不等防抖）—— 切后台/关闭/锁屏时调，保证最后一字不丢
    flush(){ this.flushBook(); },
    // 只持久化当前笔记本的正文块 + 轻量索引(其余笔记本的正文文件原封不动)
    flushBook(){
      clearTimeout(this._save); this._save=null;
      const nb=this.cur();
      if(nb && nb._loaded!==false){ Store.saveBook(this.bookData(nb)); }
      this.saveMeta();
    },
    bookData(nb){ return { id:nb.id, tag:nb.tag, accent:nb.accent, foot:nb.foot,
      seedTitle:nb.seedTitle||null, seedBody:nb.seedBody||null, blocks:nb.blocks||[] }; },
    // 索引：全部笔记本的元数据 + 预览卡片摘要(无正文)，体积极小，按显示顺序排列
    saveMeta(){
      const idx={ v:3, nextStrat:this.state.nextStrat, list:this.state.notebooks.map(n=>{
        const card = (n._loaded!==false) ? this.cardSummary(n)
                   : (n._card || {has:false,title:n.seedTitle||'未命名',snippet:n.seedBody||'',words:0});
        n._card=card;
        return { id:n.id, tag:n.tag, accent:n.accent, foot:n.foot,
          seedTitle:n.seedTitle||null, seedBody:n.seedBody||null, card };
      })};
      Store.saveIndex(idx);
    },
    // 由正文计算卡片摘要(标题/预览/字数)；供索引与库视图复用
    cardSummary(nb){
      const blocks=nb.blocks||[];
      const has=blocks.some(b=>(b.text||'').trim());
      let title,snippet,wtext;
      if(has){
        title=(blocks.find(b=>b.type==='h1'&&b.text.trim())||blocks.find(b=>(b.text||'').trim())||{}).text||'未命名';
        snippet=blocks.filter(b=>(b.type==='p'||b.type==='h2')&&b.text.trim()).map(b=>b.text).join('  ')||'（空笔记）';
        wtext=blocks.map(b=>b.text||'').join('');
      } else if(nb.seedTitle){ title=nb.seedTitle; snippet=nb.seedBody||''; wtext=nb.seedTitle+(nb.seedBody||''); }
      else { title='未命名'; snippet='空白笔记 · 待书写'; wtext=''; }
      return { has, title, snippet, words:(wtext||'').replace(/\s/g,'').length };
    },
    // 库视图取卡片数据：已载入则实时算，未载入(瘦身 stub)则用索引里存的摘要
    cardOf(n){
      if(n._loaded!==false && n.blocks){ const c=this.cardSummary(n); n._card=c; return c; }
      const c=n._card||{};
      return { title:c.title||n.seedTitle||'未命名', snippet:c.snippet||n.seedBody||'空白笔记 · 待书写', words:c.words||0 };
    },
    // 按需载入某本正文(打开时调用)：一点即开，只读这一本的文件
    ensureLoaded(id){
      const nb=this.state.notebooks.find(n=>n.id===id);
      if(!nb || nb._loaded!==false) return nb;
      const data=Store.loadBook(id);
      nb.blocks = (data && Array.isArray(data.blocks) && data.blocks.length) ? data.blocks
                : [ {id:uid(),type:'h1',text:''},{id:uid(),type:'p',text:''} ];
      if(data){ if(data.tag!=null)nb.tag=data.tag; if(data.accent)nb.accent=data.accent;
        if(data.foot)nb.foot=data.foot; if('seedTitle' in data)nb.seedTitle=data.seedTitle; if('seedBody' in data)nb.seedBody=data.seedBody; }
      nb._loaded=true; return nb;
    },
    // 启动：只载索引→建立瘦身列表(正文按需);无索引则从旧 blob 迁移或用内置种子
    loadLibrary(){
      let idx=Store.loadIndex();
      if(!idx){
        const legacy=Store.loadLegacy();
        const seed=(legacy&&legacy.notebooks)?legacy.notebooks:this.state.notebooks;
        const nextStrat=(legacy&&legacy.nextStrat)?legacy.nextStrat:this.state.nextStrat;
        seed.forEach(nb=>{ Store.saveBook(this.bookData(nb)); });   // 切块落盘每一本
        idx={ v:3, nextStrat, list:seed.map(nb=>({ id:nb.id, tag:nb.tag, accent:nb.accent, foot:nb.foot,
          seedTitle:nb.seedTitle||null, seedBody:nb.seedBody||null, card:this.cardSummary(nb) })) };
        Store.saveIndex(idx);
      }
      this.state.notebooks = idx.list.map(e=>({ id:e.id, tag:e.tag, accent:e.accent, foot:e.foot,
        seedTitle:e.seedTitle||null, seedBody:e.seedBody||null, blocks:[], _loaded:false, _card:e.card||null }));
      this.state.nextStrat = idx.nextStrat||4;
      if(this.state.notebooks.length) this.state.currentId=this.state.notebooks[0].id;
    },
    flash(msg, ms){
      this.state.toast = msg; this.renderToast();
      clearTimeout(this._t); this._t = setTimeout(()=>{ this.state.toast=null; this.renderToast(); }, ms||2200);
    },

    /* ---------------- render dispatch ---------------- */
    render(){
      const s=this.state;
      if(s.view==='library') this.root.innerHTML = this.libHTML();
      else { this.ensureLoaded(s.currentId); this.root.innerHTML = this.edHTML(); }
      this.wire();
      this.renderToast();
    },
    renderToast(){
      let t=document.getElementById('toast');
      if(this.state.toast){
        if(!t){ t=document.createElement('div'); t.id='toast'; t.className='toast'; document.querySelector('.phone-screen').appendChild(t); }
        t.textContent=this.state.toast;
      } else if(t){ t.remove(); }
    },

    /* ---------------- LIBRARY ---------------- */
    libHTML(){
      const s=this.state;
      const cards = s.notebooks.map(n=>{
        const c = this.cardOf(n), title=c.title, snippet=c.snippet, words=c.words;
        return `<div class="nb" data-card="1" data-id="${n.id}">
          <div class="nb-title">${esc(title)}</div>
          <div class="nb-rule"><div class="nb-dot" style="background:${n.accent}"></div><div class="nb-line"></div></div>
          <div class="nb-snip">${esc(snippet)}</div>
          <div class="nb-foot"><span>${esc(n.foot||'草稿')}</span><span>${words} 字</span></div>
        </div>`;
      }).join('');
      return `<div class="lib">
        <div class="lib-head">
          <div class="row">
            <div class="brand">妙计 · 笔记本</div>
            <div class="head-right">
              <span class="count">${s.notebooks.length} 本</span>
              <div class="kb-exit" data-act="exit">⌨ 返回键盘</div>
            </div>
          </div>
          <div class="rule"></div>
        </div>
        <div class="lib-scroll"><div class="lib-grid" id="lib-grid">${cards}</div></div>
        <div class="lib-foot"><div class="btn-block" data-act="new">＋ 新建笔记本</div></div>
      </div>`;
    },

    /* ---------------- EDITOR ---------------- */
    blockHTML(b){
      let inner;
      if(b.type==='h1') inner=`<h1 contenteditable="true" class="ph b-h1" data-ph="标题" data-id="${b.id}"></h1>`;
      else if(b.type==='h2') inner=`<h2 contenteditable="true" class="ph b-h2" data-ph="小标题" data-id="${b.id}"></h2>`;
      else if(b.type==='divider') inner=`<div class="b-div"><div class="sq"></div><div class="ln"></div></div>`;
      else inner=`<p contenteditable="true" class="ph b-p" data-ph="正文…" data-id="${b.id}"></p>`;
      return `<div class="blk" data-blk="${b.id}">
        <span class="hdl" data-id="${b.id}">⠿</span>
        <div class="body">${inner}</div>
        <span class="del" data-id="${b.id}">✕</span>
      </div>`;
    },
    edHTML(){
      const nb=this.cur(), s=this.state;
      const blocks = nb.blocks.map(b=> this.blockHTML(b)).join('');
      const sheet = s.addMenuOpen ? `
        <div class="add-scrim" data-act="addtoggle"></div>
        <div class="add-sheet">
          <div class="add-opt" data-add="h1"><span style="font-weight:900;font-size:17px;">大标题</span><span class="s">一级标题</span></div>
          <div class="add-opt" data-add="h2"><span style="font-weight:700;font-size:15px;">小标题</span><span class="s">二级标题</span></div>
          <div class="add-opt" data-add="p"><span style="font-weight:400;font-size:15px;">正文段落</span><span class="s">正文</span></div>
          <div class="add-opt dv" data-add="divider"><span class="sq" style="width:6px;height:6px;background:var(--accent);"></span><span class="nb-line" style="flex:1;height:1.5px;background:#111;"></span><span class="s">分隔线</span></div>
        </div>` : '';
      return `<div class="ed">
        <div class="ed-nav">
          <div class="nav-back" data-act="back">← 笔记本</div>
          <div class="nav-actions">
            <div class="kb-exit" data-act="exit">⌨ 返回键盘</div>
          </div>
        </div>
        <div class="ed-scroll" id="editor-scroll">${blocks}<div style="height:30px;"></div></div>
        <div class="ed-addbar">${sheet}
          <div class="add-main" data-act="addtoggle">＋ 文本类型</div>
          <div data-act="paste" title="粘贴私有剪贴板" style="cursor:pointer;width:48px;height:48px;border:1.5px solid #111;background:#fff;color:#111;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;">贴</div>
          <div class="add-exp" data-act="export">导出 ↧</div>
        </div>
      </div>`;
    },

    /* ---------------- wiring ---------------- */
    wire(){
      const r=this.root;
      r.querySelectorAll('[data-act]').forEach(el=>{
        el.addEventListener('click', e=>{
          const a=el.dataset.act;
          if(a==='exit') Store.close();
          else if(a==='new') this.onNew();
          else if(a==='back'){ this.state.view='library'; this.state.addMenuOpen=false; this.render(); }
          else if(a==='export') this.openExport();
          else if(a==='paste') this.openPaste();
          else if(a==='addtoggle'){ this.state.addMenuOpen=!this.state.addMenuOpen; this.render(); }
        });
      });
      r.querySelectorAll('[data-add]').forEach(el=>{
        el.addEventListener('click', ()=> this.onAdd(el.dataset.add));
      });
      if(this.state.view==='editor'){
        this.root.querySelectorAll('#editor-scroll .blk').forEach(blk=> this.wireBlockEl(blk));
        this.syncEditables();
      }
    },
    /* 单块接线：整页渲染与手术式插块共用。focus 同时标记激活块(× 跟随，见 #5) */
    wireBlockEl(blk){
      blk.querySelectorAll('[contenteditable]').forEach(el=>{
        el.addEventListener('input', e=> this.onInput(el));
        el.addEventListener('keydown', e=> this.onKey(e, el));
        el.addEventListener('blur', e=> this.onEdit(el));
        el.addEventListener('keyup', ()=> this.saveCaret(el));
        el.addEventListener('pointerup', ()=> this.saveCaret(el));
        el.addEventListener('focus', ()=>{ this.saveCaret(el); this.markActive(el.dataset.id); });
      });
      const d=blk.querySelector('.del');
      if(d) d.addEventListener('click', ()=> this.onDel(d.dataset.id));
    },
    markActive(id){
      document.querySelectorAll('#editor-scroll .blk.on').forEach(x=>{ if(x.dataset.blk!==id) x.classList.remove('on'); });
      const w=document.querySelector('#editor-scroll [data-blk="'+id+'"]'); if(w) w.classList.add('on');
    },
    /* ---- 手术式块操作：只动涉事 DOM 节点，绝不整页重渲 ----
       整页重渲会摧毁聚焦元素 → 系统输入连接断开 → 输入法重启/卡白屏(#3 根因)，
       且滚动位置归零(#4 根因)。以下所有块级增删一律走这里。 */
    blockDom(b){
      const t=document.createElement('div'); t.innerHTML=this.blockHTML(b).trim();
      const el=t.firstElementChild; this.wireBlockEl(el); return el;
    },
    insertBlockAfter(afterId, nb){
      const blocks=this.cur().blocks.slice();
      const idx=blocks.findIndex(b=>b.id===afterId); if(idx<0) return null;
      blocks.splice(idx+1,0,nb); this.setCur(blocks);
      const el=this.blockDom(nb);
      const cur=document.querySelector('#editor-scroll [data-blk="'+afterId+'"]');
      if(cur&&cur.parentNode) cur.parentNode.insertBefore(el, cur.nextSibling);
      else{ const sc=document.getElementById('editor-scroll'); if(sc) sc.insertBefore(el, sc.lastElementChild); }
      const ed=el.querySelector('[contenteditable]');
      if(ed && nb.text) ed.textContent=nb.text;
      return el;
    },
    removeBlockEl(id){
      const w=document.querySelector('#editor-scroll [data-blk="'+id+'"]'); if(w) w.remove();
    },
    caretTo(ed, offset){
      try{
        ed.focus();
        const node=ed.firstChild;
        const r=document.createRange();
        if(node && node.nodeType===3) r.setStart(node, Math.min(offset, node.textContent.length));
        else { r.selectNodeContents(ed); r.collapse(offset>0?false:true); }
        r.collapse(true);
        const sel=getSelection(); sel.removeAllRanges(); sel.addRange(r);
      }catch(e){ try{ this.caretEnd(ed); }catch(_){} }
      this.saveCaret(ed);
    },
    syncEditables(){
      if(this.state.view!=='editor') return;
      const map={}; this.cur().blocks.forEach(b=> map[b.id]=b);
      document.querySelectorAll('#editor-scroll [contenteditable][data-id]').forEach(el=>{
        const b=map[el.dataset.id]; if(!b) return;
        if(document.activeElement===el) return;
        if((el.innerText||'')!==(b.text||'')) el.textContent = b.text||'';
      });
    },

    /* ---------------- nav / create ---------------- */
    onNew(){
      const s=this.state, n=s.nextStrat;
      let nb;
      if(n<=36){ nb=makeStrat(n); s.notebooks=[...s.notebooks,nb]; s.currentId=nb.id; s.view='editor'; s.nextStrat=n+1; }
      else {
        nb={ id:uid(), tag:'计 / 新', accent:PALETTE[s.notebooks.length%4], seedTitle:null, seedBody:null, foot:todayFoot(),
          blocks:[ {id:uid(),type:'h1',text:''},{id:uid(),type:'p',text:''} ] };
        s.notebooks=[...s.notebooks,nb]; s.currentId=nb.id; s.view='editor';
      }
      this.persist(); this.render();
    },
    /* ---------------- paste: 私有剪贴板 ---------------- */
    saveCaret(el){
      try{ const sel=getSelection(); if(sel&&sel.rangeCount && el.contains(sel.anchorNode)){ this._caret={ id:el.dataset.id, off:this.caretOffset(el), range:sel.getRangeAt(0).cloneRange() }; } }catch(e){}
    },
    readClips(){
      try{ if(typeof AndroidPW!=='undefined' && AndroidPW.getClipboardAll){ const a=JSON.parse(AndroidPW.getClipboardAll()||'[]'); return Array.isArray(a)?a:[]; } }catch(e){}
      if(typeof AndroidPW==='undefined') return ['示例剪贴内容 · 浏览器预览','三十六计 · 走为上']; // 仅浏览器预览占位
      return [];
    },
    openPaste(){ this.state.addMenuOpen=false; this.state.clips=this.readClips(); this.state.pasteOpen=true; this.renderPaste(); },
    closePaste(){ this.state.pasteOpen=false; this.renderPaste(); },
    renderPaste(){
      let ov=document.getElementById('paste-overlay');
      if(!this.state.pasteOpen){ if(ov) ov.remove(); return; }
      if(!ov){ ov=document.createElement('div'); ov.id='paste-overlay'; document.querySelector('.phone-screen').appendChild(ov); }
      ov.innerHTML=this.pasteHTML(); this.wirePaste();
    },
    pasteHTML(){
      const clips=this.state.clips||[];
      const items = clips.length ? clips.map((t,i)=>`<div data-paste="${i}" style="cursor:pointer;border:1.5px solid #111;background:#fff;padding:12px 13px;margin-bottom:8px;box-shadow:3px 3px 0 #111;">
          <div style="font-size:14px;line-height:1.5;color:#222;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;">${esc(t)}</div>
          <div style="font-family:var(--mono);font-size:9px;color:#999;margin-top:6px;">${i===0?'最新 · ':''}${String(t).replace(/\s/g,'').length} 字</div>
        </div>`).join('')
        : `<div style="text-align:center;color:#999;padding:46px 0;font-size:13px;">私有剪贴板暂无内容<br><span style="font-size:11px;">用本输入法复制后即可在此粘贴</span></div>`;
      return `<div class="scrim" data-paste="close" style="position:absolute;inset:0;background:rgba(17,17,17,.42);z-index:50;"></div>
        <div class="sheet" style="position:absolute;left:0;right:0;bottom:0;z-index:60;background:var(--paper);border-top:2px solid #111;border-radius:24px 24px 0 0;max-height:80%;display:flex;flex-direction:column;animation:up .32s cubic-bezier(.16,1,.3,1);">
          <div style="padding:12px 0 4px;display:flex;justify-content:center;"><div style="width:38px;height:4px;border-radius:2px;background:#111;"></div></div>
          <div style="padding:6px 22px 8px;display:flex;align-items:center;justify-content:space-between;">
            <h2 style="margin:0;font-weight:900;font-size:22px;letter-spacing:-.5px;color:#111;">私有剪贴板</h2>
            <div data-paste="close" style="cursor:pointer;width:30px;height:30px;border:1.5px solid #111;display:flex;align-items:center;justify-content:center;font-size:15px;">✕</div>
          </div>
          <div style="padding:0 22px 8px;font-family:var(--mono);font-size:10px;letter-spacing:1px;color:#999;">点选一条插入到光标处</div>
          <div style="flex:1;overflow-y:auto;padding:8px 22px 28px;">${items}</div>
        </div>`;
    },
    wirePaste(){
      const ov=document.getElementById('paste-overlay'); if(!ov) return;
      ov.querySelectorAll('[data-paste]').forEach(el=>{
        el.addEventListener('click', ()=>{
          const v=el.dataset.paste;
          if(v==='close'){ this.closePaste(); return; }
          const idx=parseInt(v,10); const txt=(this.state.clips||[])[idx];
          if(txt!=null) this.insertAtCaret(txt);
          this.closePaste();
        });
      });
    },
    insertAtCaret(text){
      const s=String(text).replace(/\r\n?/g,'\n');
      // 多行内容：保真粘贴——每行一个块，原样保留缩进/项目符号/空格(配合 pre-wrap 呈现)，不再挤成一块
      if(s.includes('\n')){ this.insertBlocksVerbatim(s); return; }
      // 单行：状态直写。真机上 focus()+execCommand 在弹层关闭/输入法窗口切换的窗口期经常静默失败，
      //   还会把输入法搅成无响应——现在直接改块数据→重渲染→复位光标，与输入法零纠缠，百发百中。
      const c=this._caret;
      const blocks=this.cur().blocks.slice();
      const idx=c ? blocks.findIndex(b=>b.id===c.id) : -1;
      if(idx<0){
        const nb={ id:uid(), type:'p', text:s };
        this.setCur([...blocks, nb]); this.render();
        this.focusBlock(nb.id,true);
        this.flash('已粘贴到新段落'); return;
      }
      const blk=blocks[idx];
      const old=blk.text||'';
      const off=Math.max(0, Math.min((c.off==null?old.length:c.off), old.length));
      blocks[idx]=Object.assign({},blk,{text: old.slice(0,off)+s+old.slice(off)});
      this.setCur(blocks); this.render();
      this.focusBlockAt(blk.id, off+s.length);
      this.flash('已粘贴');
    },
    // 原样入块：按行拆块，识别 Markdown 标题(#/##)映射为标题块，其余逐字保留(含项目符号、缩进、行内空格)；
    // 插入位置：光标所在块之后，无光标则追加到末尾
    insertBlocksVerbatim(s){
      const lines=s.split('\n');
      const mk=[];
      let blanks=0;
      for(const raw of lines){
        if(!raw.trim()){ blanks++; continue; }               // 空行不造幽灵块：段间距由块间距自然表达
        let type='p', text=raw.replace(/\s+$/,'');           // 去行尾空白，行首缩进保留
        const t=text.trimStart();
        if(/^#\s+/.test(t)){ type='h1'; text=t.replace(/^#\s+/,''); }
        else if(/^##+\s+/.test(t)){ type='h2'; text=t.replace(/^##+\s+/,''); }
        else if(/^(---+|\*\*\*+|___+)$/.test(t)){ type='divider'; text=''; }
        mk.push({ id:uid(), type, text });
        blanks=0;
      }
      if(!mk.length){ this.flash('内容为空'); return; }
      const blocks=this.cur().blocks.slice();
      const c=this._caret;
      let at=blocks.length;
      if(c){ const i=blocks.findIndex(b=>b.id===c.id); if(i>=0) at=i+1; }
      blocks.splice(at,0,...mk);
      this.setCur(blocks); this.render();
      const last=mk[mk.length-1];
      this.focusBlock(last.id,true);
      this.flash('已保真粘贴 '+mk.length+' 段');
    },

    /* ---------------- 五笔输入路由：接收父键盘 postMessage，写入当前焦点 ---------------- */
    reportEditing(b){
      try{ if(window.parent && window.parent!==window) window.parent.postMessage({src:'note',type:'focus',editing:!!b},'*'); }catch(e){}
    },
    activeEditable(){
      const ae=document.activeElement;
      if(!ae) return null;
      if(ae.tagName==='INPUT' || ae.tagName==='TEXTAREA') return {el:ae, kind:'input'};
      if(ae.getAttribute && ae.getAttribute('contenteditable')==='true' && ae.dataset && ae.dataset.id) return {el:ae, kind:'ce'};
      return null;
    },
    caretOffset(ed){
      try{ const sel=getSelection(); if(!sel||!sel.rangeCount) return ed.innerText.length;
        const r=sel.getRangeAt(0); const pre=r.cloneRange(); pre.selectNodeContents(ed); pre.setEnd(r.startContainer,r.startOffset); return pre.toString().length;
      }catch(e){ return ed.innerText.length; }
    },
    syncFromDom(ed){
      const id=ed.dataset.id, blk=this.cur().blocks.find(b=>b.id===id);
      if(blk){ blk.text=ed.innerText.replace(/\n+$/,''); this.persist(); this.saveCaret(ed); }
    },
    onWubi(type, text){
      const a=this.activeEditable();
      // 输入框（如加密密码）
      if(a && a.kind==='input'){
        const el=a.el, s=el.selectionStart==null?el.value.length:el.selectionStart, e=el.selectionEnd==null?el.value.length:el.selectionEnd;
        if(type==='commit'){ el.value=el.value.slice(0,s)+text+el.value.slice(e); el.selectionStart=el.selectionEnd=s+text.length; }
        else if(type==='delete'){ if(s!==e){ el.value=el.value.slice(0,s)+el.value.slice(e); el.selectionStart=el.selectionEnd=s; } else if(s>0){ el.value=el.value.slice(0,s-1)+el.value.slice(s); el.selectionStart=el.selectionEnd=s-1; } }
        else return;
        el.dispatchEvent(new Event('input',{bubbles:true})); return;
      }
      // 富文本块
      if(type==='commit'){
        if(!a || a.kind!=='ce'){ this.insertAtCaret(text); return; }   // 无焦点→走光标/新段落兼容逻辑
        const ed=a.el; ed.focus();
        let ok=false; try{ ok=document.execCommand('insertText',false,String(text)); }catch(e){}
        if(!ok){ try{ const sel=getSelection(); if(sel&&sel.rangeCount){ const r=sel.getRangeAt(0); r.deleteContents(); r.insertNode(document.createTextNode(String(text))); r.collapse(false); sel.removeAllRanges(); sel.addRange(r);} else ed.textContent+=String(text); }catch(e){} }
        this.syncFromDom(ed); return;
      }
      if(type==='delete'){
        if(!a || a.kind!=='ce') return;
        const ed=a.el, sel=getSelection();
        const collapsed = !sel || sel.isCollapsed;
        if(!collapsed || this.caretOffset(ed)>0){ try{ document.execCommand('delete'); }catch(e){} this.syncFromDom(ed); return; }
        this.mergeIntoPrev(ed.dataset.id); return;   // 光标在块首→并入上一块
      }
      if(type==='enter'){
        if(!a || a.kind!=='ce') return;
        this.splitAtCaret(a.el); return;
      }
    },
    mergeIntoPrev(id){
      const blocks=this.cur().blocks.slice();
      const idx=blocks.findIndex(b=>b.id===id); if(idx<=0) return;
      const prev=blocks[idx-1];
      if(prev.type==='divider'){   // 上一块是分隔线：删线本身，当前块留在原地(手术式)
        blocks.splice(idx-1,1); this.setCur(blocks);
        this.removeBlockEl(prev.id);
        return;
      }
      const caret=(prev.text||'').length, merged=(prev.text||'')+(blocks[idx].text||'');
      blocks[idx-1]=Object.assign({},prev,{text:merged});
      blocks.splice(idx,1);
      this.setCur(blocks);
      this.removeBlockEl(id);
      const ped=document.querySelector('#editor-scroll [data-blk="'+prev.id+'"] [contenteditable]');
      if(ped){ ped.textContent=merged; this.caretTo(ped, caret); }
      this.markActive(prev.id);
    },
    splitAtCaret(ed){
      const id=ed.dataset.id, off=this.caretOffset(ed), full=ed.innerText.replace(/\n+$/,'');
      const before=full.slice(0,off), after=full.slice(off);
      const blocks=this.cur().blocks.map(b=> b.id===id?Object.assign({},b,{text:before}):b);
      this.setCur(blocks);
      if(ed.innerText!==before) ed.textContent=before;
      const nb={ id:uid(), type:'p', text:after };
      const el=this.insertBlockAfter(id, nb); if(!el) return;
      const ned=el.querySelector('[contenteditable]');
      if(ned) this.caretTo(ned, 0);
      this.markActive(nb.id);
    },
    focusBlockAt(id, offset){
      setTimeout(()=>{
        const ed=document.querySelector('#editor-scroll [data-blk="'+id+'"] [contenteditable]'); if(!ed) return;
        ed.focus();
        try{ const tn=ed.firstChild || ed; const node=(tn.nodeType===3)?tn:ed; const max=(node.nodeType===3?node.textContent.length:0);
          const r=document.createRange(); if(node.nodeType===3){ r.setStart(node, Math.min(offset,max)); } else { r.selectNodeContents(ed); r.collapse(true); }
          r.collapse(true); const sel=getSelection(); sel.removeAllRanges(); sel.addRange(r);
        }catch(e){ this.caretEnd(ed); }
        this.saveCaret(ed);
      }, 60);
    },

    /* ---------------- export: serialization ---------------- */

    /* ---------------- export: file delivery ---------------- */
    async saveBlob(name, blob){
      /* 导出根治(分块协议)：saveBegin → ≤512KB分块saveChunk(杜绝超大字符串单次跨桥失败) → saveEnd。
         独立窗口(AppActivity)：saveEnd 返回 "PICKER"，弹系统"保存至"对话框，用户亲选位置，
           写入结果经 window.onSaveResult(ok,msg) 回调——真实落盘才报成功。
         键盘内嵌(IME)：saveEnd 同步返回 "OK:路径" / "ERR:原因"，把真实结果原样告知。
         成功/失败提示统一由本函数发出，调用方不再另发成功toast(旧版盲报"已导出✓"的根因)。 */
      if(window.AndroidPW && AndroidPW.saveBegin){
        try{
          const b64=await new Promise((res,rej)=>{ const r=new FileReader();
            r.onload=()=>res(String(r.result).split(',')[1]||''); r.onerror=()=>rej(new Error('read')); r.readAsDataURL(blob); });
          AndroidPW.saveBegin(name, blob.type||'application/octet-stream');
          const CH=512*1024;
          for(let i=0;i<b64.length;i+=CH){
            if(!AndroidPW.saveChunk(b64.slice(i,i+CH))){ this.flash('保存失败：传输中断'); return false; }
          }
          const r=String(AndroidPW.saveEnd()||'');
          if(r==='PICKER'){
            return await new Promise(res=>{
              let done=false;
              window.onSaveResult=(ok,msg)=>{ if(done) return; done=true;
                this.flash(ok?('已保存 '+(msg||name)):('未保存：'+(msg||'失败'))); res(!!ok); };
              setTimeout(()=>{ if(!done){ done=true; res(false); } }, 180000);   // 3分钟兜底
            });
          }
          if(r.indexOf('OK:')===0){ this.flash('已保存到 '+r.slice(3)); return true; }
          this.flash('保存失败'+(r.indexOf('ERR:')===0?('：'+r.slice(4)):'')); return false;
        }catch(e){ this.flash('保存失败：'+(e&&e.message||'异常')); return false; }
      }
      try{
        const file=new File([blob], name, {type:blob.type||'application/octet-stream'});
        if(navigator.canShare && navigator.canShare({files:[file]})){ await navigator.share({files:[file], title:name}); return true; }
      }catch(e){ if(e && e.name==='AbortError') return false; }
      const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; document.body.appendChild(a); a.click();
      setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 2000);
      return true;
    },
    async saveFiles(files){
      try{ if(navigator.canShare && navigator.canShare({files})){ await navigator.share({files}); return; } }catch(e){ if(e && e.name==='AbortError') return; }
      for(const f of files){ await this.saveBlob(f.name, f); await new Promise(r=>setTimeout(r,350)); }
    },

    /* ---------------- export: rasterize (SVG foreignObject → canvas, 零依赖) ---------------- */
    async rasterize(nb){
      const SANS="-apple-system,BlinkMacSystemFont,'PingFang SC','Noto Sans CJK SC','Source Han Sans SC','Microsoft YaHei','Heiti SC',sans-serif";
      const W=720, scale=2.5;
      const inner=nb.blocks.map(b=>{
        const t=esc(b.text);
        if(b.type==='h1') return '<div style="font-weight:900;font-size:42px;line-height:1.1;letter-spacing:-1.5px;color:#111;margin:0 0 10px;">'+t+'</div><div style="height:2px;background:#111;margin:0 0 26px;"></div>';
        if(b.type==='h2') return '<div style="font-weight:700;font-size:25px;line-height:1.3;color:#111;margin:30px 0 8px;">'+t+'</div>';
        if(b.type==='divider') return '<div style="display:flex;align-items:center;gap:10px;padding:14px 0;"><div style="width:8px;height:8px;background:#E8451F;"></div><div style="flex:1;height:2px;background:#111;"></div></div>';
        return '<div style="font-weight:400;font-size:19px;line-height:1.75;color:#222;margin:14px 0;white-space:pre-wrap;word-break:break-word;">'+t+'</div>';
      }).join('');
      const html='<div xmlns="http://www.w3.org/1999/xhtml" style="width:'+W+'px;background:#fff;padding:52px 46px;box-sizing:border-box;font-family:'+SANS+';">'+inner+'</div>';
      // measure height in a real offscreen node
      const holder=document.createElement('div'); holder.style.cssText='position:fixed;left:-99999px;top:0;width:'+W+'px;';
      holder.innerHTML=html; document.body.appendChild(holder);
      const H=Math.ceil(holder.firstChild.getBoundingClientRect().height); document.body.removeChild(holder);
      const svg='<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+H+'"><foreignObject x="0" y="0" width="'+W+'" height="'+H+'">'+html+'</foreignObject></svg>';
      const url='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svg);
      const img=await new Promise((res,rej)=>{ const im=new Image(); im.onload=()=>res(im); im.onerror=()=>rej(new Error('渲染失败')); im.src=url; });
      const canvas=document.createElement('canvas'); canvas.width=W*scale; canvas.height=H*scale;
      const ctx=canvas.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      return canvas;
    },
    sliceToPages(canvas){
      const pageH=Math.round(canvas.width*1.414);
      const pages=Math.max(1,Math.ceil(canvas.height/pageH)); const out=[];
      for(let i=0;i<pages;i++){
        const h=Math.min(pageH, canvas.height-i*pageH);
        const pc=document.createElement('canvas'); pc.width=canvas.width; pc.height=h;
        const ctx=pc.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,pc.width,h);
        ctx.drawImage(canvas,0,i*pageH,canvas.width,h,0,0,canvas.width,h);
        out.push(pc);
      }
      return out;
    },
    jpegBytes(canvas){
      const d=canvas.toDataURL('image/jpeg',0.92); const b=atob(d.slice(d.indexOf(',')+1));
      const u=new Uint8Array(b.length); for(let i=0;i<b.length;i++) u[i]=b.charCodeAt(i);
      return {bytes:u, w:canvas.width, h:canvas.height};
    },
    buildPdf(images){
      const pw=595.28, ph=841.89;
      const sb=s=>{ const a=new Uint8Array(s.length); for(let i=0;i<s.length;i++) a[i]=s.charCodeAt(i)&0xff; return a; };
      const chunks=[]; let len=0; const push=u=>{ chunks.push(u); len+=u.length; }; const pS=s=>push(sb(s));
      const N=images.length, total=2+N*3, off=new Array(total+1).fill(0);
      pS('%PDF-1.4\n%\xFF\xFF\xFF\xFF\n');
      const obj=(n,body)=>{ off[n]=len; pS(n+' 0 obj\n'+body+'\nendobj\n'); };
      const objS=(n,dict,bytes)=>{ off[n]=len; pS(n+' 0 obj\n'+dict+'\nstream\n'); push(bytes); pS('\nendstream\nendobj\n'); };
      obj(1,'<< /Type /Catalog /Pages 2 0 R >>');
      obj(2,'<< /Type /Pages /Kids ['+images.map((_,i)=>(3+i*3)+' 0 R').join(' ')+'] /Count '+N+' >>');
      images.forEach((im,i)=>{
        const pn=3+i*3, cn=4+i*3, xn=5+i*3;
        const iw=pw, ih=pw*im.h/im.w, y=Math.max(0,ph-ih);
        const content='q '+iw.toFixed(2)+' 0 0 '+ih.toFixed(2)+' 0 '+y.toFixed(2)+' cm /Im'+i+' Do Q';
        obj(pn,'<< /Type /Page /Parent 2 0 R /MediaBox [0 0 '+pw.toFixed(2)+' '+ph.toFixed(2)+'] /Resources << /XObject << /Im'+i+' '+xn+' 0 R >> >> /Contents '+cn+' 0 R >>');
        objS(cn,'<< /Length '+content.length+' >>', sb(content));
        objS(xn,'<< /Type /XObject /Subtype /Image /Width '+im.w+' /Height '+im.h+' /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length '+im.bytes.length+' >>', im.bytes);
      });
      const xs=len; let xr='xref\n0 '+(total+1)+'\n0000000000 65535 f \n';
      for(let n=1;n<=total;n++) xr+=String(off[n]).padStart(10,'0')+' 00000 n \n';
      pS(xr); pS('trailer\n<< /Size '+(total+1)+' /Root 1 0 R >>\nstartxref\n'+xs+'\n%%EOF');
      const out=new Uint8Array(len); let o=0; for(const c of chunks){ out.set(c,o); o+=c.length; }
      return new Blob([out],{type:'application/pdf'});
    },

    /* ---------------- export: dispatch ---------------- */
    async doExport(){
      if(this.state.busy) return;
      const nb=this.cur(), fmt=this.state.fmt;
      try{
        if(fmt==='md'){ await this.saveBlob(this.fname(nb)+'.md', new Blob([this.toMd(nb)],{type:'text/markdown'})); return; }
        if(fmt==='html'){ await this.saveBlob(this.fname(nb)+'.html', new Blob([this.toHtml(nb)],{type:'text/html'})); return; }
        if(fmt==='png'){ await this.doImage(nb); return; }
        if(fmt==='pdf'){ await this.doPdf(nb); return; }
        if(fmt==='docx'){ await this.doDocx(nb); return; }
        if(fmt==='zip'){ await this.doZip(nb); return; }
      }catch(err){ console.error(err); this.flash('导出失败：'+(err.message||err)); this.state.busy=false; this.renderEx(); }
    },
    async doImage(nb){
      this.state.busy=true; this.renderEx();
      try{
        const canvas=await this.rasterize(nb);
        if(this.state.pngMode==='long'){
          const blob=await new Promise(r=>canvas.toBlob(r,'image/png'));
          await this.saveBlob(this.fname(nb)+'.png', blob);
        } else {
          const pages=this.sliceToPages(canvas), files=[];
          for(let i=0;i<pages.length;i++){ const blob=await new Promise(r=>pages[i].toBlob(r,'image/png')); files.push(new File([blob], this.fname(nb)+'_p'+(i+1)+'.png',{type:'image/png'})); }
          await this.saveFiles(files);
        }
      } finally { this.state.busy=false; this.renderEx(); }
    },
    async doPdf(nb){
      this.state.busy=true; this.renderEx();
      try{
        const canvas=await this.rasterize(nb);
        const pages=this.sliceToPages(canvas).map(pc=>this.jpegBytes(pc));
        await this.saveBlob(this.fname(nb)+'.pdf', this.buildPdf(pages));
      } finally { this.state.busy=false; this.renderEx(); }
    },
    /* ---------------- export: zip + docx (零依赖) ---------------- */
    crcTable(){
      if(this._crct) return this._crct;
      const t=new Uint32Array(256);
      for(let n=0;n<256;n++){ let c=n; for(let k=0;k<8;k++) c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1); t[n]=c>>>0; }
      return this._crct=t;
    },
    crc32(bytes){ const t=this.crcTable(); let c=0xFFFFFFFF; for(let i=0;i<bytes.length;i++) c=(t[(c^bytes[i])&0xff]^(c>>>8))>>>0; return (c^0xFFFFFFFF)>>>0; },
    // 传统 PKWARE 加密（ZipCrypto）：纯 JS、被所有解压软件支持
    zipCrypto(data, password, crc){
      const t=this.crcTable(); let k0=0x12345678,k1=0x23456789,k2=0x34567890;
      const up=b=>{ k0=(t[(k0^b)&0xff]^(k0>>>8))>>>0; k1=(k1+(k0&0xff))>>>0; k1=(Math.imul(k1,134775813)+1)>>>0; k2=(t[(k2^((k1>>>24)&0xff))&0xff]^(k2>>>8))>>>0; };
      const db=()=>{ const tmp=(k2|2)&0xffff; return ((tmp*(tmp^1))>>8)&0xff; };
      const pw=new TextEncoder().encode(password); for(let i=0;i<pw.length;i++) up(pw[i]);
      const out=new Uint8Array(12+data.length), hdr=new Uint8Array(12);
      for(let i=0;i<11;i++) hdr[i]=(Math.random()*256)&0xff; hdr[11]=(crc>>>24)&0xff;
      for(let i=0;i<12;i++){ const c=hdr[i]^db(); up(hdr[i]); out[i]=c; }
      for(let i=0;i<data.length;i++){ const c=data[i]^db(); up(data[i]); out[12+i]=c; }
      return out;
    },
    buildZip(entries, password){
      const enc=new TextEncoder();
      const u16=n=>[n&0xff,(n>>>8)&0xff], u32=n=>[n&0xff,(n>>>8)&0xff,(n>>>16)&0xff,(n>>>24)&0xff];
      const parts=[], central=[]; let offset=0;
      for(const e of entries){
        const data=(typeof e.data==='string')?enc.encode(e.data):e.data;
        const nameBytes=enc.encode(e.name), crc=this.crc32(data), uSize=data.length;
        let flag=0x0800, stored=data; // bit11 = UTF-8 文件名
        if(password){ stored=this.zipCrypto(data,password,crc); flag|=0x0001; }
        const cSize=stored.length, start=offset;
        const lh=[].concat(u32(0x04034b50),u16(20),u16(flag),u16(0),u16(0),u16(0),u32(crc),u32(cSize),u32(uSize),u16(nameBytes.length),u16(0));
        parts.push(new Uint8Array(lh),nameBytes,stored); offset+=lh.length+nameBytes.length+stored.length;
        const cd=[].concat(u32(0x02014b50),u16(20),u16(20),u16(flag),u16(0),u16(0),u16(0),u32(crc),u32(cSize),u32(uSize),u16(nameBytes.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(start));
        central.push(new Uint8Array(cd),nameBytes);
      }
      const cdStart=offset; let cdSize=0;
      for(const c of central){ parts.push(c); offset+=c.length; cdSize+=c.length; }
      parts.push(new Uint8Array([].concat(u32(0x06054b50),u16(0),u16(0),u16(entries.length),u16(entries.length),u32(cdSize),u32(cdStart),u16(0))));
      let total=0; for(const p of parts) total+=p.length;
      const out=new Uint8Array(total); let o=0; for(const p of parts){ out.set(p,o); o+=p.length; }
      return new Blob([out],{type:'application/zip'});
    },
    docxXml(nb){
      const runs=nb.blocks.map(b=>{
        if(b.type==='divider') return '<w:p><w:pPr><w:pBdr><w:bottom w:val="single" w:sz="18" w:space="4" w:color="111111"/></w:pBdr><w:spacing w:before="160" w:after="160"/></w:pPr></w:p>';
        let sz=24,bold=false,before=80,after=80;
        if(b.type==='h1'){ sz=44; bold=true; before=200; after=120; }
        else if(b.type==='h2'){ sz=30; bold=true; before=160; after=60; }
        const rpr='<w:rPr>'+(bold?'<w:b/>':'')+'<w:sz w:val="'+sz+'"/><w:szCs w:val="'+sz+'"/></w:rPr>';
        const ppr='<w:pPr><w:spacing w:before="'+before+'" w:after="'+after+'" w:line="320" w:lineRule="auto"/></w:pPr>';
        return '<w:p>'+ppr+'<w:r>'+rpr+'<w:t xml:space="preserve">'+esc(b.text||'')+'</w:t></w:r></w:p>';
      }).join('');
      return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><w:document xmlns:w="http://schemas.openxmlformats.org/wordprocessingml/2006/main"><w:body>'+runs+'<w:sectPr><w:pgSz w:w="11906" w:h="16838"/><w:pgMar w:top="1440" w:right="1440" w:bottom="1440" w:left="1440"/></w:sectPr></w:body></w:document>';
    },
    docxBlob(nb){
      const ct='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/word/document.xml" ContentType="application/vnd.openxmlformats-officedocument.wordprocessingml.document.main+xml"/></Types>';
      const rels='<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="word/document.xml"/></Relationships>';
      return this.buildZip([
        {name:'[Content_Types].xml',data:ct},
        {name:'_rels/.rels',data:rels},
        {name:'word/document.xml',data:this.docxXml(nb)},
      ]);
    },
    async doDocx(nb){
      this.state.busy=true; this.renderEx();
      try{ await this.saveBlob(this.fname(nb)+'.docx', this.docxBlob(nb)); }
      finally{ this.state.busy=false; this.renderEx(); }
    },
    async doZip(nb){
      const sel=this.state.zip, want=['md','html','docx','pdf'].filter(k=>sel[k]);
      if(!want.length){ this.flash('请至少选择一种打包格式'); return; }
      this.state.busy=true; this.renderEx();
      try{
        const base=this.fname(nb), entries=[];
        if(sel.md) entries.push({name:base+'.md', data:this.toMd(nb)});
        if(sel.html) entries.push({name:base+'.html', data:this.toHtml(nb)});
        if(sel.docx) entries.push({name:base+'.docx', data:new Uint8Array(await this.docxBlob(nb).arrayBuffer())});
        if(sel.pdf){ const canvas=await this.rasterize(nb); const pages=this.sliceToPages(canvas).map(pc=>this.jpegBytes(pc)); const pdf=this.buildPdf(pages); entries.push({name:base+'.pdf', data:new Uint8Array(await pdf.arrayBuffer())}); }
        const pwd=(this.state.zipPwd||'').trim();
        const blob=this.buildZip(entries, pwd||null);
        await this.saveBlob(base+(pwd?'_加密':'')+'.zip', blob);
      } finally { this.state.busy=false; this.renderEx(); }
    },

    /* ---------------- editing ---------------- */
    onInput(el){
      const id=el.dataset.id, text=el.innerText.replace(/\n+$/,'');
      const blk=this.cur().blocks.find(b=>b.id===id);
      if(blk){ blk.text=text; this.persist(); }
    },
    onEdit(el){
      const id=el.dataset.id, text=el.innerText.replace(/\n+$/,'');
      this.setCur(this.cur().blocks.map(b=> b.id===id ? Object.assign({},b,{text}) : b));
    },
    caretEnd(el){ try{ const r=document.createRange(); r.selectNodeContents(el); r.collapse(false); const sel=getSelection(); sel.removeAllRanges(); sel.addRange(r); }catch(e){} },
    focusBlock(id,end){
      setTimeout(()=>{ const ed=document.querySelector('#editor-scroll [data-blk="'+id+'"] [contenteditable]'); if(ed){ ed.focus(); if(end) this.caretEnd(ed); } }, 60);
    },
    onKey(e, el){
      const id=el.dataset.id;
      if(e.key==='Enter' && !e.shiftKey){
        e.preventDefault();
        this.splitAtCaret(el);   // 手术式在光标处断块：不重渲、焦点无缝、输入法不重启(#3)
      } else if(e.key==='Backspace' && el.innerText===''){
        const blocks=this.cur().blocks;
        if(blocks.length<=1) { e.preventDefault(); return; }
        e.preventDefault();
        const idx=blocks.findIndex(b=>b.id===id);
        // 找上方最近的可编辑块承接焦点(跳过分隔线)；没有则找下方
        let tgt=null;
        for(let i=idx-1;i>=0;i--){ if(blocks[i].type!=='divider'){ tgt=blocks[i]; break; } }
        if(!tgt) for(let i=idx+1;i<blocks.length;i++){ if(blocks[i].type!=='divider'){ tgt=blocks[i]; break; } }
        this.setCur(blocks.filter(b=>b.id!==id));
        this.removeBlockEl(id);   // 手术式删除：不重渲不卡死(#3)
        if(tgt){
          const ed=document.querySelector('#editor-scroll [data-blk="'+tgt.id+'"] [contenteditable]');
          if(ed) this.caretTo(ed, (tgt.text||'').length);
          this.markActive(tgt.id);
        }
      } else if(e.key==='Tab'){
        // #7 跨块跳转带循环：Tab 下一块 / Shift+Tab 上一块，越界回绕(跳过分隔线)
        e.preventDefault();
        const blocks=this.cur().blocks;
        const idx=blocks.findIndex(b=>b.id===id); if(idx<0) return;
        const step=e.shiftKey?-1:1, n=blocks.length;
        for(let k=1;k<=n;k++){
          const b=blocks[(idx+step*k%n+n)%n];
          if(b.type!=='divider'){
            const ed=document.querySelector('#editor-scroll [data-blk="'+b.id+'"] [contenteditable]');
            if(ed){ this.caretTo(ed, (b.text||'').length); this.markActive(b.id);
              try{ ed.scrollIntoView({block:'nearest'}); }catch(_){}}
            break;
          }
        }
      }
    },
    onAdd(type){
      const nb={ id:uid(), type, text:'' };
      this.setCur([...this.cur().blocks, nb]);
      this.state.addMenuOpen=false; this.render();
      setTimeout(()=>{ const el=document.getElementById('editor-scroll'); if(el) el.scrollTop=el.scrollHeight;
        const ed=document.querySelector('#editor-scroll [data-blk="'+nb.id+'"] [contenteditable]'); if(ed) ed.focus(); }, 80);
    },
    onDel(id){
      // 手术式删除：只摘掉该块节点，滚动位置原地不动(#4：此前整页重渲导致跳回文首)
      this.setCur(this.cur().blocks.filter(b=>b.id!==id));
      this.removeBlockEl(id);
    },

    /* ---------------- drag: library cards (long-press lift / tap open) ---------------- */
    onCardDown(e, card){
      if(e.button!=null && e.button!==0) return;
      const id=card.dataset.id, pid=e.pointerId, startX=e.clientX, startY=e.clientY;
      let activated=false;
      const grid=document.getElementById('lib-grid');
      try{ card.setPointerCapture(pid); }catch(_){}
      const cleanup=()=>{ clearTimeout(timer); window.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up); window.removeEventListener('pointercancel',cancel); try{ card.releasePointerCapture(pid); }catch(_){} };
      const activate=()=>{ activated=true; this.beginCardDrag(grid,id,card,startX,startY); };
      const timer=setTimeout(activate,180);
      const move=(ev)=>{ const dx=ev.clientX-startX, dy=ev.clientY-startY;
        if(!activated){ if(Math.abs(dx)>12||Math.abs(dy)>12) cleanup(); return; }
        ev.preventDefault(); this.cardDragMove(ev); };
      const up=()=>{ cleanup(); if(activated) this.endCardDrag(); else { this.state.currentId=id; this.state.view='editor'; this.state.addMenuOpen=false; this.render(); } };
      const cancel=()=>{ cleanup(); if(activated) this.endCardDrag(); };
      window.addEventListener('pointermove',move,{passive:false});
      window.addEventListener('pointerup',up);
      window.addEventListener('pointercancel',cancel);
    },
    beginCardDrag(grid,id,dragEl,startX,startY){
      if(!grid) return;
      const cards=[...grid.querySelectorAll('[data-card]')];
      const ids=cards.map(c=>c.dataset.id);
      const base=cards.map(c=>{ const r=c.getBoundingClientRect(); return {x:r.left,y:r.top,cx:r.left+r.width/2,cy:r.top+r.height/2}; });
      const fromIdx=ids.indexOf(id);
      document.body.style.userSelect='none';
      this._cdrag={ grid,id,dragEl,cards,ids,base,fromIdx,target:fromIdx,startX,startY,origBox:dragEl.style.boxShadow };
      dragEl.style.transition='none'; dragEl.style.position='relative'; dragEl.style.zIndex='50';
      dragEl.style.boxShadow='7px 9px 0 rgba(17,17,17,.32)'; dragEl.style.transform='scale(1.04)';
    },
    cardDragMove(ev){
      const d=this._cdrag; if(!d) return;
      const dx=ev.clientX-d.startX, dy=ev.clientY-d.startY;
      d.dragEl.style.transform='translate('+dx+'px,'+dy+'px) scale(1.04)';
      let target=d.fromIdx, best=Infinity;
      for(let i=0;i<d.base.length;i++){ const dd=Math.hypot(ev.clientX-d.base[i].cx, ev.clientY-d.base[i].cy); if(dd<best){ best=dd; target=i; } }
      if(target!==d.target){
        d.target=target;
        const order=d.ids.slice(); const [m]=order.splice(d.fromIdx,1); order.splice(target,0,m);
        d.cards.forEach((c,origIdx)=>{ if(origIdx===d.fromIdx) return;
          const slot=order.indexOf(d.ids[origIdx]);
          const ddx=d.base[slot].x-d.base[origIdx].x, ddy=d.base[slot].y-d.base[origIdx].y;
          c.style.transition='transform .2s cubic-bezier(.2,.8,.2,1)';
          c.style.transform=(ddx||ddy)?('translate('+ddx+'px,'+ddy+'px)'):''; });
      }
    },
    endCardDrag(){
      const d=this._cdrag; if(!d) return; this._cdrag=null;
      document.body.style.userSelect='';
      d.cards.forEach(c=>{ c.style.transition=''; c.style.transform=''; });
      const de=d.dragEl; de.style.transition=''; de.style.transform=''; de.style.zIndex=''; de.style.position=''; de.style.boxShadow=d.origBox;
      if(d.target!==d.fromIdx){
        const arr=this.state.notebooks.slice(); const [m]=arr.splice(d.fromIdx,1); arr.splice(d.target,0,m);
        this.state.notebooks=arr; this.persist(); this.render();
      }
    },

    /* ---------------- drag: editor blocks ---------------- */
    onHandleDown(e, handleEl){
      if(e.button!=null && e.button!==0) return;
      e.preventDefault(); e.stopPropagation();
      const id=handleEl.dataset.id, scroll=document.getElementById('editor-scroll'); if(!scroll) return;
      const els=[...scroll.querySelectorAll('[data-blk]')];
      const fromIdx=els.findIndex(el=>el.dataset.blk===id); if(fromIdx===-1) return;
      const geom=els.map(el=>{ const r=el.getBoundingClientRect(); return {el,top:r.top,h:r.height}; });
      geom.forEach((g,i)=>{ const next=geom[i+1], prev=geom[i-1]; g.slot=next?(next.top-g.top):(prev?(g.top-prev.top):g.h); });
      const dragEl=geom[fromIdx].el;
      this._drag={ id,fromIdx,target:fromIdx,dragEl,scroll,geom,startY:e.clientY,slotH:geom[fromIdx].slot,scrollTop0:scroll.scrollTop };
      document.body.style.userSelect='none';
      dragEl.style.transition='none'; dragEl.style.zIndex='50'; dragEl.style.position='relative'; dragEl.style.background='#fff';
      dragEl.style.boxShadow='4px 8px 0 rgba(232,69,31,.3)'; dragEl.style.outline='1.5px solid #E8451F'; dragEl.style.borderRadius='2px';
      const hdl=dragEl.querySelector('.hdl'); if(hdl) hdl.style.cursor='grabbing';
      try{ handleEl.setPointerCapture(e.pointerId); }catch(_){}
      const move=(ev)=>{ ev.preventDefault(); this.onDragMove(ev); };
      const up=()=>{ window.removeEventListener('pointermove',move); window.removeEventListener('pointerup',up); window.removeEventListener('pointercancel',up); this.onDragEnd(); };
      window.addEventListener('pointermove',move,{passive:false}); window.addEventListener('pointerup',up); window.addEventListener('pointercancel',up);
    },
    onDragMove(ev){
      const d=this._drag; if(!d) return;
      // 边缘自动滚动：拖近容器上/下沿时自动滚动，长文里也能把块送到任何位置
      try{
        const r=d.scroll.getBoundingClientRect();
        if(ev.clientY < r.top+44) d.scroll.scrollTop -= 12;
        else if(ev.clientY > r.bottom-44) d.scroll.scrollTop += 12;
      }catch(e){}
      const scDelta=d.scroll.scrollTop-d.scrollTop0;                    // 拖动期间容器滚过的距离
      const dy=ev.clientY-d.startY+scDelta;                             // 补偿滚动，块始终跟手
      d.dragEl.style.transform='translateY('+dy+'px)';
      const y=ev.clientY+scDelta;                                        // 命中判定换算回起始坐标系
      let target=d.geom.length-1;
      for(let i=0;i<d.geom.length;i++){ if(y<d.geom[i].top+d.geom[i].h/2){ target=i; break; } }
      if(target!==d.target){
        d.target=target;
        d.geom.forEach((g,i)=>{ if(i===d.fromIdx) return;
          let shift=0;
          if(target>d.fromIdx && i>d.fromIdx && i<=target) shift=-d.slotH;
          else if(target<d.fromIdx && i>=target && i<d.fromIdx) shift=d.slotH;
          g.el.style.transition='transform .16s cubic-bezier(.2,.8,.2,1)';
          g.el.style.transform=shift?('translateY('+shift+'px)'):''; });
      }
    },
    onDragEnd(){
      const d=this._drag; if(!d) return; this._drag=null;
      document.body.style.userSelect='';
      d.geom.forEach(g=>{ g.el.style.transition=''; g.el.style.transform=''; });
      const de=d.dragEl; de.style.transition=''; de.style.transform=''; de.style.zIndex=''; de.style.position=''; de.style.background=''; de.style.boxShadow=''; de.style.outline=''; de.style.borderRadius='';
      const hdl=de.querySelector('.hdl'); if(hdl) hdl.style.cursor='';
      if(d.target!==d.fromIdx){
        const blocks=this.cur().blocks.slice(); const [m]=blocks.splice(d.fromIdx,1); blocks.splice(d.target,0,m);
        this.setCur(blocks);
        // 手术式搬移DOM节点(禁整页重渲)：滚动位置/激活块原地不动，不跳回文首(bug5)
        const parent=de.parentNode;
        if(parent){
          const els=[...d.scroll.querySelectorAll('[data-blk]')].filter(el=>el!==de);
          if(d.target>=els.length) parent.insertBefore(de, els[els.length-1].nextSibling);
          else parent.insertBefore(de, els[d.target]);
        }
        this.markActive(d.id);
      }
    },

    /* ---------------- mount ---------------- */
    mount(){
      this.root=document.getElementById('app');
      this.loadLibrary();
      document.addEventListener('pointerdown', (e)=>{
        if(e.button!=null && e.button!==0) return;
        const t=e.target; if(!t||!t.closest) return;
        const bw=t.closest('#editor-scroll .blk'); if(bw && bw.dataset.blk) this.markActive(bw.dataset.blk);   // 点哪块 × 跟哪块
        const hdl=t.closest('.hdl'); if(hdl){ this.onHandleDown(e,hdl); return; }
        const card=t.closest('[data-card]'); if(card){ this.onCardDown(e,card); return; }
      }, true);
      // 五笔输入路由：上报编辑焦点状态 + 接收父键盘消息
      document.addEventListener('focusin', (e)=>{
        const t=e.target;
        if(t && ((t.getAttribute&&t.getAttribute('contenteditable')==='true') || t.tagName==='INPUT' || t.tagName==='TEXTAREA')){ this.reportEditing(true); }
      });
      document.addEventListener('focusout', ()=>{
        setTimeout(()=>{ const a=this.activeEditable(); this.reportEditing(!!a); }, 60);
      });
      window.addEventListener('message', (e)=>{
        const d=e.data; if(!d || d.src!=='wubi') return;
        if(d.type==='commit') this.onWubi('commit', d.text||'');
        else if(d.type==='delete') this.onWubi('delete');
        else if(d.type==='enter') this.onWubi('enter');
      });
      // 耐久化：应用被切后台 / 页面隐藏 / 即将销毁时，立即同步落盘
      const flushNow=()=>{ try{ this.flush(); }catch(_){} };
      document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='hidden') flushNow(); });
      window.addEventListener('pagehide', flushNow);
      window.addEventListener('blur', flushNow);
      this.render();
    }
  };
  window.NoteApp = App;
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', ()=>App.mount());
  else App.mount();
})();
</script>
</body>
</html>
