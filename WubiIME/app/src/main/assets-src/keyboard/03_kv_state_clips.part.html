// ===== KV 持久层：localStorage 全面禁用(浏览器缓存技术，清缓存/管家优化即丢失，本软件禁用)。
//   真身 = Java 桥 AES-256-GCM 加密文件(kbprefs.enc，Keystore 硬件密钥)：
//   启动同步载入内存 → 读=内存即取 → 写=内存即改+200ms防抖落盘 → 收键盘/离屏强制 flush。
//   无桥(浏览器开发调试)才回退 localStorage。=====
const KV=(function(){
  const hasPW=()=>{ try{ return typeof AndroidPW!=='undefined' && !!AndroidPW.saveAppData && !!AndroidPW.loadAppData; }catch(e){ return false; } };
  const _ls=(()=>{ try{ return window.localStorage; }catch(e){ return null; } })();
  let mem={}, dirty=false, timer=null;
  // 启动载入：桥文件为唯一真源；桥文件为空但旧 localStorage 有数据 → 一次性迁移进桥
  try{
    if(hasPW()){
      const s=AndroidPW.loadAppData('kbprefs');
      if(s){ mem=JSON.parse(s)||{}; }
      else if(_ls){ for(let i=0;i<_ls.length;i++){ const k=_ls.key(i); mem[k]=_ls.getItem(k); } dirty=true; }
    } else if(_ls){ for(let i=0;i<_ls.length;i++){ const k=_ls.key(i); mem[k]=_ls.getItem(k); } }
  }catch(e){ mem={}; }
  function persist(){
    if(!dirty) return;
    try{
      if(hasPW()){ AndroidPW.saveAppData('kbprefs', JSON.stringify(mem)); dirty=false; }
      else if(_ls){ for(const k in mem){ try{_ls.setItem(k,mem[k]);}catch(e){} } dirty=false; }
    }catch(e){}
  }
  function schedule(){ if(timer) return; timer=setTimeout(()=>{ timer=null; persist(); },200); }
  const api={
    get(k){ const v=mem[k]; return v===undefined?null:v; },
    set(k,v){ mem[k]=String(v); dirty=true; schedule(); },
    remove(k){ if(k in mem){ delete mem[k]; dirty=true; schedule(); } },
    flush(){ if(timer){ clearTimeout(timer); timer=null; } persist(); }
  };
  // 离屏/隐藏强制落盘：防抖未到就被杀也不丢
  try{
    document.addEventListener('visibilitychange',()=>{ if(document.hidden) api.flush(); });
    window.addEventListener('pagehide',()=>api.flush());
  }catch(e){}
  return api;
})();

try{ const cs=KV.get('kbClips'); if(cs) clips=JSON.parse(cs)||[]; }catch(e){ clips=[]; }
function saveClips(){ try{
  const ok=safeSetItem('kbClips', JSON.stringify(clips), ()=>{
    clips.length=Math.max(5, clips.length>>1);   // 满额裁半保最新
    return JSON.stringify(clips);
  });
  if(ok) mirrorPrefs(); }catch(e){} }
function addClip(txt){
  if(!txt || !txt.trim()) return;
  if(txt.length>100000) txt=txt.slice(0,100000);   // 单条100KB截断：防超长文本撑爆localStorage
  // 去重：已存在则提到最前
  const i=clips.indexOf(txt);
  if(i>=0) clips.splice(i,1);
  clips.unshift(txt);
  if(clips.length>50) clips.pop();   // 私有历史最多 50 条
  saveClips();
}
// 存储满额降级：setItem 抛 QuotaExceeded 时裁半重试一次——宁可丢最旧的，绝不丢刚存的
function safeSetItem(k,v,shrinkFn){
  try{ KV.set(k,v); return true; }catch(e){ return false; }   // KV无配额限制，shrink路径不再需要
}
// ===== Java 私有剪贴板 → JS 剪贴列表 单向合并同步 =====
//   根治"Ctrl+X/C 后剪贴板条不立即显示"：复制走系统剪贴板监听→Java privClip 的那条路径
//   只落在 Java 侧，JS clips(面板数据源)看不见，何时出现全凭下次某处 addClip 撞上——现在
//   在复制/剪切后、打开剪贴面板时、键盘获得焦点时都主动拉取 Android.getClipboardAll() 合并。
function syncPrivClips(refreshUI){
  try{
    if(typeof Android==='undefined' || !Android.getClipboardAll) return;
    const a=JSON.parse(Android.getClipboardAll()||'[]');
    if(!Array.isArray(a) || !a.length) return;
    let changed=false;
    // Java 列表最新在前：倒序逐条 unshift，最终顺序与 Java 一致且 JS 独有条目保留在后
    for(let i=a.length-1;i>=0;i--){
      const t=a[i]; if(!t || !String(t).trim()) continue;
      const j=clips.indexOf(t);
      if(j===0 && i===0) continue;
      if(j>=0) clips.splice(j,1);
      clips.unshift(t); changed=true;
    }
    while(clips.length>50) clips.pop();
    if(changed){
      saveClips();
      if(refreshUI){
        const p=document.getElementById('clipPanel');
        if(p && !p.classList.contains('hidden')) refreshClip();
      }
    }
  }catch(e){}
}
